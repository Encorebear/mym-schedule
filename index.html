<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MYM 스케줄 통합</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535; --bg4: #252d3d;
    --border: #2a3347; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #3b82f6; --danger: #ef4444; --success: #22c55e; --warn: #f59e0b;
    --minho: #60a5fa; --sujeong: #f472b6; --min: #a78bfa;
    --minji: #fbbf24; --seohyun: #34d399; --junseo: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-logo {
    font-size: 36px; font-weight: 800; letter-spacing: -1px;
    margin-bottom: 6px; color: var(--text);
  }
  .login-logo span { color: var(--accent); }
  .login-subtitle {
    font-size: 13px; color: var(--text3); margin-bottom: 40px;
  }
  .login-card {
    width: 100%; max-width: 340px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
  }
  .login-field { margin-bottom: 14px; }
  .login-label { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 6px; display: block; }
  .login-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    padding: 12px 14px; font-family: inherit;
    transition: border-color 0.15s;
  }
  .login-input:focus { outline: none; border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 14px; background: var(--accent);
    border: none; border-radius: 10px; color: white;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
    transition: all 0.15s;
  }
  .login-btn:active { opacity: 0.85; transform: scale(0.98); }
  .login-error {
    font-size: 12px; color: var(--danger); margin-top: 10px;
    text-align: center; min-height: 18px;
  }
  .login-version { font-size: 11px; color: var(--text3); margin-top: 24px; }

  /* ── MAIN APP ── */
  #main-app { display: none; padding-bottom: 80px; }

  /* ── HEADER ── */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 12px 16px 10px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .app-title span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .user-badge {
    display: flex; align-items: center; gap: 5px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .user-badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px;
    color: var(--text2); font-size: 12px; cursor: pointer;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .btn-icon {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    color: var(--text2); font-size: 13px; cursor: pointer;
  }

  .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .month-label { font-size: 17px; font-weight: 700; min-width: 100px; text-align: center; cursor: pointer; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 14px; cursor: pointer;
  }
  .nav-btn:active { background: var(--bg4); transform: scale(0.92); }

  /* ── ACTOR FILTER ── */
  .actor-filter { padding: 8px 12px 0; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .actor-filter::-webkit-scrollbar { display: none; }
  .actor-chip {
    flex-shrink: 0; padding: 5px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 2px solid transparent; white-space: nowrap;
  }

  /* ── WEEKDAY ── */
  .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px 4px 4px; gap: 2px; }
  .weekday-label { text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); padding: 2px 0; }

  /* ── CALENDAR ── */
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 0 4px 8px; }
  .cal-day {
    background: var(--bg2); border-radius: 8px; min-height: 72px;
    padding: 4px; cursor: pointer; border: 1px solid transparent;
    transition: background 0.15s;
  }
  .cal-day:active { background: var(--bg3); }
  .cal-day.other-month { opacity: 0.3; }
  .cal-day.today { border-color: var(--accent); }
  .day-num { font-size: 12px; font-weight: 600; color: var(--text2); line-height: 1; margin-bottom: 3px; display: block; }
  .cal-day.today .day-num { color: var(--accent); }
  .event-dots { display: flex; flex-direction: column; gap: 2px; }
  .event-dot {
    height: 14px; border-radius: 3px; font-size: 9px; font-weight: 600;
    padding: 0 3px; line-height: 14px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    color: rgba(0,0,0,0.85);
  }
  .more-count { font-size: 9px; color: var(--text3); padding: 0 2px; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 24px; right: 16px; z-index: 200;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: white;
    box-shadow: 0 4px 20px rgba(59,130,246,0.5); transition: all 0.2s;
  }
  .fab:active { transform: scale(0.92); }
  .fab.hidden { display: none; }

  /* ── SHEETS ── */
  .sheet-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .sheet-overlay.visible { opacity: 1; pointer-events: all; }
  .bottom-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
    background: var(--bg2); border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    max-height: 92vh; display: flex; flex-direction: column;
  }
  .bottom-sheet.visible { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sheet-title { font-size: 16px; font-weight: 700; }
  .sheet-close {
    background: var(--bg3); border: none; border-radius: 50%;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 14px; cursor: pointer;
  }
  .sheet-body { overflow-y: auto; flex: 1; padding: 12px 16px 24px; -webkit-overflow-scrolling: touch; }

  /* ── EVENT CARDS ── */
  .event-card {
    background: var(--bg3); border-radius: 10px; border: 1px solid var(--border);
    padding: 12px; margin-bottom: 8px; position: relative;
    border-left: 3px solid transparent;
  }
  .event-card-actor { font-size: 11px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .event-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .event-card-meta { font-size: 12px; color: var(--text2); display: flex; flex-wrap: wrap; gap: 6px; }
  .event-card-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-edit, .btn-delete {
    flex: 1; padding: 6px; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  }
  .btn-edit { background: var(--bg4); color: var(--text2); }
  .btn-delete { background: rgba(239,68,68,0.1); color: var(--danger); border-color: rgba(239,68,68,0.3); }
  .no-events { text-align: center; color: var(--text3); padding: 32px 0; font-size: 13px; }

  /* ── FORM ── */
  .form-section { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; padding: 10px 12px;
    font-family: inherit; -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-select option { background: var(--bg2); }
  .form-textarea { resize: none; height: 72px; line-height: 1.5; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .actor-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .actor-select-btn {
    padding: 8px 4px; border-radius: 8px; border: 2px solid var(--border);
    background: var(--bg3); color: var(--text2); font-size: 12px;
    font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .actor-select-btn.disabled { opacity: 0.3; cursor: not-allowed; }

  .type-select-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .type-select-btn {
    padding: 7px 4px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2); font-size: 11px;
    cursor: pointer; text-align: center; line-height: 1.3;
  }
  .type-select-btn.selected { background: rgba(59,130,246,0.2); border-color: var(--accent); color: var(--accent); }

  .btn-submit {
    width: 100%; padding: 14px; background: var(--accent); border: none;
    border-radius: 10px; color: white; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 4px;
  }
  .btn-submit:active { opacity: 0.85; transform: scale(0.98); }

  /* ── LIST VIEW ── */
  .list-view { padding: 8px 12px; }
  .list-date-group { margin-bottom: 16px; }
  .list-date-label { font-size: 12px; font-weight: 700; color: var(--text3); margin-bottom: 6px; }
  .list-event-card {
    background: var(--bg2); border-radius: 10px; border: 1px solid var(--border);
    padding: 10px 12px; margin-bottom: 6px; display: flex;
    align-items: flex-start; gap: 10px; cursor: pointer;
  }
  .list-event-bar { width: 3px; border-radius: 2px; min-height: 36px; flex-shrink: 0; align-self: stretch; }
  .list-event-content { flex: 1; min-width: 0; }
  .list-event-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .list-event-meta { font-size: 11px; color: var(--text3); }

  /* ── ADMIN PANEL ── */
  .admin-section { margin-bottom: 24px; }
  .admin-section-title {
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
  }
  .user-row {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .user-row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .user-row-info { flex: 1; min-width: 0; }
  .user-row-name { font-size: 13px; font-weight: 600; }
  .user-row-role { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .user-row-actions { display: flex; gap: 6px; }
  .btn-small {
    padding: 5px 10px; border-radius: 6px; font-size: 11px;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg4); color: var(--text2);
  }
  .btn-small.danger { color: var(--danger); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.1); }

  .add-user-form {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-top: 10px;
  }
  .add-user-form .form-section { margin-bottom: 10px; }

  /* ── SETTINGS / USER MENU ── */
  .menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; font-size: 14px; color: var(--text);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item .menu-icon { font-size: 18px; width: 28px; text-align: center; }
  .menu-item.danger { color: var(--danger); }
  .menu-item .menu-arrow { margin-left: auto; color: var(--text3); font-size: 12px; }

  .settings-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    padding: 10px 12px; font-family: inherit; margin-bottom: 8px;
  }
  .settings-input:focus { outline: none; border-color: var(--accent); }
  .sync-status { font-size: 12px; color: var(--text3); text-align: center; margin-top: 4px; }
  .sync-status.ok { color: var(--success); }
  .sync-status.err { color: var(--danger); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg4); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-weight: 500;
    padding: 8px 16px; border-radius: 20px;
    z-index: 999; opacity: 0; pointer-events: none;
    transition: all 0.25s; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .badge-admin { background: rgba(245,158,11,0.2); color: var(--warn); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .badge-actor { background: rgba(59,130,246,0.15); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .badge-viewer { background: rgba(100,116,139,0.2); color: var(--text3); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════ -->
<!--  LOGIN SCREEN                              -->
<!-- ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-logo">MYM <span>스케줄</span></div>
  <div class="login-subtitle">배우 스케줄 통합 관리 시스템</div>
  <div class="login-card">
    <div class="login-field">
      <label class="login-label">아이디</label>
      <input type="text" class="login-input" id="login-id" placeholder="아이디 입력" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    </div>
    <div class="login-field">
      <label class="login-label">비밀번호</label>
      <input type="password" class="login-input" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
  <div class="login-version">MYM Schedule v1.0</div>
</div>

<!-- ══════════════════════════════════════════ -->
<!--  MAIN APP                                  -->
<!-- ══════════════════════════════════════════ -->
<div id="main-app">

  <!-- HEADER -->
  <div class="app-header">
    <div class="header-top">
      <div class="app-title">MYM <span>스케줄</span></div>
      <div class="header-right">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-cal-view" onclick="setView('calendar')">📅</button>
          <button class="view-btn" id="btn-list-view" onclick="setView('list')">📋</button>
        </div>
        <div class="user-badge" id="user-badge" onclick="openUserMenu()">
          <div class="dot" id="user-badge-dot"></div>
          <span id="user-badge-name"></span>
        </div>
      </div>
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label" onclick="goToday()">2026년 4월</div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <!-- ACTOR FILTER -->
  <div class="actor-filter" id="actor-filter"></div>

  <!-- WEEKDAY LABELS -->
  <div class="weekday-header">
    <div class="weekday-label">월</div><div class="weekday-label">화</div>
    <div class="weekday-label">수</div><div class="weekday-label">목</div>
    <div class="weekday-label">금</div>
    <div class="weekday-label" style="color:var(--min)">토</div>
    <div class="weekday-label" style="color:var(--junseo)">일</div>
  </div>

  <!-- CALENDAR / LIST -->
  <div id="calendar-view"><div class="calendar-grid" id="calendar-grid"></div></div>
  <div id="list-view" style="display:none"><div class="list-view" id="list-container"></div></div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAddSheet()">+</button>
</div>

<!-- OVERLAY -->
<div class="sheet-overlay" id="overlay" onclick="closeAllSheets()"></div>

<!-- DAY DETAIL SHEET -->
<div class="bottom-sheet" id="day-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="day-sheet-title">일정</div>
    <button class="sheet-close" onclick="closeDaySheet()">✕</button>
  </div>
  <div class="sheet-body" id="day-sheet-body"></div>
</div>

<!-- ADD/EDIT FORM SHEET -->
<div class="bottom-sheet" id="form-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="form-sheet-title">일정 추가</div>
    <button class="sheet-close" onclick="closeFormSheet()">✕</button>
  </div>
  <div class="sheet-body">
    <form id="event-form" onsubmit="submitEventForm(event)">
      <input type="hidden" id="form-event-id">

      <div class="form-section">
        <label class="form-label">배우</label>
        <div class="actor-select-grid" id="form-actor-grid"></div>
        <input type="hidden" id="form-actor" required>
      </div>
      <div class="form-section">
        <label class="form-label">날짜</label>
        <input type="date" class="form-input" id="form-date" required>
      </div>
      <div class="form-section">
        <label class="form-label">일정 유형</label>
        <div class="type-select-grid">
          <button type="button" class="type-select-btn" data-type="촬영" onclick="selectFormType('촬영')">🎬<br>촬영</button>
          <button type="button" class="type-select-btn" data-type="미팅" onclick="selectFormType('미팅')">📋<br>미팅</button>
          <button type="button" class="type-select-btn" data-type="행사" onclick="selectFormType('행사')">🎪<br>행사</button>
          <button type="button" class="type-select-btn" data-type="인터뷰" onclick="selectFormType('인터뷰')">🎤<br>인터뷰</button>
          <button type="button" class="type-select-btn" data-type="이동" onclick="selectFormType('이동')">✈️<br>이동</button>
          <button type="button" class="type-select-btn" data-type="홍보" onclick="selectFormType('홍보')">📸<br>홍보</button>
          <button type="button" class="type-select-btn" data-type="광고" onclick="selectFormType('광고')">📢<br>광고</button>
          <button type="button" class="type-select-btn" data-type="기타" onclick="selectFormType('기타')">📌<br>기타</button>
          <button type="button" class="type-select-btn" id="type-btn-private" data-type="비공개" onclick="selectFormType('비공개')" style="grid-column:span 4;border-color:rgba(239,68,68,0.3);color:#ef4444;">🔒 비공개 &nbsp;<span style="font-size:10px;color:var(--text3);font-weight:400;">관리자만 세부내용 열람</span></button>
        </div>
        <input type="hidden" id="form-type" required>
      </div>
      <div class="form-section">
        <label class="form-label">제목</label>
        <input type="text" class="form-input" id="form-title" placeholder="일정 제목 입력" required>
      </div>
      <div class="form-section">
        <label class="form-label">시간</label>
        <div class="form-row">
          <div>
            <label class="form-label" style="font-size:11px;">시작</label>

    <div class="login-error" id="pw-error" style="margin-top:10px;"></div>
  </div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const ACTORS = {
  'LMH': { color: '#60a5fa', bg: 'rgba(96,165,250,0.85)' },
  'LSJ': { color: '#f472b6', bg: 'rgba(244,114,182,0.85)' },
  'KM':   { color: '#a78bfa', bg: 'rgba(167,139,250,0.85)' },
  'KMJ': { color: '#fbbf24', bg: 'rgba(251,191,36,0.85)' },
  'LSH': { color: '#34d399', bg: 'rgba(52,211,153,0.85)' },
  'PJS': { color: '#f87171', bg: 'rgba(248,113,113,0.85)' }
};
const ACTOR_LIST = Object.keys(ACTORS);
const EVENT_TYPES = { '촬영':'🎬','미팅':'📋','행사':'🎪','인터뷰':'🎤','이동':'✈️','홍보':'📸','광고':'📢','기타':'📌','비공개':'🔒' };
const PRIVATE_TYPE = '비공개'; // 관리자만 세부 내용 열람 가능

const STORAGE_KEY   = 'mym_events_v1';
const USERS_KEY     = 'mym_users_v1';
const SETTINGS_KEY  = 'mym_settings_v1';
const SESSION_KEY   = 'mym_session_v1';

// ─── DEFAULT USERS ───────────────────────────────
// role: 'admin' | 'actor' | 'viewer'
// actors: array of actor names (empty = all for admin)
// canEdit: bool
const DEFAULT_USERS = [
  { id:'admin',   pw:'mym2024', role:'admin',  actors:[], canEdit:true,  label:'관리자' },
  { id:'minho',   pw:'minho1',  role:'actor',  actors:['LMH'], canEdit:true,  label:'LMH 담당' },
  { id:'sujeong', pw:'sj1234',  role:'actor',  actors:['LSJ'], canEdit:true,  label:'LSJ 담당' },
  { id:'min',     pw:'min123',  role:'actor',  actors:['KM'],   canEdit:true,  label:'KM 담당' },
  { id:'minji',   pw:'mj1234',  role:'actor',  actors:['KMJ'], canEdit:true,  label:'KMJ 담당' },
  { id:'seohyun', pw:'sh1234',  role:'actor',  actors:['LSH'], canEdit:true,  label:'LSH 담당' },
  { id:'junseo',  pw:'js1234',  role:'actor',  actors:['PJS'], canEdit:true,  label:'PJS 담당' }
];

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  selectedActor: 'all',
  view: 'calendar',
  events: [],
  users: [],
  currentUser: null,
  apiUrl: ''
};

// ═══════════════════════════════════════════════════
//  STORAGE HELPERS
// ═══════════════════════════════════════════════════
function loadAll() {
  try { state.events = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { state.events = []; }
  try {
    const stored = JSON.parse(localStorage.getItem(USERS_KEY));
    state.users = stored && stored.length ? stored : JSON.parse(JSON.stringify(DEFAULT_USERS));
  } catch(e) { state.users = JSON.parse(JSON.stringify(DEFAULT_USERS)); }
  try { const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'); state.apiUrl = s.apiUrl || ''; } catch(e) {}
}
function saveEvents() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.events)); }
function saveUsers()  { localStorage.setItem(USERS_KEY, JSON.stringify(state.users)); }

function getUser(id) { return state.users.find(u => u.id === id); }
function isAdmin() { return state.currentUser && state.currentUser.role === 'admin'; }
function canEdit() { return state.currentUser && state.currentUser.canEdit; }

// ═══════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════
function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');

  if (!id || !pw) { errEl.textContent = '아이디와 비밀번호를 입력해주세요'; return; }

  const user = state.users.find(u => u.id === id && u.pw === pw);
  if (!user) { errEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다'; return; }

  state.currentUser = user;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
  errEl.textContent = '';
  startApp();
}

function logout() {
  state.currentUser = null;
  sessionStorage.removeItem(SESSION_KEY);
  closeAllSheets();
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
}

function tryAutoLogin() {
  try {
    const s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (s && s.id) {
      const fresh = getUser(s.id);
      if (fresh) { state.currentUser = fresh; return true; }
    }
  } catch(e) {}
  return false;
}

// ═══════════════════════════════════════════════════
//  APP INIT
// ═══════════════════════════════════════════════════
function startApp() {
  const user = state.currentUser;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';

  // User badge
  const dot = document.getElementById('user-badge-dot');
  const name = document.getElementById('user-badge-name');
  if (user.role === 'admin') {
    dot.style.background = '#f59e0b'; name.textContent = '관리자';
  } else if (user.actors && user.actors.length === 1) {
    const ac = ACTORS[user.actors[0]];
    dot.style.background = ac ? ac.color : '#3b82f6';
    name.textContent = user.actors[0];
  } else {
    dot.style.background = '#3b82f6'; name.textContent = user.label || user.id;
  }

  // FAB visibility (only if can edit)
  document.getElementById('fab').classList.toggle('hidden', !canEdit());

  // Set initial actor filter
  if (user.role !== 'admin' && user.actors && user.actors.length === 1) {
    state.selectedActor = user.actors[0];
  } else {
    state.selectedActor = 'all';
  }

  buildActorFilter();
  renderCurrentView();
  if (state.apiUrl) syncFromServer();
}

// ═══════════════════════════════════════════════════
//  ACTOR FILTER BAR
// ═══════════════════════════════════════════════════
function buildActorFilter() {
  const user = state.currentUser;
  const container = document.getElementById('actor-filter');

  // Which actors can this user see?
  let visibleActors;
  if (user.role === 'admin' || !user.actors || user.actors.length === 0) {
    visibleActors = ACTOR_LIST;
  } else {
    visibleActors = user.actors;
  }

  let html = '';
  if (visibleActors.length > 1) {
    html += `<div class="actor-chip" data-actor="all" onclick="filterActor('all')"
      style="background:var(--bg3);border-color:var(--accent);color:var(--accent);">전체</div>`;
  }
  visibleActors.forEach(actor => {
    const ac = ACTORS[actor];
    const isActive = state.selectedActor === actor;
    html += `<div class="actor-chip" data-actor="${actor}" onclick="filterActor('${actor}')"
      style="background:${ac.bg.replace('0.85','0.15')};color:${ac.color};border-color:${isActive ? ac.color : 'var(--border)'};">${actor}</div>`;
  });
  container.innerHTML = html;
  updateFilterHighlight();
}

function filterActor(actor) {
  state.selectedActor = actor;
  updateFilterHighlight();
  renderCurrentView();
}

function updateFilterHighlight() {
  document.querySelectorAll('.actor-chip').forEach(chip => {
    const a = chip.dataset.actor;
    const isActive = a === state.selectedActor;
    if (a === 'all') {
      chip.style.borderColor = isActive ? 'var(--accent)' : 'var(--border)';
      chip.style.color = isActive ? 'var(--accent)' : 'var(--text3)';
    } else {
      const ac = ACTORS[a];
      chip.style.borderColor = isActive ? ac.color : 'var(--border)';
    }
  });
}

// ═══════════════════════════════════════════════════
//  CALENDAR RENDERING
// ═══════════════════════════════════════════════════
function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function getVisibleActors() {
  const user = state.currentUser;
  if (!user) return [];
  if (user.role === 'admin' || !user.actors || user.actors.length === 0) return ACTOR_LIST;
  return user.actors;
}

function getFilteredEvents() {
  const visible = getVisibleActors();
  return state.events.filter(e => {
    if (!visible.includes(e.actor)) return false;
    if (state.selectedActor !== 'all' && e.actor !== state.selectedActor) return false;
    return true;
  });
}

function getEventsForDate(dateStr) {
  return getFilteredEvents().filter(e => e.date === dateStr);
}

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  const today = dateKey(new Date());
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent = `${state.year}년 ${MONTHS[state.month]}`;

  // Build days array (Mon start)
  const days = [];
  const first = new Date(state.year, state.month, 1);
  let startDow = first.getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  for (let i = startDow - 1; i >= 0; i--) days.push({ date: new Date(state.year, state.month, -i), current: false });
  const dim = new Date(state.year, state.month + 1, 0).getDate();
  for (let d = 1; d <= dim; d++) days.push({ date: new Date(state.year, state.month, d), current: true });
  let si = 1; while (days.length % 7 !== 0) days.push({ date: new Date(state.year, state.month + 1, si++), current: false });

  let html = '';
  days.forEach(({ date, current }) => {
    const key = dateKey(date);
    const events = getEventsForDate(key);
    const isToday = key === today;
    const dow = date.getDay(); // 0=Sun,6=Sat
    let cls = 'cal-day' + (!current ? ' other-month' : '') + (isToday ? ' today' : '');
    const dayColor = dow === 0 ? 'color:#f87171' : (dow === 6 ? 'color:#a78bfa' : '');
    let dots = '';
    events.slice(0, 3).forEach(ev => {
      const ac = ACTORS[ev.actor] || {};
      const isPrivate = ev.type === PRIVATE_TYPE && !isAdmin();
      const label = isPrivate ? '🔒 비공개' : `${EVENT_TYPES[ev.type]||''} ${ev.title}`;
      const dotBg = isPrivate ? 'rgba(100,116,139,0.6)' : (ac.bg||'#3b82f6');
      dots += `<div class="event-dot" style="background:${dotBg}">${label}</div>`;
    });
    if (events.length > 3) dots += `<div class="more-count">+${events.length-3}개</div>`;
    html += `<div class="${cls}" onclick="openDaySheet('${key}')">
      <span class="day-num" style="${dayColor}">${date.getDate()}</span>
      <div class="event-dots">${dots}</div>
    </div>`;
  });
  grid.innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  LIST VIEW
// ═══════════════════════════════════════════════════
function renderList() {
  const container = document.getElementById('list-container');
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent = `${state.year}년 ${MONTHS[state.month]}`;

  const events = getFilteredEvents()
    .filter(e => { const d = new Date(e.date); return d.getFullYear()===state.year && d.getMonth()===state.month; })
    .sort((a,b) => a.date !== b.date ? a.date.localeCompare(b.date) : (a.startTime||'').localeCompare(b.startTime||''));

  if (!events.length) { container.innerHTML = '<div class="no-events" style="padding:40px 0;">이번 달 일정이 없습니다</div>'; return; }

  const groups = {};
  events.forEach(e => { if (!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });
  const DOW=['일','월','화','수','목','금','토'];
  let html='';
  Object.keys(groups).sort().forEach(ds => {
    const d=new Date(ds);
    html+=`<div class="list-date-group"><div class="list-date-label">${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})</div>`;
    groups[ds].forEach(ev => {
      const ac=ACTORS[ev.actor]||{};
      const t=ev.startTime?(ev.endTime?`${ev.startTime}~${ev.endTime}`:ev.startTime):'';
      const isPrivate = ev.type === PRIVATE_TYPE && !isAdmin();
      html+=`<div class="list-event-card" onclick="openDaySheet('${ev.date}')">
        <div class="list-event-bar" style="background:${isPrivate?'#64748b':ac.color||'#3b82f6'}"></div>
        <div class="list-event-content">
          <div class="list-event-title" style="${isPrivate?'color:var(--text3)':''}">${isPrivate?'🔒 비공개 일정':`${EVENT_TYPES[ev.type]||''} ${ev.title}`}</div>
          <div class="list-event-meta">${isPrivate?ev.actor:`${ev.actor}${t?' · '+t:''}${ev.location?' · 📍'+ev.location:''}`}</div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

function renderCurrentView() {
  if (state.view==='calendar') renderCalendar(); else renderList();
}

function setView(v) {
  state.view=v;
  document.getElementById('calendar-view').style.display=v==='calendar'?'':'none';
  document.getElementById('list-view').style.display=v==='list'?'':'none';
  document.getElementById('btn-cal-view').classList.toggle('active',v==='calendar');
  document.getElementById('btn-list-view').classList.toggle('active',v==='list');
  renderCurrentView();
}

function changeMonth(d) {
  state.month+=d;
  if(state.month>11){state.month=0;state.year++;}
  if(state.month<0){state.month=11;state.year--;}
  renderCurrentView();
}
function goToday() {
  state.year=new Date().getFullYear(); state.month=new Date().getMonth();
  renderCurrentView();
}

// ═══════════════════════════════════════════════════
//  DAY DETAIL SHEET
// ═══════════════════════════════════════════════════
let currentDayKey = null;
function openDaySheet(ds) {
  currentDayKey = ds;
  const d = new Date(ds);
  const DOW=['일','월','화','수','목','금','토'];
  document.getElementById('day-sheet-title').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`;
  renderDayBody(ds);
  showSheet('day-sheet');
}

function renderDayBody(ds) {
  const body = document.getElementById('day-sheet-body');
  const events = getEventsForDate(ds).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));

  if (!events.length) {
    body.innerHTML=`<div class="no-events">등록된 일정이 없습니다${canEdit()?`<br><br>
      <button class="btn-submit" style="max-width:200px;margin:0 auto;display:block;font-size:13px;padding:10px;"
        onclick="closeDaySheet();openAddSheet('${ds}')">+ 일정 추가</button>`:''}</div>`;
    return;
  }

  let html='';
  events.forEach(ev => {
    const ac=ACTORS[ev.actor]||{};
    const t=ev.startTime?(ev.endTime?`${ev.startTime} ~ ${ev.endTime}`:ev.startTime):'';
    const userCanEdit = canEdit() && (isAdmin() || (state.currentUser.actors||[]).includes(ev.actor));
    const isPrivate = ev.type === PRIVATE_TYPE && !isAdmin();

    if (isPrivate) {
      // 비공개: 담당자에게는 존재만 알림, 세부내용 숨김
      html+=`<div class="event-card" style="border-left-color:#64748b;background:var(--bg3);">
        <div class="event-card-actor" style="color:#64748b;">
          <span style="width:7px;height:7px;border-radius:50%;background:#64748b;display:inline-block;"></span> ${ev.actor}
        </div>
        <div class="event-card-title" style="color:var(--text3);">🔒 비공개 일정</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">관리자만 내용을 열람할 수 있습니다</div>
      </div>`;
    } else {
      html+=`<div class="event-card" style="border-left-color:${ac.color||'#3b82f6'}">
        <div class="event-card-actor" style="color:${ac.color||'#3b82f6'}">
          <span style="width:7px;height:7px;border-radius:50%;background:${ac.color};display:inline-block;"></span> ${ev.actor}
        </div>
        <div class="event-card-title">${EVENT_TYPES[ev.type]||''} ${ev.title}</div>
        <div class="event-card-meta">
          ${t?`<span>🕐 ${t}</span>`:''}
          ${ev.location?`<span>📍 ${ev.location}</span>`:''}
          ${ev.type?`<span>${EVENT_TYPES[ev.type]||''} ${ev.type}</span>`:''}
        </div>
        ${ev.memo?`<div style="margin-top:6px;font-size:12px;color:var(--text3);line-height:1.5;">📝 ${ev.memo}</div>`:''}
        ${userCanEdit?`<div class="event-card-actions">
          <button class="btn-edit" onclick="closeDaySheet();openEditSheet('${ev.id}')">✏️ 수정</button>
          <button class="btn-delete" onclick="deleteEvent('${ev.id}','${ds}')">🗑 삭제</button>
        </div>`:''}
      </div>`;
    }
  });
  if (canEdit()) {
    html+=`<button class="btn-submit" style="font-size:13px;padding:10px;margin-top:8px;"
      onclick="closeDaySheet();openAddSheet('${ds}')">+ 이 날에 일정 추가</button>`;
  }
  body.innerHTML=html;
}

function deleteEvent(id, ds) {
  if (!confirm('이 일정을 삭제하시겠습니까?')) return;
  state.events=state.events.filter(e=>e.id!==id);
  saveEvents();
  renderCurrentView();
  renderDayBody(ds);
  showToast('삭제되었습니다');
}
function closeDaySheet() { hideSheet('day-sheet'); }

// ═══════════════════════════════════════════════════
//  FORM
// ═══════════════════════════════════════════════════
let editingId=null;

function buildFormActorGrid() {
  const user=state.currentUser;
  const allowed=isAdmin()?ACTOR_LIST:(user.actors||ACTOR_LIST);
  let html='';
  ACTOR_LIST.forEach(actor=>{
    const ac=ACTORS[actor]; const ok=allowed.includes(actor);
    html+=`<button type="button" class="actor-select-btn${ok?'':' disabled'}" data-actor="${actor}"
      onclick="${ok?`selectFormActor('${actor}')`:'showToast(\"권한이 없습니다\")'}">${actor}</button>`;
  });
  document.getElementById('form-actor-grid').innerHTML=html;
}

function openAddSheet(ds) {
  if (!canEdit()) { showToast('편집 권한이 없습니다'); return; }
  editingId=null;
  document.getElementById('form-event-id').value='';
  document.getElementById('form-sheet-title').textContent='일정 추가';
  document.getElementById('form-submit-btn').textContent='일정 추가';
  document.getElementById('event-form').reset();
  document.querySelectorAll('.actor-select-btn').forEach(b=>{b.style.background='';b.style.borderColor='';b.style.color='';});
  document.querySelectorAll('.type-select-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('form-actor').value='';
  document.getElementById('form-type').value='';
  buildFormActorGrid();

  const user=state.currentUser;
  // Auto-select actor if single-actor user
  if (!isAdmin() && user.actors && user.actors.length===1) selectFormActor(user.actors[0]);
  else if (state.selectedActor!=='all') selectFormActor(state.selectedActor);

  document.getElementById('form-date').value=ds||dateKey(new Date());
  showSheet('form-sheet');
}

function openEditSheet(id) {
  if (!canEdit()) return;
  const ev=state.events.find(e=>e.id===id); if(!ev) return;
  editingId=id;
  document.getElementById('form-event-id').value=id;
  document.getElementById('form-sheet-title').textContent='일정 수정';
  document.getElementById('form-submit-btn').textContent='수정 완료';
  document.querySelectorAll('.actor-select-btn').forEach(b=>{b.style.background='';b.style.borderColor='';b.style.color='';});
  document.querySelectorAll('.type-select-btn').forEach(b=>b.classList.remove('selected'));
  buildFormActorGrid();
  selectFormActor(ev.actor);
  document.getElementById('form-date').value=ev.date;
  if(ev.type) selectFormType(ev.type);
  document.getElementById('form-title').value=ev.title||'';
  document.getElementById('form-start-time').value=ev.startTime||'';
  document.getElementById('form-end-time').value=ev.endTime||'';
  document.getElementById('form-location').value=ev.location||'';
  document.getElementById('form-memo').value=ev.memo||'';
  showSheet('form-sheet');
}

function selectFormActor(actor) {
  document.getElementById('form-actor').value=actor;
  document.querySelectorAll('.actor-select-btn').forEach(b=>{
    const a=b.dataset.actor; const sel=a===actor;
    const ac=ACTORS[a]||{};
    b.style.background=sel?ac.bg?.replace('0.85','0.2')||'var(--bg4)':'';
    b.style.borderColor=sel?ac.color||'var(--accent)':'var(--border)';
    b.style.color=sel?ac.color||'var(--accent)':(b.classList.contains('disabled')?'var(--text3)':'var(--text2)');
  });
}
function selectFormType(type) {
  document.getElementById('form-type').value=type;
  document.querySelectorAll('.type-select-btn').forEach(b=>b.classList.toggle('selected',b.dataset.type===type));
}

function submitEventForm(e) {
  e.preventDefault();
  const actor=document.getElementById('form-actor').value;
  const type=document.getElementById('form-type').value;
  const date=document.getElementById('form-date').value;
  const title=document.getElementById('form-title').value.trim();
  if (!actor) { showToast('배우를 선택해주세요'); return; }
  if (!type)  { showToast('일정 유형을 선택해주세요'); return; }
  if (!title) { showToast('제목을 입력해주세요'); return; }

  const ev={
    id: editingId||'ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    actor, date, type, title,
    startTime:document.getElementById('form-start-time').value,
    endTime:document.getElementById('form-end-time').value,
    location:document.getElementById('form-location').value.trim(),
    memo:document.getElementById('form-memo').value.trim(),
    updatedAt:new Date().toISOString()
  };

  if (editingId) {
    const idx=state.events.findIndex(e=>e.id===editingId);
    if(idx!==-1) state.events[idx]=ev;
    showToast('수정되었습니다');
  } else {
    state.events.push(ev);
    showToast('일정이 추가되었습니다');
  }
  saveEvents();
  closeFormSheet();
  const d=new Date(ev.date);
  state.year=d.getFullYear(); state.month=d.getMonth();
  renderCurrentView();
}
function closeFormSheet() { hideSheet('form-sheet'); }

// ═══════════════════════════════════════════════════
//  USER MENU
// ═══════════════════════════════════════════════════
function openUserMenu() {
  const user=state.currentUser;
  const roleBadge=user.role==='admin'?'<span class="badge-admin">관리자</span>':
    user.role==='viewer'?'<span class="badge-viewer">뷰어</span>':'<span class="badge-actor">담당자</span>';

  document.getElementById('user-menu-title').textContent=`${user.id} ${roleBadge.includes('관리자')?'👑':''}`;

  let html=`<div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:16px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:4px;">${user.id} ${roleBadge}</div>
    <div style="font-size:12px;color:var(--text3);">${user.label||user.id}`;
  if(user.actors && user.actors.length) html+=` · ${user.actors.join(', ')} 담당`;
  html+=`</div></div>`;

  html+=`<div class="menu-item" onclick="hideSheet('user-menu-sheet');openChangePw()">
    <span class="menu-icon">🔒</span> 비밀번호 변경 <span class="menu-arrow">›</span></div>`;

  if (isAdmin()) {
    html+=`<div class="menu-item" onclick="hideSheet('user-menu-sheet');openAdmin()">
      <span class="menu-icon">👑</span> 계정 관리 <span class="menu-arrow">›</span></div>`;
  }

  html+=`<div class="menu-item danger" onclick="logout()">
    <span class="menu-icon">🚪</span> 로그아웃</div>`;

  document.getElementById('user-menu-body').innerHTML=html;
  showSheet('user-menu-sheet');
}
function closeUserMenu() { hideSheet('user-menu-sheet'); }

// ═══════════════════════════════════════════════════
//  CHANGE PASSWORD
// ═══════════════════════════════════════════════════
function openChangePw() {
  document.getElementById('pw-current').value='';
  document.getElementById('pw-new').value='';
  document.getElementById('pw-confirm').value='';
  document.getElementById('pw-error').textContent='';
  showSheet('changepw-sheet');
}

function changePassword() {
  const cur=document.getElementById('pw-current').value;
  const nw=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-confirm').value;
  const errEl=document.getElementById('pw-error');
  const user=state.currentUser;

  if (user.pw!==cur) { errEl.textContent='현재 비밀번호가 올바르지 않습니다'; return; }
  if (nw.length<4) { errEl.textContent='비밀번호는 4자 이상이어야 합니다'; return; }
  if (nw!==cf) { errEl.textContent='새 비밀번호가 일치하지 않습니다'; return; }

  const idx=state.users.findIndex(u=>u.id===user.id);
  if(idx!==-1) { state.users[idx].pw=nw; state.currentUser.pw=nw; saveUsers(); }
  hideSheet('changepw-sheet');
  showToast('비밀번호가 변경되었습니다');
}

// ═══════════════════════════════════════════════════
//  ADMIN PANEL
// ═══════════════════════════════════════════════════
function openAdmin() {
  renderAdminPanel();
  showSheet('admin-sheet');
}

function renderAdminPanel() {
  const roleBadgeHtml = u =>
    u.role==='admin'?'<span class="badge-admin">관리자</span>':
    u.role==='viewer'?'<span class="badge-viewer">뷰어</span>':'<span class="badge-actor">담당자</span>';

  let html=`<div class="admin-section">
    <div class="admin-section-title">👥 계정 목록</div>`;

  state.users.forEach(u=>{
    const ac=u.actors&&u.actors.length===1?ACTORS[u.actors[0]]:{color:'#64748b'};
    const isSelf=u.id===state.currentUser.id;
    html+=`<div class="user-row">
      <div class="user-row-dot" style="background:${ac.color}"></div>
      <div class="user-row-info">
        <div class="user-row-name">${u.id} ${roleBadgeHtml(u)} ${isSelf?'<span style="font-size:10px;color:var(--text3)">(나)</span>':''}</div>
        <div class="user-row-role">${u.label||u.id}${u.actors&&u.actors.length?' · '+u.actors.join(', '):''}${u.canEdit?'':' · 읽기전용'}</div>
      </div>
      <div class="user-row-actions">
        ${!isSelf?`<button class="btn-small danger" onclick="adminDeleteUser('${u.id}')">삭제</button>`:''}
      </div>
    </div>`;
  });

  html+=`</div>
  <div class="admin-section">
    <div class="admin-section-title">➕ 계정 추가</div>
    <div class="add-user-form">
      <div class="form-section">
        <label class="form-label">아이디</label>
        <input type="text" class="form-input" id="new-user-id" placeholder="영문/숫자">
      </div>
      <div class="form-section">
        <label class="form-label">비밀번호</label>
        <input type="text" class="form-input" id="new-user-pw" placeholder="초기 비밀번호">
      </div>
      <div class="form-section">
        <label class="form-label">이름/설명</label>
        <input type="text" class="form-input" id="new-user-label" placeholder="예: LMH 담당">
      </div>
      <div class="form-section">
        <label class="form-label">권한</label>
        <select class="form-select" id="new-user-role" onchange="toggleActorPick(this.value)">
          <option value="actor">담당자 (특정 배우만)</option>
          <option value="admin">관리자 (전체)</option>
          <option value="viewer">뷰어 (전체 보기만)</option>
        </select>
      </div>
      <div class="form-section" id="new-user-actors-section">
        <label class="form-label">담당 배우</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;" id="new-user-actors">
          ${ACTOR_LIST.map(a=>`<label style="display:flex;align-items:center;gap:4px;font-size:13px;">
            <input type="checkbox" value="${a}" style="accent-color:${ACTORS[a].color}"> ${a}</label>`).join('')}
        </div>
      </div>
      <div class="form-section">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="new-user-canedit" checked style="accent-color:var(--accent)">
          편집 가능 (체크 해제 시 읽기 전용)
        </label>
      </div>
      <button class="btn-submit" onclick="adminAddUser()">계정 추가</button>
    </div>
  </div>`;

  document.getElementById('admin-sheet-body').innerHTML=html;
}

function toggleActorPick(role) {
  document.getElementById('new-user-actors-section').style.display=role==='actor'?'':'none';
}

function adminAddUser() {
  const id=document.getElementById('new-user-id').value.trim();
  const pw=document.getElementById('new-user-pw').value.trim();
  const label=document.getElementById('new-user-label').value.trim();
  const role=document.getElementById('new-user-role').value;
  const canEditVal=document.getElementById('new-user-canedit').checked;
  const actors=role==='actor'?
    [...document.querySelectorAll('#new-user-actors input:checked')].map(c=>c.value):[];

  if (!id||!pw) { showToast('아이디와 비밀번호를 입력해주세요'); return; }
  if (state.users.find(u=>u.id===id)) { showToast('이미 존재하는 아이디입니다'); return; }
  if (role==='actor'&&actors.length===0) { showToast('담당 배우를 선택해주세요'); return; }

  state.users.push({ id, pw, role, actors, canEdit:canEditVal, label:label||id });
  saveUsers();
  showToast(`${id} 계정이 추가되었습니다`);
  renderAdminPanel();
}

function adminDeleteUser(id) {
  if (!confirm(`"${id}" 계정을 삭제하시겠습니까?`)) return;
  state.users=state.users.filter(u=>u.id!==id);
  saveUsers();
  showToast('삭제되었습니다');
  renderAdminPanel();
}

// ═══════════════════════════════════════════════════
//  SERVER SYNC (Google Apps Script)
// ═══════════════════════════════════════════════════
async function syncFromServer() {
  if (!state.apiUrl) return;
  try {
    const res=await fetch(state.apiUrl+'?action=load');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(Array.isArray(data.events)) { state.events=data.events; saveEvents(); renderCurrentView(); }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
//  SHEET HELPERS
// ═══════════════════════════════════════════════════
function showSheet(id) {
  document.getElementById('overlay').classList.add('visible');
  document.getElementById(id).classList.add('visible');
  document.body.style.overflow='hidden';
}
function hideSheet(id) {
  document.getElementById(id).classList.remove('visible');
  if(!document.querySelector('.bottom-sheet.visible')) {
    document.getElementById('overlay').classList.remove('visible');
    document.body.style.overflow='';
  }
}
function closeAllSheets() {
  document.querySelectorAll('.bottom-sheet').forEach(s=>s.classList.remove('visible'));
  document.getElementById('overlay').classList.remove('visible');
  document.body.style.overflow='';
}

// Swipe-down to close
document.querySelectorAll('.bottom-sheet').forEach(sheet=>{
  let ty=0;
  sheet.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
  sheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ty>80)hideSheet(sheet.id);},{passive:true});
});

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastTimer=null;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
loadAll();
if (tryAutoLogin()) startApp();
else document.getElementById('login-screen').style.display='flex';

// Enter key on login
document.getElementById('login-pw').addEventListener('keydown', e => {
  if (e.key==='Enter') doLogin();
});
</script>
