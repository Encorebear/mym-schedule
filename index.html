async function syncFromServer(showIndicator) {
  if (!state.apiUrl) return;
  // 이미 동기화 진행 중이면 무시 (race condition 방지)
  if (syncInProgress) {
    if (showIndicator) showToast('🔄 이미 동기화 중입니다...');
    return;
  }
  syncInProgress = true;
  // 동기화 직전 스냅샷 (데이터 손실 대비)
  saveSnapshot('동기화 전');
  if (showIndicator) showToast('🔄 불러오는 중...');
  try {
    const tok = encodeURIComponent(state.sessionToken || '');
    const res = await fetch(state.apiUrl + '?action=load&sessionToken=' + tok + '&t=' + Date.now());
    const data = JSON.parse(await res.text());
    if (data.error === 'unauthorized') { if (showIndicator) showToast('⚠️ 세션 만료. 다시 로그인해주세요.'); logout(); return; }
    if (data.error) throw new Error(data.error);
    if (Array.isArray(data.events)) {
      if (data.events.length === 0 && state.events.length > 0) {
        // 서버가 비어있고 로컬에 데이터 있으면 → 로컬 보존 + 서버에 업로드
        await pushAllToServer(false);
        if (showIndicator) showToast('✅ 로컬 데이터 서버 저장 완료 (' + state.events.length + '개)');
      } else {
        // 서버 스키마 정규화: 구버전 GAS가 반환하는 필드명 통일
        const normalized = data.events.map(ev => {
          // actors(복수) → actor(단수) 변환 (배열이면 첫 번째 요소만 사용)
          if (!ev.actor && ev.actors) ev.actor = Array.isArray(ev.actors) ? ev.actors[0] : ev.actors;
          // id 없으면 생성
          if (!ev.id) ev.id = 'sv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
          // staff가 객체로 반환된 경우 JSON 문자열로 변환 (initStaffTags/formatStaffDisplay 호환)
          if (ev.staff && typeof ev.staff !== 'string') ev.staff = JSON.stringify(ev.staff);
          return ev;
        });
        // 중복 id 제거 (GAS 시트에 중복 행이 있는 경우 방어)
        const seen = new Set();
        const deduped = normalized.filter(ev => {
          if (seen.has(ev.id)) return false;
          seen.add(ev.id);
          return true;
        });
        const hadDuplicates = deduped.length < normalized.length;
        if (hadDuplicates) {
          console.log('[sync] 중복 일정 감지: 서버 ' + normalized.length + '개 → 중복 제거 후 ' + deduped.length + '개');
        }
        // 안전 체크: 서버가 완전히 비어있으면 로컬 보존
        const localCount = state.events.length;
        if (deduped.length === 0 && localCount > 0) {
          console.warn('[sync] 서버 데이터 없음, 로컬 데이터 보존 (' + localCount + '개)');
          if (showIndicator) showToast('⚠️ 서버에 데이터 없음. 로컬 데이터 유지 중...');
          return;
        }
        // 병합: 서버 + 로컬 스마트 병합
        // - 서버에만 있는 이벤트 → 추가
        // - 로컬에만 있는 이벤트 → 보존 (서버 미반영 신규 이벤트)
        // - 양쪽에 모두 있는 이벤트 → updatedAt 비교해서 더 최신 버전 사용
        //   (완료처리, 수정 등이 서버에 반영되기 전 sync해도 로컬 변경 보존)
        const localMap = {};
        state.events.forEach(ev => { if (ev.id) localMap[ev.id] = ev; });
        const serverIds = new Set(deduped.map(ev => ev.id));

        const merged = deduped.map(serverEv => {
          const localEv = localMap[serverEv.id];
          if (!localEv) return serverEv; // 서버에만 있음 → 서버 버전
          // 양쪽에 있으면 updatedAt 비교
          const serverTime = serverEv.updatedAt || '';
          const localTime  = localEv.updatedAt  || '';
          return localTime > serverTime ? localEv : serverEv;
        });

        // 로컬에만 있는 이벤트(서버 미반영) 추가
        const localOnlyEvents = state.events.filter(ev => ev.id && !serverIds.has(ev.id));
        if (localOnlyEvents.length > 0) {
          console.log('[sync] 로컬 전용 이벤트 ' + localOnlyEvents.length + '개 병합 보존');
          merged.push(...localOnlyEvents);
        }

        state.events = merged;
        saveEvents();
        renderCurrentView();
        const extra = (hadDuplicates ? ', 중복 ' + (normalized.length - deduped.length) + '개 정리' : '') +
                      (localOnlyEvents.length > 0 ? ', 로컬 ' + localOnlyEvents.length + '개 병합' : '');
        if (showIndicator) showToast('✅ 완료 (' + merged.length + '개' + extra + ')');
      }
    }
  } catch(e) {
    if (showIndicator) showToast('❌ 실패: ' + e.message);
  } finally {
    syncInProgress = false; // 성공/실패 무관하게 락 해제
  }
}

async function pushAllToServer(showIndicator) {
  if (!state.apiUrl) return false;
  if (showIndicator) showToast('📤 서버에 저장 중...');
  try {
    const res = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'save', sessionToken: state.sessionToken||'', events: state.events })
    });
    const data = JSON.parse(await res.text());
    if (showIndicator) showToast(data.ok ? '✅ 서버에 저장됐습니다 (' + state.events.length + '개)' : '❌ 저장 실패');
    return !!data.ok;
  } catch(e) {
    if (showIndicator) showToast('❌ 저장 실패: ' + e.message);
    return false;
  }
}

}

function calcTimeHoursStr(start, end) {
  if (!start || !end) return '';
  var s = start.split(':').map(Number), e = end.split(':').map(Number);
  var diff = (e[0]*60+e[1]) - (s[0]*60+s[1]);
  if (diff <= 0) diff += 1440;
  var h = diff / 60;
  return h === Math.floor(h) ? String(h) : h.toFixed(1);
}

async function generateExcel() {
  if (typeof ExcelJS === 'undefined') {
    showToast('❌ 라이브러리 로딩 중... 잠시 후 다시 시도해주세요');
    return;
  }
  const statusEl = document.getElementById('export-status');
  statusEl.textContent = '⏳ 생성 중...';

  const period      = document.getElementById('export-period').value;
  const year        = parseInt(document.getElementById('export-year')?.value || new Date().getFullYear());
  const selectedMonths = getSelectedExportMonths(); // 선택된 월 배열 (0-11)
  const selectedActors = getSelectedExportActors(); // 선택된 배우 배열 or null(전체)
  const staffFilter = document.getElementById('export-staff-name').value.trim().toLowerCase();
  const DOW = ['일','월','화','수','목','금','토'];
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // 월 미선택 체크
  if (period === 'month' && selectedMonths.length === 0) {
    showToast('⚠️ 월을 1개 이상 선택해주세요');
    statusEl.textContent = '';
    return;
  }

  // ── 기간 표시 문자열 ──
  let periodStr = '';
  if (period === 'month') {
    const mStr = selectedMonths.sort((a,b)=>a-b).map(m=>MONTHS[m]).join(', ');
    periodStr = year + '년 ' + mStr;
  } else if (period === 'year') periodStr = year + '년';
  else                          periodStr = '전체 기간';
  if (selectedActors)  periodStr += ' · ' + selectedActors.join(', ');
  if (staffFilter)     periodStr += ' · ' + staffFilter;

  // ── 이벤트 필터링 ──
  const _admin = isAdmin();
  let evts = state.events.filter(ev => {
    const d = new Date(ev.date);
    if (period === 'month') {
      if (d.getFullYear() !== year) return false;
      if (!selectedMonths.includes(d.getMonth())) return false;
    }
    if (period === 'year' && d.getFullYear() !== year) return false;
    if (selectedActors && !selectedActors.includes(ev.actor)) return false;
    // 비공개: 관리자는 포함, 일반유저도 포함(내용 마스킹)
    if (ev.type === PRIVATE_TYPE && staffFilter) return false; // 스텝필터 시 비공개 제외
    if (staffFilter) {
      if (!ev.staff) return false;
      try {
        const obj = JSON.parse(ev.staff);
        return STAFF_CATS.some(c => (obj[c]||[]).some(item => {
          const nm = typeof item === 'string' ? item : (item.name||'');
          return nm.toLowerCase().includes(staffFilter);
        }));
      } catch(e) { return false; }
    }
    return true;
  }).sort((a,b) => a.date !== b.date ? a.date.localeCompare(b.date) : (a.startTime||'').localeCompare(b.startTime||''));

  // ── 공통 스타일 ──
  const THIN = { style: 'thin', color: { argb: 'FFB0BEC5' } };
  const BORDER_ALL = { top: THIN, left: THIN, bottom: THIN, right: THIN };
  const HEADER_FILL = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E3A5F' } };
  const TITLE_FILL  = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0F2540' } };
  const ROW_EVEN    = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF0F5FF' } };

  function applyHeader(row, ncols) {
    row.height = 22;
    row.eachCell({ includeEmpty: true }, function(cell) {
      cell.font      = { bold: true, color: { argb: 'FFFFFFFF' }, size: 10 };
      cell.fill      = HEADER_FILL;
      cell.border    = BORDER_ALL;
      cell.alignment = { horizontal: 'center', vertical: 'middle' };
    });
  }

  function applyTitle(ws, title, sub, ncols) {
    ws.addRow([title]);
    ws.mergeCells(1, 1, 1, ncols);
    var tc = ws.getCell(1, 1);
    tc.font      = { bold: true, size: 13, color: { argb: 'FFFFFFFF' } };
    tc.fill      = TITLE_FILL;
    tc.alignment = { horizontal: 'center', vertical: 'middle' };
    tc.border    = BORDER_ALL;
    ws.getRow(1).height = 30;

    ws.addRow([sub]);
    ws.mergeCells(2, 1, 2, ncols);
    var sc = ws.getCell(2, 1);
    sc.font      = { size: 10, color: { argb: 'FFAECBEA' } };
    sc.fill      = TITLE_FILL;
    sc.alignment = { horizontal: 'center', vertical: 'middle' };
    sc.border    = BORDER_ALL;
    ws.getRow(2).height = 18;
  }

  function applyDataRow(row, rowIdx) {
    row.height = 17;
    var isEven = (rowIdx % 2 === 0);
    row.eachCell({ includeEmpty: true }, function(cell) {
      cell.border    = BORDER_ALL;
      cell.alignment = { vertical: 'middle', wrapText: false };
      if (isEven) cell.fill = ROW_EVEN;
    });
  }

  const wb = new ExcelJS.Workbook();
  wb.creator = 'Schedule';
  wb.created = new Date();

  // ══ Sheet 0: 월별 달력 (맨 앞) ═══════════════════════════
  var wsCal = wb.addWorksheet('월별달력', { views: [{ state: 'frozen', ySplit: 2 }] });

  // 표시할 월 목록
  var _calMonths = [];
  if (period === 'month') {
    _calMonths = selectedMonths.sort(function(a,b){return a-b;}).map(function(m){ return {year: year, month: m}; });
  } else if (period === 'year') {
    for (var _cm = 0; _cm < 12; _cm++) _calMonths.push({year: year, month: _cm});
  } else {
    var _ymSet = {};
    evts.forEach(function(ev) {
      var _d = new Date(ev.date);
      var _k = _d.getFullYear() + '-' + _d.getMonth();
      if (!_ymSet[_k]) _ymSet[_k] = {year: _d.getFullYear(), month: _d.getMonth()};
    });
    Object.keys(_ymSet).sort().forEach(function(k){ _calMonths.push(_ymSet[k]); });
    if (!_calMonths.length) { var _nd = new Date(); _calMonths = [{year: _nd.getFullYear(), month: _nd.getMonth()}]; }
  }

  // 날짜별 이벤트 인덱스
  var _evByDate = {};
  evts.forEach(function(ev) {
    if (!_evByDate[ev.date]) _evByDate[ev.date] = [];
    _evByDate[ev.date].push(ev);
  });

  // ── 이벤트 텍스트 최대 길이 기반 열 너비 자동 계산 ──
  // 요일별(0=월~6=일) 최대 유효 길이 추적
  var _maxEffPerDow = [0, 0, 0, 0, 0, 0, 0];
  evts.forEach(function(ev) {
    var _d2 = new Date(ev.date);
    var _dow2 = _d2.getDay(); // 0=일
    var _pos2 = _dow2 === 0 ? 6 : _dow2 - 1; // 0=월~6=일
    var _s2 = '[' + ev.actor + '] ';
    if (ev.startTime) _s2 += ev.startTime + ' ';
    if (ev.type === PRIVATE_TYPE && !_admin) { _s2 += '비공개'; }
    else { _s2 += (ev.title||''); if (ev.location) _s2 += '(@' + ev.location + ')'; }
    if (ev.manager) _s2 += ev.manager;
    var _eff2 = 0;
    for (var _i2 = 0; _i2 < _s2.length; _i2++) _eff2 += _s2.charCodeAt(_i2) > 255 ? 2 : 1;
    if (_eff2 > _maxEffPerDow[_pos2]) _maxEffPerDow[_pos2] = _eff2;
  });
  // eff → Excel 열 너비 변환 (한글기준 1eff ≈ 0.78 width, min 20, max 38)
  var _calColWidths = [{ width: 4 }];
  for (var _ci2 = 0; _ci2 < 7; _ci2++) {
    var _cw = Math.min(38, Math.max(20, Math.ceil(_maxEffPerDow[_ci2] * 0.78) + 2));
    _calColWidths.push({ width: _cw });
  }
  wsCal.columns = _calColWidths;
  // charsPerLine: 열 너비 → 유효 글자수 역산 (넉넉히 -1 보정)
  var _avgColW = _calColWidths.slice(1).reduce(function(s,c){return s+c.width;},0) / 7;
  var _cpl = Math.floor(_avgColW / 0.78) - 1;

  // 타이틀
  wsCal.addRow(['월별 스케줄', '', '', '', '', '', '', '']);
  wsCal.mergeCells(1, 1, 1, 8);
  var _calTc = wsCal.getCell(1, 1);
  _calTc.font = { bold: true, size: 13, color: { argb: 'FFFFFFFF' } };
  _calTc.fill = TITLE_FILL; _calTc.border = BORDER_ALL;
  _calTc.alignment = { horizontal: 'center', vertical: 'middle' };
  wsCal.getRow(1).height = 28;

  wsCal.addRow([periodStr, '', '', '', '', '', '', '']);
  wsCal.mergeCells(2, 1, 2, 8);
  var _calSc = wsCal.getCell(2, 1);
  _calSc.font = { size: 10, color: { argb: 'FFAECBEA' } };
  _calSc.fill = TITLE_FILL; _calSc.border = BORDER_ALL;
  _calSc.alignment = { horizontal: 'center', vertical: 'middle' };
  wsCal.getRow(2).height = 16;

  // 텍스트 시각적 줄 수 추정 (한글=2, ASCII=1, 빈 줄=1)
  function _visLines(text, charsPerLine) {
    if (!text) return 0;
    return text.split('\n').reduce(function(sum, line) {
      if (line === '') return sum + 1; // 빈 줄도 1행
      var eff = 0;
      for (var i = 0; i < line.length; i++) eff += line.charCodeAt(i) > 255 ? 2 : 1;
      return sum + Math.max(1, Math.ceil(eff / charsPerLine));
    }, 0);
  }

  _calMonths.forEach(function(ym) {
    var _yr = ym.year, _mo = ym.month;
    var _firstDay = new Date(_yr, _mo, 1);
    var _lastDay  = new Date(_yr, _mo + 1, 0);
    var _dow1     = _firstDay.getDay(); // 0=일
    var _fromMon  = _dow1 === 0 ? 6 : _dow1 - 1;
    var _wkCount  = Math.ceil((_fromMon + _lastDay.getDate()) / 7);

    // 요일 헤더
    var _hRow = wsCal.addRow(['', '월', '화', '수', '목', '금', '토', '일']);
    _hRow.height = 18;
    _hRow.eachCell({ includeEmpty: true }, function(cell, ci) {
      if (ci === 1) { cell.border = BORDER_ALL; return; }
      cell.font = { bold: true, size: 10, color: { argb: (ci === 7 || ci === 8) ? 'FFEE3333' : 'FFFFFFFF' } };
      cell.fill = HEADER_FILL; cell.border = BORDER_ALL;
      cell.alignment = { horizontal: 'center', vertical: 'middle' };
    });

    var _cur = new Date(_yr, _mo, 1 - _fromMon);
    var _mStart = wsCal.rowCount + 1;

    for (var _wk = 0; _wk < _wkCount; _wk++) {
      var _dVals = [''], _eVals = [''], _maxL = 1;

      for (var _d = 0; _d < 7; _d++) {
        var _inMo = (_cur.getFullYear() === _yr && _cur.getMonth() === _mo);
        var _dk   = _cur.getFullYear() + '-'
          + String(_cur.getMonth()+1).padStart(2,'0') + '-'
          + String(_cur.getDate()).padStart(2,'0');
        _dVals.push(_inMo
          ? String(_cur.getMonth()+1).padStart(2,'0') + '/' + String(_cur.getDate()).padStart(2,'0')
          : '');
        var _dEvts = (_inMo && _evByDate[_dk]) ? _evByDate[_dk] : [];
        var _lines = _dEvts.map(function(ev) {
          var _s = '[' + ev.actor + '] ';
          if (ev.startTime) _s += ev.startTime + ' ';
          if (ev.type === PRIVATE_TYPE && !_admin) {
            _s += '비공개';
          } else {
            _s += (ev.title||'');
            if (ev.location) _s += '(@' + ev.location + ')';
          }
          if (ev.manager) _s += ev.manager;
          return _s;
        });
        // 이벤트 사이 빈 줄로 구분 (여러 배우/일정 시각적 분리)
        _eVals.push(_lines.join('\n\n'));
        if (_lines.length > _maxL) _maxL = _lines.length;
        _cur.setDate(_cur.getDate() + 1);
      }

      // 날짜 행
      var _dr = wsCal.addRow(_dVals);
      _dr.height = 13;
      _dr.eachCell({ includeEmpty: true }, function(cell, ci) {
        if (ci === 1) return;
        cell.font = { bold: true, size: 9, color: { argb: (ci === 7 || ci === 8) ? 'FFEE3333' : 'FF222222' } };
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDDE4F0' } };
        cell.border = BORDER_ALL;
        cell.alignment = { horizontal: 'center', vertical: 'middle' };
      });

      // 이벤트 행 — 셀별 실제 줄 수 계산 (한글 2바이트, 열너비 20자 기준)
      var _maxVisL = 1;
      for (var _vi = 1; _vi <= 7; _vi++) {
        var _vl = _visLines(_eVals[_vi] || '', _cpl);
        if (_vl > _maxVisL) _maxVisL = _vl;
      }
      var _er = wsCal.addRow(_eVals);
      _er.height = Math.max(26, _maxVisL * 13 + 8);
      _er.eachCell({ includeEmpty: true }, function(cell, ci) {
        if (ci === 1) return;
        cell.font = { size: 8 }; cell.border = BORDER_ALL;
        cell.alignment = { horizontal: 'left', vertical: 'top', wrapText: true };
      });
    }

    var _mEnd = wsCal.rowCount;

    // 월 레이블 병합
    if (_mEnd >= _mStart) {
      if (_mEnd > _mStart) wsCal.mergeCells(_mStart, 1, _mEnd, 1);
      var _mc = wsCal.getCell(_mStart, 1);
      _mc.value = MONTHS[_mo];
      _mc.font = { bold: true, size: 10, color: { argb: 'FFFFFFFF' } };
      _mc.fill = HEADER_FILL; _mc.border = BORDER_ALL;
      _mc.alignment = { horizontal: 'center', vertical: 'middle', textRotation: 90 };
    }

    // 월 구분 빈 행
    var _sep = wsCal.addRow(['', '', '', '', '', '', '', '']);
    _sep.height = 5;
  });

  // ══ Sheet 1: 전체 일정 ══════════════════════════
  var ws1 = wb.addWorksheet('전체일정', { views: [{ state: 'frozen', ySplit: 3 }] });
  ws1.columns = [
    { width: 12 }, { width: 5  }, { width: 8  }, { width: 10 }, { width: 8  }, { width: 26 },
    { width: 8  }, { width: 8  }, { width: 16 }, { width: 12 }, { width: 12 },
    { width: 8  }, { width: 8  }, { width: 11 }, { width: 22 }
  ];
  applyTitle(ws1, '스케줄 — 전체일정', periodStr, 15);
  var hdr1 = ws1.addRow(['날짜','요일','배우','담당자','유형','제목','일정시작','일정종료','장소','카테고리','스텝이름','출근','퇴근','근무(h)','메모']);
  applyHeader(hdr1, 15);
  ws1.autoFilter = { from: { row: 3, column: 1 }, to: { row: 3, column: 15 } };

  var dataIdx1 = 0;
  evts.forEach(function(ev) {
    var d = new Date(ev.date);
    var isPrivateEv = (ev.type === PRIVATE_TYPE);
    // 비공개: 관리자는 전체, 일반유저는 시간·배우·매니저만
    if (isPrivateEv && !_admin) {
      var row = ws1.addRow([ev.date, DOW[d.getDay()], ev.actor, ev.manager||'', '비공개',
        '(비공개)', ev.startTime||'', ev.endTime||'', '', '', '', '', '', '', '']);
      row.height = 17;
      row.eachCell({ includeEmpty: true }, function(cell) {
        cell.border    = BORDER_ALL;
        cell.alignment = { vertical: 'middle' };
        cell.font      = { italic: true, color: { argb: 'FF888888' } };
      });
      dataIdx1++;
      return;
    }
    var base = [ev.date, DOW[d.getDay()], ev.actor, ev.manager||'', ev.type, ev.title,
                ev.startTime||'', ev.endTime||'', ev.location||''];
    var hasStaff = false;
    if (!isPrivateEv && ev.staff) {
      try {
        var obj = JSON.parse(ev.staff);
        STAFF_CATS.forEach(function(c) {
          (obj[c]||[]).forEach(function(item) {
            var nm = typeof item === 'string' ? item : (item.name||'');
            var indivSt = typeof item === 'string' ? '' : (item.startTime||'');
            var indivEn = typeof item === 'string' ? '' : (item.endTime||'');
            var indivHr = typeof item === 'string' ? '' : (item.hours !== '' && item.hours != null ? parseFloat(item.hours) : '');
            var staffMemo = typeof item === 'string' ? '' : (item.memo||'');
            if (!nm) return;
            var st = indivSt || ev.startTime || '';
            var en = indivEn || ev.endTime   || '';
            var hr = indivHr !== '' ? indivHr : (indivSt ? '' : (ev.startTime && ev.endTime ? calcTimeHoursStr(ev.startTime, ev.endTime) : ''));
            var memo = [ev.memo||'', staffMemo].filter(Boolean).join(' / ');
            var row = ws1.addRow(base.concat([c, nm, st, en, hr, memo]));
            applyDataRow(row, dataIdx1++);
            hasStaff = true;
          });
        });
      } catch(e) {}
    }
    if (!hasStaff) {
      var row = ws1.addRow(base.concat(['','','','','', ev.memo||'']));
      applyDataRow(row, dataIdx1++);
    }
  });

  // ══ Sheet 2: 일정별 요약 (일정 1행, 스텝 집계) ═════════════════
  var ws2 = wb.addWorksheet('일정별요약', { views: [{ state: 'frozen', ySplit: 3 }] });
  ws2.columns = [
    { width: 12 }, { width: 5 }, { width: 8 }, { width: 10 }, { width: 8 }, { width: 26 },
    { width: 8  }, { width: 8 }, { width: 16 }, { width: 10 }, { width: 36 },
    { width: 22 }
  ];
  applyTitle(ws2, '스케줄 — 일정별 요약', periodStr, 12);
  var hdr2 = ws2.addRow(['날짜','요일','배우','담당자','유형','제목','시작','종료','장소','동행인원','동행/스텝','메모']);
  applyHeader(hdr2, 12);
  ws2.autoFilter = { from: { row: 3, column: 1 }, to: { row: 3, column: 12 } };

  var dataIdx2 = 0;
  evts.forEach(function(ev) {
    var d = new Date(ev.date);
    var isPrivateEv = (ev.type === PRIVATE_TYPE);
    if (isPrivateEv && !_admin) {
      var row = ws2.addRow([ev.date, DOW[d.getDay()], ev.actor, ev.manager||'', '비공개',
        '(비공개)', ev.startTime||'', ev.endTime||'', '', '', '', '']);
      row.height = 17;
      row.eachCell({ includeEmpty: true }, function(cell) {
        cell.border = BORDER_ALL; cell.alignment = { vertical: 'middle' };
        cell.font = { italic: true, color: { argb: 'FF888888' } };
      });
      dataIdx2++; return;
    }
    var staffNames = [], totalHours = 0, staffCount = 0;
    if (!isPrivateEv && ev.staff) {
      try {
        var obj = JSON.parse(ev.staff);
        STAFF_CATS.forEach(function(c) {
          (obj[c]||[]).forEach(function(item) {
            var nm = typeof item === 'string' ? item : (item.name||'');
            var hr = typeof item === 'string' ? 0 : (parseFloat(item.hours)||0);
            if (!nm) return;
            staffNames.push(nm + (hr ? '(' + hr + 'h)' : ''));
            totalHours += hr;
            staffCount++;
          });
        });
      } catch(e) {}
    }
    var row = ws2.addRow([
      ev.date, DOW[d.getDay()], ev.actor, ev.manager||'', ev.type, ev.title,
      ev.startTime||'', ev.endTime||'', ev.location||'',
      staffCount || '', staffNames.join(', '),
      ev.memo||''
    ]);
    applyDataRow(row, dataIdx2++);
  });

  // ══ Sheet 3: 차량 운행 ═══════════════════════════════
  var _curUserId = state.currentUser ? state.currentUser.id : '';
  var vehicleEvts = evts.filter(function(ev) {
    if (!ev.vehicle || !ev.vehicle.trim()) return false;
    // 비공개: 관리자 또는 작성자 본인만 차량운행에 표시
    if (ev.type === PRIVATE_TYPE && !_admin && ev.createdBy !== _curUserId) return false;
    return true;
  });
  var ws3 = wb.addWorksheet('차량운행', { views: [{ state: 'frozen', ySplit: 3 }] });
  ws3.columns = [
    { width: 12 }, { width: 5 }, { width: 8 }, { width: 8 }, { width: 26 },
    { width: 8  }, { width: 8 }, { width: 20 }, { width: 22 }
  ];
  applyTitle(ws3, '스케줄 — 차량 운행', periodStr, 9);
  var hdr3 = ws3.addRow(['날짜','요일','배우','유형','제목','일정시작','일정종료','차량','메모']);
  applyHeader(hdr3, 9);

  var dataIdx3 = 0;
  vehicleEvts.forEach(function(ev) {

    var row = ws3.addRow([
      ev.date, DOW[d.getDay()], ev.actor, ev.type, ev.title,

    ]);

  if (vehicleEvts.length === 0) {
    var emptyRow = ws3.addRow(['해당 기간 차량 운행 내역 없음']);
    ws3.mergeCells(4, 1, 4, 9);

    ec.font      = { italic: true, color: { argb: 'FF888888' } };
    ec.alignment = { horizontal: 'center', vertical: 'middle' };
  }

  // ══ Sheet 4: 세차이력 ═══════════════════════════════
  var ws4 = wb.addWorksheet('세차이력', { views: [{ state: 'frozen', ySplit: 3 }] });
  ws4.columns = [
    { width: 16 }, { width: 5 }, { width: 10 }, { width: 14 },
    { width: 12 }, { width: 10 }, { width: 12 }, { width: 22 }
  ];
  applyTitle(ws4, '스케줄 — 세차이력', periodStr, 8);
  var hdr4 = ws4.addRow(['날짜','요일','차량명','번호판','세차종류','담당자','금액','메모']);
  applyHeader(hdr4, 8);
  ws4.autoFilter = { from: { row: 3, column: 1 }, to: { row: 3, column: 8 } };

  // 세차기록 기간 필터
  var washRecs = (carState.records || []).filter(function(r) {
    var d10 = carDate(r.date);
    if (!d10) return true; // 날짜 없으면 포함
    var d = new Date(d10 + 'T12:00:00');
    if (period === 'month' && (d.getFullYear() !== year || !selectedMonths.includes(d.getMonth()))) return false;
    if (period === 'year'  &&  d.getFullYear() !== year) return false;
    return true;
  }).sort(function(a,b){ return carDate(b.date).localeCompare(carDate(a.date)); });

  var dataIdx4 = 0;
  washRecs.forEach(function(r) {
    var d10 = carDate(r.date);
    var d = d10 ? new Date(d10 + 'T12:00:00') : null;
    var vDef = (typeof VEHICLES_DEF !== 'undefined' ? VEHICLES_DEF : []).find(function(v){ return v.id === r.vehicle; }) || {};
    var amountNum = parseFloat(r.amount);
    var amountStr = (!isNaN(amountNum) && amountNum > 0) ? amountNum.toLocaleString() + '원' : '';
    var row = ws4.addRow([
      d10 || r.date || '',
      d ? DOW[d.getDay()] : '',
      vDef.label || r.vehicle || '',
      r.vehicle || '',
      r.type || '',
      r.manager || '',
      amountStr,
      (r.memo && !/^\d{4}-\d{2}-\d{2}T/.test(String(r.memo))) ? r.memo : ''
    ]);
    applyDataRow(row, dataIdx4++);
  });
  if (washRecs.length === 0) {
    var emptyRow4 = ws4.addRow(['해당 기간 세차 기록 없음']);
    ws4.mergeCells(4, 1, 4, 8);
    var ec4 = ws4.getCell(4, 1);
    ec4.font = { italic: true, color: { argb: 'FF888888' } };
    ec4.alignment = { horizontal: 'center', vertical: 'middle' };
  }

  // ── 파일명 ──
  var fname = '스케줄';
  if (selectedActors)         fname += '_' + selectedActors.join(',');
  if (period === 'month')     fname += '_' + year + '년' + selectedMonths.sort((a,b)=>a-b).map(m=>m+1+'월').join(',');
  else if (period === 'year') fname += '_' + year + '년';
  else                        fname += '_전체';
  if (staffFilter)            fname += '_' + staffFilter;
  fname += '.xlsx';

  // ── 다운로드 ──
  try {
    var buffer = await wb.xlsx.writeBuffer();
    var blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = fname; a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    statusEl.textContent = '✅ ' + fname;
    showToast('✅ 엑셀 다운로드 완료');
  } catch(err) {
    statusEl.textContent = '❌ 오류: ' + err.message;
    showToast('❌ 엑셀 생성 실패');
  }
}

// ── 앱 버전 체크: 서버 version.json과 비교해 캐시 강제 갱신 ──
(async function initSW() {
  if (!('serviceWorker' in navigator)) return;

  // ── SW 업데이트 신호 수신: 새 SW가 활성화되면 자동 새로고침 ──
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'SW_UPDATED') {
      // 쿼리스트링으로 HTTP 캐시까지 우회
      const url = new URL(window.location.href);
      url.searchParams.set('_sw', Date.now());
      window.location.replace(url.toString());
    }
  });

  // ── version.json 체크: 구형 SW 잔존 시 보조 안전장치 ──
  try {
    const res = await fetch('./version.json', { cache: 'no-store' });
    const { version } = await res.json();
    const VERSION_KEY = 'mym_cached_version';
    const stored = localStorage.getItem(VERSION_KEY);
    if (stored && stored !== version) {
      // 구형 SW+캐시 삭제 후 새로고침
      localStorage.setItem(VERSION_KEY, version);
      await Promise.all([
        navigator.serviceWorker.getRegistrations()
          .then(regs => Promise.all(regs.map(r => r.unregister()))),
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
      ]);
      const url = new URL(window.location.href);
      url.searchParams.set('_sw', version);
      window.location.replace(url.toString());
      return;
    }
    localStorage.setItem(VERSION_KEY, version);
  } catch(e) {}

  // SW 등록
  navigator.serviceWorker.register('sw.js')
    .catch(err => console.log('SW 등록 실패:', err));
})();

var _dp = { el:null, targetId:null, year:0, month:0, sel:null };

function openDatePicker(inputId) {
  var val = document.getElementById(inputId).value; // YYYY-MM-DD
  var d = val ? new Date(val + 'T12:00:00') : new Date();
  _dp.targetId = inputId;
  _dp.year  = d.getFullYear();
  _dp.month = d.getMonth();
  _dp.sel   = val || null;
  _renderDP();
}

function _renderDP() {
  if (_dp.el) { try { document.body.removeChild(_dp.el); } catch(e){} }
  var MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var DOWS   = ['일','월','화','수','목','금','토'];
  var y = _dp.year, m = _dp.month;
  var first = new Date(y, m, 1).getDay();
  var dim   = new Date(y, m+1, 0).getDate();
  var today = dateKey(new Date());

  var dowHtml = DOWS.map(function(d,i){
    var c = i===0?'color:#f87171':i===6?'color:#a78bfa':'';
    return '<div class="dp-dow" style="'+c+'">'+d+'</div>';
  }).join('');

  var daysHtml = '';
  for (var e=0;e<first;e++) daysHtml += '<div class="dp-day empty"></div>';
  for (var dd=1;dd<=dim;dd++) {
    var dk = y+'-'+String(m+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    var dow = (first+dd-1)%7;
    var hol = getHoliday(dk);
    var cls = 'dp-day';
    if (dk===today)   cls+=' is-today';
    if (dk===_dp.sel) cls+=' is-sel';
    if (hol||dow===0) cls+=' is-holiday';
    else if (dow===6) cls+=' is-sat';
    daysHtml += '<div class="'+cls+'" onclick="dpSelect(\''+dk+'\')">'+dd+'</div>';
  }

  var bg = document.createElement('div');
  bg.className = 'picker-bg';
  bg.addEventListener('click', function(e){ if(e.target===bg) dpClose(); });
  bg.innerHTML = '<div class="picker-sheet">'
    +'<div class="picker-handle"></div>'
    +'<div class="picker-nav">'
    +  '<button class="picker-nav-btn" onclick="dpMove(-1)">‹</button>'
    +  '<div class="picker-month-label">'+y+'년 '+MONTHS[m]+'</div>'
    +  '<button class="picker-nav-btn" onclick="dpMove(1)">›</button>'
    +'</div>'
    +'<div class="dp-dow-row">'+dowHtml+'</div>'
    +'<div class="dp-grid">'+daysHtml+'</div>'
    +'<button onclick="dpClose()" class="picker-cancel-btn" style="width:100%;margin-top:14px;">닫기</button>'
    +'</div>';
  document.body.appendChild(bg);
  _dp.el = bg;
}

function dpMove(dir) {
  _dp.month += dir;
  if (_dp.month<0)  { _dp.month=11; _dp.year--; }
  if (_dp.month>11) { _dp.month=0;  _dp.year++; }
  _renderDP();
}

function dpSelect(dk) {
  _dp.sel = dk;
  // display as YYYY.MM.DD
  var parts = dk.split('-');
  document.getElementById(_dp.targetId).value = dk;
  // also update display to friendly format
  document.getElementById(_dp.targetId).value = dk; // keep ISO for logic
  dpClose();
}

function dpClose() {
  if (_dp.el) { try { document.body.removeChild(_dp.el); } catch(e){} _dp.el=null; }
}

var _tp = { el:null, targetId:null, h:null, mi:null, callback:null };

function openTimePicker(inputId, callback) {

  _tp.targetId = inputId;

function _renderTP() {

  }).join('');

  var bg = document.createElement('div');

  bg.addEventListener('click', function(e){ if(e.target===bg) tpClose(); });

    +'<div class="picker-handle"></div>'
    +'<div class="tp-display">'+disp+'</div>'
    +'<div class="tp-section-label">시 (0~24시)</div>'
    +'<div class="tp-grid">'+hourBtns+'</div>'
    +'<div class="tp-section-label">분</div>'
    +'<div class="tp-grid">'+minBtns+'</div>'
    +'<div class="picker-confirm-row">'
    +  '<button class="picker-cancel-btn" onclick="tpClear()">지우기</button>'
    +  '<button class="picker-cancel-btn" onclick="tpClose()">취소</button>'
    +  '<button class="picker-ok-btn" onclick="tpOK()">확인</button>'
    +'</div></div>';
  document.body.appendChild(bg);
  _tp.el = bg;
}

function tpH(v) { _tp.h=v; _renderTP(); }
function tpM(v) { _tp.mi=v; _renderTP(); }

function tpOK() {
  if (_tp.h===null||_tp.mi===null) { showToast('시간과 분을 모두 선택하세요'); return; }
  var val = String(_tp.h).padStart(2,'0')+':'+String(_tp.mi).padStart(2,'0');
  document.getElementById(_tp.targetId).value = val;
  if (_tp.targetId==='stm-start'||_tp.targetId==='stm-end') calcStaffTime();
  if (_tp.callback) _tp.callback(val);
  tpClose();
}

function tpClear() {
  document.getElementById(_tp.targetId).value = '';
  if (_tp.targetId==='stm-start'||_tp.targetId==='stm-end') calcStaffTime();
  tpClose();
}

function tpClose() {
  if (_tp.el) { try { document.body.removeChild(_tp.el); } catch(e){} _tp.el=null; }
}

// Google Sheets가 날짜를 ISO 타임스탬프로 반환하는 경우 처리
function carDate(str) {
  if (!str) return '';
  var s = String(str).trim();
  // YYYY-MM-DD 형식 추출 (ISO timestamp, 날짜 문자열 등)
  var m = s.match(/^(\d{4}-\d{2}-\d{2})/);
  return m ? m[1] : '';
}

function formatCarDate(str) {
  var d10 = carDate(str);
  if (!d10) return '날짜 없음';
  var d = new Date(d10 + 'T12:00:00');
  if (isNaN(d.getTime())) return d10;
  var DOW = ['일','월','화','수','목','금','토'];
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0') + ' (' + DOW[d.getDay()] + ')';
}

function getDaysSince(dateStr) {
  if (!dateStr) return null;
  try {
    var clean = carDate(dateStr);
    if (!clean) return null;
    var d = new Date(clean + 'T12:00:00');
    if (isNaN(d.getTime())) return null;
    var now = new Date();
    now.setHours(0,0,0,0); d.setHours(0,0,0,0);
    var days = Math.floor((now - d) / 86400000);
    return isNaN(days) ? null : days;
  } catch(e) { return null; }
}

function getDaysClass(days) {
  if (days === null) return 'days-none';
  if (days <= 7)  return 'days-fresh';
  if (days <= 14) return 'days-warn';
  return 'days-old';
}

function renderVehicleCards() {
  var html = '';
  VEHICLES_DEF.forEach(function(v) {
    var recs = carState.records.filter(function(r){ return r.vehicle === v.id; });
    recs.sort(function(a,b){ return b.date.localeCompare(a.date); });
    var lastRec = recs[0] || null;
    var days = lastRec ? getDaysSince(lastRec.date) : null;
    var dc = getDaysClass(days);
    var daysLabel = days === null ? '기록없음' : days === 0 ? '오늘' : days + '일 전';
    var lastInfo = lastRec ? formatCarDate(lastRec.date) + ' ' + (lastRec.type||'') : '기록없음';
    html += '<div class="vehicle-card" onclick="setVehFilter(\'' + v.id + '\')">'
      + '<div class="vehicle-card-icon">' + v.icon + '</div>'
      + '<div class="vehicle-card-info">'
      + '<div class="vehicle-card-plate">' + v.id + '</div>'
      + '<div class="vehicle-card-name">' + v.label + '</div>'
      + '<div class="vehicle-card-sub">마지막 세차: ' + lastInfo + '</div>'
      + '</div>'
      + '<div class="vehicle-card-days ' + dc + '">' + daysLabel + '</div>'
      + '</div>';
  });
  document.getElementById('vehicle-cards').innerHTML = html;
}

function renderVehFilterRow() {
  var btns = '<button class="veh-filter-btn' + (carState.filter==='all'?' active':'') + '" onclick="setVehFilter(\'all\')">전체</button>';
  VEHICLES_DEF.forEach(function(v) {
    btns += '<button class="veh-filter-btn' + (carState.filter===v.id?' active':'') + '" onclick="setVehFilter(\'' + v.id + '\')">' + v.label + '</button>';
  });
  document.getElementById('veh-filter-row').innerHTML = btns;
}

function setVehFilter(vehId) {
  carState.filter = vehId;
  renderVehFilterRow();
  renderVehicleCards();
  renderWashRecords();
  var title = vehId === 'all' ? '세차 기록' : (VEHICLES_DEF.find(function(v){return v.id===vehId;})||{}).label + ' 세차 기록';
  document.getElementById('wash-records-title').textContent = title;
}

function renderWashRecords() {
  var recs = carState.records.slice();
  if (carState.filter !== 'all') {
    recs = recs.filter(function(r){ return r.vehicle === carState.filter; });
  }
  recs.sort(function(a,b){
    return carDate(b.date).localeCompare(carDate(a.date)) || (b.createdAt||'').localeCompare(a.createdAt||'');
  });

  if (!recs.length) {
    document.getElementById('wash-records-list').innerHTML = '<div style="text-align:center;color:var(--text3);padding:30px 0;font-size:13px;">기록이 없습니다</div>';
    return;
  }

  var html = '';
  recs.forEach(function(r) {
    var vDef = VEHICLES_DEF.find(function(v){return v.id===r.vehicle;}) || {};
    var amountNum = parseFloat(r.amount);
    var amountStr = (r.amount !== null && r.amount !== undefined && r.amount !== '' && !isNaN(amountNum)) ? amountNum.toLocaleString() + '원' : '';
    // memo가 ISO 타임스탬프이면 표시 안 함 (GAS 컬럼 불일치 방어)
    var memoStr = (r.memo && !/^\d{4}-\d{2}-\d{2}T/.test(String(r.memo))) ? String(r.memo) : '';
    var sub = [r.manager, amountStr, memoStr].filter(Boolean).join(' · ');
    var dateDisp = formatCarDate(r.date);
    var typeStr = r.type||'기타';
    var typeClass = (typeStr==='손세차'||typeStr==='자동세차') ? typeStr : '기타';
    html += '<div class="wash-record-item">'
      + '<div class="wash-record-left">'
      + '<div class="wash-record-top">'
      + '<span class="wash-record-date">' + dateDisp + '</span>'
      + '<span class="wash-record-veh">' + (vDef.icon||'🚗') + ' ' + (vDef.label||r.vehicle) + '</span>'
      + '</div>'
      + (sub ? '<div class="wash-record-bottom">' + sub + '</div>' : '')
      + '</div>'
      + '<span class="wash-badge wb-' + typeClass + '">' + typeStr + '</span>'
      + '<button class="wash-del-btn" onclick="openWashEdit(\'' + r.id + '\')" title="수정" style="color:var(--accent);">✏️</button>'
      + '<button class="wash-del-btn" onclick="confirmDeleteWash(\'' + r.id + '\')" title="삭제">🗑</button>'
      + '</div>';
  });
  document.getElementById('wash-records-list').innerHTML = html;
}

async function submitWashForm(e) {
  e.preventDefault();
  var veh    = document.getElementById('wash-vehicle-val').value;
  var type   = document.getElementById('wash-type-val').value;
  var date   = document.getElementById('wash-date').value;
  var custom = (document.getElementById('wash-type-custom').value||'').trim();
  if (!veh)  { showToast('⚠️ 차량을 선택하세요'); return; }
  if (!type) { showToast('⚠️ 세차 종류를 선택하세요'); return; }
  if (type === '기타' && !custom) { showToast('⚠️ 기타 종류를 직접 입력하세요'); return; }
  if (!date) { showToast('⚠️ 날짜를 입력하세요'); return; }
  var finalType = (type === '기타' && custom) ? custom : type;
  var amountRaw = document.getElementById('wash-amount').value;
  var amount = amountRaw ? parseInt(amountRaw, 10) : null;

  var btn = document.getElementById('wash-submit-btn');
  btn.disabled = true;

  if (carState.editingId) {
    // 수정 모드
    var idx = carState.records.findIndex(function(x){ return x.id === carState.editingId; });
    if (idx >= 0) {
      var updated = Object.assign({}, carState.records[idx], {
        date:    date,
        vehicle: veh,
        type:    finalType,
        manager: (document.getElementById('wash-manager').value||'').trim(),
        amount:  amount,
        memo:    (document.getElementById('wash-memo').value||'').trim()
      });
      carState.records[idx] = updated;
      saveCarRecords();
      renderVehicleDashboard();
      closeWashSheet();
      showToast('✅ 수정됐습니다');
      // 서버에는 삭제 후 재추가
      await deleteCarRecordServer(carState.editingId);
      await pushCarRecord(updated);
    }
    btn.disabled = false; btn.textContent = '수정 완료';
    return;
  }

  // 신규 추가 모드
  var record = {
    id:        'cr' + Date.now() + Math.random().toString(36).slice(2,6),
    date:      date,
    vehicle:   veh,
    type:      finalType,
    manager:   (document.getElementById('wash-manager').value||'').trim(),
    amount:    amount,
    memo:      (document.getElementById('wash-memo').value||'').trim(),
    createdAt: new Date().toISOString()
  };

  btn.textContent = '저장 중...';
  carState.records.push(record);
  saveCarRecords();
  renderVehicleDashboard();
  closeWashSheet();
  showToast('✅ 세차 기록 저장됨');

  var ok = await pushCarRecord(record);
  if (!ok && state.apiUrl) showToast('⚠️ 로컬 저장 완료 (서버 동기화 실패)');
  btn.disabled = false; btn.textContent = '저장';
}

function confirmDeleteWash(id) {
  var bg = document.createElement('div');
  bg.className = 'confirm-modal-bg';
  bg.innerHTML = '<div class="confirm-modal">'
    + '<div class="confirm-modal-icon">🗑</div>'
    + '<div class="confirm-modal-title">이 세차 기록을 삭제하시겠습니까?</div>'
    + '<div class="confirm-modal-warn"><div style="text-align:center;line-height:1.7;">삭제된 기록은 <b>복구할 수 없습니다.</b></div></div>'
    + '<div class="confirm-modal-btns">'
    + '<button class="confirm-modal-cancel" id="wdel-cancel">취소</button>'
    + '<button class="confirm-modal-ok" id="wdel-ok" style="background:var(--danger);">삭제</button>'
    + '</div></div>';
  document.body.appendChild(bg);
  document.getElementById('wdel-cancel').onclick = function() { document.body.removeChild(bg); };
  bg.addEventListener('click', function(e) { if (e.target === bg) document.body.removeChild(bg); });
  document.getElementById('wdel-ok').onclick = function() {
    document.body.removeChild(bg);
    carState.records = carState.records.filter(function(r){ return r.id !== id; });
    saveCarRecords();
    renderVehicleDashboard();
    showToast('🗑 삭제됨');
    deleteCarRecordServer(id);
  };
}

// ── 일정 상세보기 모달 ──
function openEventDetail(id) {
  var ev = state.events.find(function(e){ return e.id === id; });
  if (!ev) return;
  var ac = ACTORS[ev.actor] || {};
  var t = ev.startTime ? (ev.endTime ? ev.startTime + ' ~ ' + ev.endTime : ev.startTime) : '';
  var completedAt = ev.completedAt ? new Date(ev.completedAt).toLocaleString('ko-KR') : '';

  // staff 상세 표시
  var staffDetailHtml = '';
  if (ev.staff) {
    try {
      var obj = JSON.parse(ev.staff);
      if (typeof obj === 'object' && !Array.isArray(obj)) {
        var rows = [];
        STAFF_CATS.forEach(function(c) {
          if (!obj[c] || !obj[c].length) return;
          var lines = obj[c].map(function(item) {
            var nm = typeof item === 'string' ? item : (item.name||'');
            var st = typeof item === 'object' ? (item.startTime||'') : '';
            var en = typeof item === 'object' ? (item.endTime||'') : '';
            var hr = typeof item === 'object' ? (item.hours||'') : '';
            var detail = [];
            if (st && en) detail.push(st + '~' + en);
            if (hr) detail.push(hr + 'h');
            return nm + (detail.length ? ' (' + detail.join(', ') + ')' : '');
          }).join('<br>');
          rows.push('<div class="ev-detail-staff-cat">' + c + '</div><div class="ev-detail-staff-line">' + lines + '</div>');
        });
        staffDetailHtml = rows.join('<div style="margin-top:6px;"></div>');
      }
    } catch(e) {}
  }

  var rows = '';
  if (t) rows += '<div class="ev-detail-row"><span class="ev-detail-icon">🕐</span><div><div class="ev-detail-label">시간</div><div class="ev-detail-val">' + t + '</div></div></div>';
  if (ev.location) rows += '<div class="ev-detail-row"><span class="ev-detail-icon">📍</span><div><div class="ev-detail-label">장소</div><div class="ev-detail-val">' + ev.location + '</div></div></div>';
  if (ev.vehicle) rows += '<div class="ev-detail-row"><span class="ev-detail-icon">🚗</span><div><div class="ev-detail-label">차량</div><div class="ev-detail-val">' + ev.vehicle + '</div></div></div>';
  if (staffDetailHtml) rows += '<div class="ev-detail-row"><span class="ev-detail-icon">👥</span><div style="flex:1"><div class="ev-detail-label">근무자</div>' + staffDetailHtml + '</div></div>';
  if (ev.memo) rows += '<div class="ev-detail-row"><span class="ev-detail-icon">📝</span><div><div class="ev-detail-label">메모</div><div class="ev-detail-val">' + ev.memo + '</div></div></div>';

  var html = '<div class="ev-detail-bg" id="ev-detail-bg" onclick="closeEventDetail(event)">'
    + '<div class="ev-detail-modal">'
    + '<div class="ev-detail-header">'
    + '<div>'
    + '<div style="color:' + (ac.color||'#3b82f6') + ';font-size:12px;font-weight:700;margin-bottom:6px;">'
    + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + (ac.color||'#3b82f6') + ';margin-right:5px;"></span>'
    + ev.actor + ' &nbsp;<span style="color:#22c55e;font-size:11px;background:rgba(34,197,94,0.15);padding:2px 8px;border-radius:10px;">✅ 완료</span>'
    + '</div>'
    + '<div style="font-size:17px;font-weight:700;color:var(--text);line-height:1.3;">' + (EVENT_TYPES[ev.type]||'') + ' ' + ev.title + '</div>'
    + '</div>'
    + '<button class="ev-detail-close" onclick="closeEventDetailBtn()">✕</button>'
    + '</div>'
    + (rows || '<div style="color:var(--text3);font-size:13px;text-align:center;padding:16px 0;">상세 정보 없음</div>')
    + (completedAt ? '<div class="ev-detail-footer">완료 처리: ' + completedAt + (ev.completedBy ? ' · ' + ev.completedBy : '') + '</div>' : '')
    + '</div>'
    + '</div>';

  var el = document.createElement('div');
  el.id = 'ev-detail-container';
  el.innerHTML = html;
  document.body.appendChild(el);
}

function closeEventDetail(e) {
  if (e && e.target.id !== 'ev-detail-bg') return;
  var el = document.getElementById('ev-detail-container');
  if (el) el.remove();
}
function closeEventDetailBtn() {
  var el = document.getElementById('ev-detail-container');
  if (el) el.remove();
}
