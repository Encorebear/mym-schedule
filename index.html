<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MYM 스케줄">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="favicon.png">
<title>MYM 스케줄</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535; --bg4: #252d3d;
    --border: #2a3347; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #3b82f6; --danger: #ef4444; --success: #22c55e; --warn: #f59e0b;
    --minho: #60a5fa; --sujeong: #f472b6; --min: #a78bfa;
    --minji: #fbbf24; --seohyun: #34d399; --junseo: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-logo {
    font-size: 36px; font-weight: 800; letter-spacing: -1px;
    margin-bottom: 6px; color: var(--text);
  }
  .login-logo span { color: var(--accent); }
  .login-subtitle {
    font-size: 13px; color: var(--text3); margin-bottom: 40px;
  }
  .login-card {
    width: 100%; max-width: 340px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
  }
  .login-field { margin-bottom: 14px; }
  .login-label { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 6px; display: block; }
  .login-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    padding: 12px 14px; font-family: inherit;
    transition: border-color 0.15s;
  }
  .login-input:focus { outline: none; border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 14px; background: var(--accent);
    border: none; border-radius: 10px; color: white;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
    transition: all 0.15s;
  }
  .login-btn:active { opacity: 0.85; transform: scale(0.98); }
  .login-error {
    font-size: 12px; color: var(--danger); margin-top: 10px;
    text-align: center; min-height: 18px;
  }
  .login-version { font-size: 11px; color: var(--text3); margin-top: 24px; }

  /* ── MAIN APP ── */
  #main-app {
    display: none; flex-direction: column;
    height: 100dvh; overflow: hidden; padding-bottom: 0;
  }

  /* ── HEADER ── */
  .app-header {
    flex-shrink: 0; z-index: 100;
    background: rgba(15,17,23,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 12px 16px 10px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .app-title span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .user-badge {
    display: flex; align-items: center; gap: 5px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .user-badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px;
    color: var(--text2); font-size: 12px; cursor: pointer;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .btn-icon {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    color: var(--text2); font-size: 13px; cursor: pointer;
  }

  .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .month-label { font-size: 17px; font-weight: 700; min-width: 100px; text-align: center; cursor: pointer; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 14px; cursor: pointer;
  }
  .nav-btn:active { background: var(--bg4); transform: scale(0.92); }

  /* ── ACTOR FILTER ── */
  .actor-filter { flex-shrink: 0; padding: 8px 12px 0; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .actor-filter::-webkit-scrollbar { display: none; }
  .actor-chip {
    flex-shrink: 0; padding: 5px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 2px solid transparent; white-space: nowrap;
  }

  /* ── WEEKDAY ── */
  .weekday-header { flex-shrink: 0; display: grid; grid-template-columns: repeat(7, 1fr); padding: 6px 4px 3px; gap: 2px; }
  .weekday-label { text-align: center; font-size: 11px; font-weight: 700; color: var(--text2); padding: 2px 0; }

  /* ── CALENDAR ── */
  #calendar-view {
    flex: 1; min-height: 0; display: flex;
    flex-direction: column; overflow: hidden; padding: 0 4px 4px;
  }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px; flex: 1; min-height: 0; grid-auto-rows: 1fr;
  }
  #list-view { flex: 1; min-height: 0; overflow-y: auto; }
  .cal-day {
    background: var(--bg2); border-radius: 6px;
    padding: 3px 3px 2px; cursor: pointer; border: 1px solid transparent;
    transition: background 0.15s;
    display: flex; flex-direction: column; overflow: hidden; min-height: 0;
  }
  .cal-day:active { background: var(--bg3); }
  .cal-day.other-month { opacity: 0.25; }
  .cal-day.today { border-color: var(--accent); }
  .day-num {
    font-size: 11px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  }
  .cal-day.today .day-num { background: var(--accent); color: white; }
  .event-dots {
    display: flex; flex-direction: column; gap: 1px;
    flex: 1; min-height: 0; overflow: hidden;
  }
  .event-dot {
    flex-shrink: 0; height: 15px; border-radius: 3px; font-size: 10px; font-weight: 700;
    padding: 0 3px; line-height: 15px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }
  .more-count { font-size: 8px; color: var(--text3); padding: 0 2px; flex-shrink: 0; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 24px; right: 16px; z-index: 200;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: white;
    box-shadow: 0 4px 20px rgba(59,130,246,0.5); transition: all 0.2s;
  }
  .fab:active { transform: scale(0.92); }
  .fab.hidden { display: none; }

  /* ── SHEETS ── */
  .sheet-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .sheet-overlay.visible { opacity: 1; pointer-events: all; }
  .bottom-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
    background: var(--bg2); border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    max-height: 92vh; display: flex; flex-direction: column;
  }
  .bottom-sheet.visible { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sheet-title { font-size: 16px; font-weight: 700; }
  .sheet-close {
    background: var(--bg3); border: none; border-radius: 50%;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 14px; cursor: pointer;
  }
  .sheet-body { overflow-y: auto; flex: 1; padding: 12px 16px 24px; -webkit-overflow-scrolling: touch; }

  /* ── EVENT CARDS ── */
  .event-card {
    background: var(--bg3); border-radius: 10px; border: 1px solid var(--border);
    padding: 12px; margin-bottom: 8px; position: relative;
    border-left: 3px solid transparent;
  }
  .event-card-actor { font-size: 11px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .event-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .event-card-meta { font-size: 12px; color: var(--text2); display: flex; flex-wrap: wrap; gap: 6px; }
  .event-card-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-edit, .btn-delete {
    flex: 1; padding: 6px; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  }
  .btn-edit { background: var(--bg4); color: var(--text2); }
  .btn-delete { background: rgba(239,68,68,0.1); color: var(--danger); border-color: rgba(239,68,68,0.3); }
  .no-events { text-align: center; color: var(--text3); padding: 32px 0; font-size: 13px; }

  /* ── FORM ── */
  .form-section { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; padding: 10px 12px;
    font-family: inherit; -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-select option { background: var(--bg2); }
  .form-textarea { resize: none; height: 72px; line-height: 1.5; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .actor-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .actor-select-btn {
    padding: 8px 4px; border-radius: 8px; border: 2px solid var(--border);
    background: var(--bg3); color: var(--text2); font-size: 12px;
    font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .actor-select-btn.disabled { opacity: 0.3; cursor: not-allowed; }

  .type-select-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .type-select-btn {
    padding: 7px 4px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2); font-size: 11px;
    cursor: pointer; text-align: center; line-height: 1.3;
  }
  .type-select-btn.selected { background: rgba(59,130,246,0.2); border-color: var(--accent); color: var(--accent); }

  .btn-submit {
    width: 100%; padding: 14px; background: var(--accent); border: none;
    border-radius: 10px; color: white; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 4px;
  }
  .btn-submit:active { opacity: 0.85; transform: scale(0.98); }

  /* ── LIST VIEW ── */
  .list-view { padding: 8px 12px; }
  .list-date-group { margin-bottom: 16px; }
  .list-date-label { font-size: 12px; font-weight: 700; color: var(--text3); margin-bottom: 6px; }
  .list-event-card {
    background: var(--bg2); border-radius: 10px; border: 1px solid var(--border);
    padding: 10px 12px; margin-bottom: 6px; display: flex;
    align-items: flex-start; gap: 10px; cursor: pointer;
  }
  .list-event-bar { width: 3px; border-radius: 2px; min-height: 36px; flex-shrink: 0; align-self: stretch; }
  .list-event-content { flex: 1; min-width: 0; }
  .list-event-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .list-event-meta { font-size: 11px; color: var(--text3); }

  /* ── ADMIN PANEL ── */
  .admin-section { margin-bottom: 24px; }
  .admin-section-title {
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
  }
  .user-row {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .user-row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .user-row-info { flex: 1; min-width: 0; }
  .user-row-name { font-size: 13px; font-weight: 600; }
  .user-row-role { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .user-row-actions { display: flex; gap: 6px; }
  .btn-small {
    padding: 5px 10px; border-radius: 6px; font-size: 11px;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg4); color: var(--text2);
  }
  .btn-small.danger { color: var(--danger); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.1); }

  .add-user-form {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-top: 10px;
  }
  .add-user-form .form-section { margin-bottom: 10px; }

  /* ── SETTINGS / USER MENU ── */
  .menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; font-size: 14px; color: var(--text);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item .menu-icon { font-size: 18px; width: 28px; text-align: center; }
  .menu-item.danger { color: var(--danger); }
  .menu-item .menu-arrow { margin-left: auto; color: var(--text3); font-size: 12px; }

  .settings-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    padding: 10px 12px; font-family: inherit; margin-bottom: 8px;
  }
  .settings-input:focus { outline: none; border-color: var(--accent); }
  .sync-status { font-size: 12px; color: var(--text3); text-align: center; margin-top: 4px; }
  .sync-status.ok { color: var(--success); }
  .sync-status.err { color: var(--danger); }

  /* ── STAFF TAGS ── */
  .staff-category { background: var(--bg3); border-radius: 10px; padding: 8px 10px; }
  .staff-cat-label { font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 6px; }
  .staff-tags-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .staff-tag {
    display: flex; align-items: center; gap: 4px;
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 8px 3px 10px; font-size: 12px;
  }
  .staff-tag-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; line-height: 1; padding: 0 2px; }
  .staff-add-row { display: flex; gap: 5px; margin-top: 4px; }
  .staff-add-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 12px;
    padding: 5px 9px; font-family: inherit;
  }
  .staff-add-input:focus { outline: none; border-color: var(--accent); }
  .staff-add-btn {
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text2); font-size: 18px; font-weight: 300;
    cursor: pointer; padding: 3px 10px; line-height: 1;
  }
  .staff-add-btn:active { background: var(--accent); color: white; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg4); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-weight: 500;
    padding: 8px 16px; border-radius: 20px;
    z-index: 999; opacity: 0; pointer-events: none;
    transition: all 0.25s; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .badge-admin { background: rgba(245,158,11,0.2); color: var(--warn); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .badge-actor { background: rgba(59,130,246,0.15); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .badge-viewer { background: rgba(100,116,139,0.2); color: var(--text3); padding: 1px 6px; border-radius: 4px; font-size: 10px; }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════ -->
<!--  LOGIN SCREEN                              -->
<!-- ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-logo">MYM <span>스케줄</span></div>
  <div class="login-subtitle">배우 스케줄 통합 관리 시스템</div>
  <div class="login-card">
    <div class="login-field">
      <label class="login-label">아이디</label>
      <input type="text" class="login-input" id="login-id" placeholder="아이디 입력" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    </div>
    <div class="login-field">
      <label class="login-label">비밀번호</label>
      <input type="password" class="login-input" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:12px;cursor:pointer;">
      <input type="checkbox" id="login-remember" checked style="accent-color:var(--accent);width:16px;height:16px;">
      로그인 유지
    </label>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
  <div class="login-version">MYM Schedule v1.0</div>
</div>


<!-- ══════════════════════════════════════════ -->
<!--  MAIN APP                                  -->
<!-- ══════════════════════════════════════════ -->
<div id="main-app">

  <!-- HEADER -->
  <div class="app-header">
    <div class="header-top">
      <div class="app-title">MYM <span>스케줄</span></div>
      <div class="header-right">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-cal-view" onclick="setView('calendar')">📅</button>
          <button class="view-btn" id="btn-list-view" onclick="setView('list')">📋</button>
        </div>
        <button id="sync-btn" onclick="manualSync()" title="새로고침"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;
          color:var(--text2);font-size:15px;padding:5px 9px;cursor:pointer;line-height:1;">🔄</button>
        <div class="user-badge" id="user-badge" onclick="openUserMenu()">
          <div class="dot" id="user-badge-dot"></div>
          <span id="user-badge-name"></span>
        </div>
      </div>
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label" onclick="goToday()">2026년 4월</div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <!-- ACTOR FILTER -->
  <div class="actor-filter" id="actor-filter"></div>

  <!-- WEEKDAY LABELS -->
  <div class="weekday-header">
    <div class="weekday-label">월</div><div class="weekday-label">화</div>
    <div class="weekday-label">수</div><div class="weekday-label">목</div>
    <div class="weekday-label">금</div>
    <div class="weekday-label" style="color:#a78bfa;font-weight:700;">토</div>
    <div class="weekday-label" style="color:#f87171;font-weight:700;">일</div>
  </div>

  <!-- CALENDAR / LIST -->
  <div id="calendar-view"><div class="calendar-grid" id="calendar-grid"></div></div>
  <div id="list-view" style="display:none"><div class="list-view" id="list-container"></div></div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAddSheet()">+</button>
</div>

<!-- OVERLAY -->
<div class="sheet-overlay" id="overlay" onclick="closeAllSheets()"></div>

<!-- DAY DETAIL SHEET -->
<div class="bottom-sheet" id="day-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="day-sheet-title">일정</div>

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const ACTORS = {
  'LMH': { color: '#60a5fa', bg: 'rgba(96,165,250,0.85)',  textColor: 'white' },
  'LSJ': { color: '#f472b6', bg: 'rgba(244,114,182,0.85)', textColor: 'white' },
  'KM':  { color: '#a78bfa', bg: 'rgba(167,139,250,0.85)', textColor: 'white' },
  'KMJ': { color: '#d97706', bg: 'rgba(251,191,36,0.85)',  textColor: '#1a1200' },
  'LSH': { color: '#10b981', bg: 'rgba(52,211,153,0.82)',  textColor: '#082d1f' },
  'PJS': { color: '#f87171', bg: 'rgba(248,113,113,0.85)', textColor: 'white' }
};
const ACTOR_LIST = Object.keys(ACTORS);
const EVENT_TYPES = { '촬영':'🎬','미팅':'📋','행사':'🎪','인터뷰':'🎤','이동':'✈️','홍보':'📸','광고':'📢','기타':'📌','비공개':'🔒' };
const PRIVATE_TYPE = '비공개'; // 관리자만 세부 내용 열람 가능

const STORAGE_KEY   = 'mym_events_v1';
const USERS_KEY     = 'mym_users_v1';
const SETTINGS_KEY  = 'mym_settings_v1';
const SESSION_KEY   = 'mym_session_v1';
const API_KEY       = 'MYM_K9xpR7vL2024';
const DEFAULT_API   = 'https://script.google.com/macros/s/AKfycbynNDWxLMSXZVxO7xscWw-h4R7mpougxeP8tBH5wzSRDBDq0fpO4KOsocfvuz20U1MV/exec';

// ─── DEFAULT USERS ───────────────────────────────
// role: 'admin' | 'actor' | 'viewer'
// actors: array of actor names (empty = all for admin)
// canEdit: bool
const DEFAULT_USERS = [
  { id:'admin',   pw:'mym2024', role:'admin',  actors:[], canEdit:true,  label:'관리자' },
  { id:'minho',   pw:'minho1',  role:'actor',  actors:['LMH'], canEdit:true,  label:'LMH 담당' },
  { id:'sujeong', pw:'sj1234',  role:'actor',  actors:['LSJ'], canEdit:true,  label:'LSJ 담당' },
  { id:'min',     pw:'min123',  role:'actor',  actors:['KM'],   canEdit:true,  label:'KM 담당' },
  { id:'minji',   pw:'mj1234',  role:'actor',  actors:['KMJ'], canEdit:true,  label:'KMJ 담당' },
  { id:'seohyun', pw:'sh1234',  role:'actor',  actors:['LSH'], canEdit:true,  label:'LSH 담당' },
  { id:'junseo',  pw:'js1234',  role:'actor',  actors:['PJS'], canEdit:true,  label:'PJS 담당' }
];

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  selectedActor: 'all',
  view: 'calendar',
  events: [],
  users: [],
  currentUser: null,
  apiUrl: 'https://script.google.com/macros/s/AKfycbynNDWxLMSXZVxO7xscWw-h4R7mpougxeP8tBH5wzSRDBDq0fpO4KOsocfvuz20U1MV/exec'
};

// ═══════════════════════════════════════════════════
//  STORAGE HELPERS
// ═══════════════════════════════════════════════════
function loadAll() {
  try { state.events = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { state.events = []; }
  try {
    const stored = JSON.parse(localStorage.getItem(USERS_KEY));
    state.users = stored && stored.length ? stored : JSON.parse(JSON.stringify(DEFAULT_USERS));
  } catch(e) { state.users = JSON.parse(JSON.stringify(DEFAULT_USERS)); }
    try { const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'); state.apiUrl = s.apiUrl || DEFAULT_API; } catch(e) { state.apiUrl = DEFAULT_API; }
}
function saveEvents() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.events)); }
function saveUsers()  { localStorage.setItem(USERS_KEY, JSON.stringify(state.users)); pushUsersToServer(); }

// 유저 정보 서버 동기화
async function pushUsersToServer() {
  if (!state.apiUrl) return;
  try {
    await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveUsers', key: API_KEY, users: state.users })
    });
  } catch(e) {}
}
async function loadUsersFromServer() {
  if (!state.apiUrl) return;
  try {
    const res = await fetch(state.apiUrl + '?action=loadUsers&key=' + API_KEY + '&t=' + Date.now());
    const data = JSON.parse(await res.text());
    if (Array.isArray(data.users) && data.users.length > 0) {
      state.users = data.users;
      localStorage.setItem(USERS_KEY, JSON.stringify(state.users));
      // 현재 로그인된 유저 정보도 갱신
      if (state.currentUser) {
        const fresh = state.users.find(u => u.id === state.currentUser.id);
        if (fresh) state.currentUser = fresh;
      }
    }
  } catch(e) {}
}

function getUser(id) { return state.users.find(u => u.id === id); }
function isAdmin() { return state.currentUser && state.currentUser.role === 'admin'; }
function canEdit() { return state.currentUser && state.currentUser.canEdit; }
// 비공개 일정: 관리자 또는 작성자 본인만 내용 열람 가능
function isHidden(ev) {
  if (ev.type !== PRIVATE_TYPE) return false;
  if (isAdmin()) return false;
  if (!state.currentUser) return true;
  // 작성자 본인
  if (ev.createdBy && ev.createdBy === state.currentUser.id) return false;
  return true;
}

// ═══════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════
async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const remember = document.getElementById('login-remember').checked;
  const errEl = document.getElementById('login-error');

  if (!id || !pw) { errEl.textContent = '아이디와 비밀번호를 입력해주세요'; return; }

  // 로그인 시 서버에서 최신 계정 정보 가져오기
  errEl.textContent = '로그인 중...';
  await loadUsersFromServer();

  const user = state.users.find(u => u.id === id && u.pw === pw);
  if (!user) { errEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다'; return; }

  state.currentUser = user;
  // 로그인 유지 체크 시 localStorage, 아니면 sessionStorage
  const store = remember ? localStorage : sessionStorage;
  store.setItem(SESSION_KEY, JSON.stringify({ id: user.id, remember }));
  if (!remember) localStorage.removeItem(SESSION_KEY);
  errEl.textContent = '';
  startApp();
}

function logout() {
  stopAutoSync();
  state.currentUser = null;
  localStorage.removeItem(SESSION_KEY);
  sessionStorage.removeItem(SESSION_KEY);
  closeAllSheets();
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
}

function tryAutoLogin() {
  // localStorage 먼저 확인 (로그인 유지), 없으면 sessionStorage
  try {
    let s = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (!s) s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (s && s.id) {
      const fresh = getUser(s.id);
      if (fresh) { state.currentUser = fresh; return true; }
    }
  } catch(e) {}
  return false;
}

// ═══════════════════════════════════════════════════
//  APP INIT
// ═══════════════════════════════════════════════════
function startApp() {
  const user = state.currentUser;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';

  // User badge
  const dot = document.getElementById('user-badge-dot');
  const name = document.getElementById('user-badge-name');
  if (user.role === 'admin') {
    dot.style.background = '#f59e0b'; name.textContent = '관리자';
  } else if (user.actors && user.actors.length === 1) {
    const ac = ACTORS[user.actors[0]];
    dot.style.background = ac ? ac.color : '#3b82f6';
    name.textContent = user.actors[0];
  } else {
    dot.style.background = '#3b82f6'; name.textContent = user.label || user.id;
  }

  // FAB visibility (only if can edit)
  document.getElementById('fab').classList.toggle('hidden', !canEdit());

  // Set initial actor filter
  if (user.role !== 'admin' && user.actors && user.actors.length === 1) {
    state.selectedActor = user.actors[0];
  } else {
    state.selectedActor = 'all';
  }

  buildActorFilter();
  renderCurrentView();
  if (state.apiUrl) { loadUsersFromServer(); syncFromServer(false); startAutoSync(); }
}

// ═══════════════════════════════════════════════════
//  ACTOR FILTER BAR
// ═══════════════════════════════════════════════════
function buildActorFilter() {
  const user = state.currentUser;
  const container = document.getElementById('actor-filter');

  // Which actors can this user see?
  let visibleActors;
  if (user.role === 'admin' || !user.actors || user.actors.length === 0) {
    visibleActors = ACTOR_LIST;
  } else {
    visibleActors = user.actors;
  }

  let html = '';
  if (visibleActors.length > 1) {
    html += `<div class="actor-chip" data-actor="all" onclick="filterActor('all')"
      style="background:var(--bg3);border-color:var(--accent);color:var(--accent);">전체</div>`;
  }
  visibleActors.forEach(actor => {
    const ac = ACTORS[actor];
    const isActive = state.selectedActor === actor;
    html += `<div class="actor-chip" data-actor="${actor}" onclick="filterActor('${actor}')"
      style="background:${ac.bg.replace('0.85','0.15')};color:${ac.color};border-color:${isActive ? ac.color : 'var(--border)'};">${actor}</div>`;
  });
  container.innerHTML = html;
  updateFilterHighlight();
}

function filterActor(actor) {
  state.selectedActor = actor;
  updateFilterHighlight();
  renderCurrentView();
}

function updateFilterHighlight() {
  document.querySelectorAll('.actor-chip').forEach(chip => {
    const a = chip.dataset.actor;
    const isActive = a === state.selectedActor;
    if (a === 'all') {
      chip.style.borderColor = isActive ? 'var(--accent)' : 'var(--border)';
      chip.style.color = isActive ? 'var(--accent)' : 'var(--text3)';
    } else {
      const ac = ACTORS[a];
      chip.style.borderColor = isActive ? ac.color : 'var(--border)';
    }
  });
}

// ═══════════════════════════════════════════════════
//  CALENDAR RENDERING
// ═══════════════════════════════════════════════════
function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function getVisibleActors() {
  const user = state.currentUser;
  if (!user) return [];
  if (user.role === 'admin' || !user.actors || user.actors.length === 0) return ACTOR_LIST;
  return user.actors;
}

function getFilteredEvents() {
  const visible = getVisibleActors();
  return state.events.filter(e => {
    if (!visible.includes(e.actor)) return false;
    if (state.selectedActor !== 'all' && e.actor !== state.selectedActor) return false;
    return true;
  });
}

function getEventsForDate(dateStr) {
  return getFilteredEvents().filter(e => e.date === dateStr);
}

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  const today = dateKey(new Date());
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent = `${state.year}년 ${MONTHS[state.month]}`;

  // Build days array (Mon start)
  const days = [];
  const first = new Date(state.year, state.month, 1);
  let startDow = first.getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  for (let i = startDow - 1; i >= 0; i--) days.push({ date: new Date(state.year, state.month, -i), current: false });
  const dim = new Date(state.year, state.month + 1, 0).getDate();
  for (let d = 1; d <= dim; d++) days.push({ date: new Date(state.year, state.month, d), current: true });
  let si = 1; while (days.length % 7 !== 0) days.push({ date: new Date(state.year, state.month + 1, si++), current: false });

  let html = '';
  days.forEach(({ date, current }) => {
    const key = dateKey(date);
    const events = getEventsForDate(key);
    const isToday = key === today;
    const dow = date.getDay(); // 0=Sun,6=Sat
    let cls = 'cal-day' + (!current ? ' other-month' : '') + (isToday ? ' today' : '');
    const dayColor = dow === 0 ? 'color:#f87171' : (dow === 6 ? 'color:#a78bfa' : '');
    let dots = '';
    // 셀 높이에 따라 보여줄 수 있는 최대 개수 계산 (셀당 약 14px, day-num 20px)
    // 일단 모두 렌더하고 CSS overflow:hidden 으로 잘림 처리
    events.forEach(ev => {
      const ac = ACTORS[ev.actor] || {};
      const isPrivate = isHidden(ev);
      const label = isPrivate ? '🔒 비공개' : `${EVENT_TYPES[ev.type]||''} ${ev.title}`;
      const dotBg = isPrivate ? 'rgba(80,90,110,0.7)' : (ac.bg||'rgba(59,130,246,0.85)');
      const dotColor = isPrivate ? '#cbd5e1' : (ac.textColor||'white');
      const dotShadow = (isPrivate || ac.textColor==='white' || !ac.textColor) ? 'text-shadow:0 1px 2px rgba(0,0,0,0.4);' : '';
      dots += `<div class="event-dot" style="background:${dotBg};color:${dotColor};${dotShadow}font-weight:700;">${label}</div>`;
    });
    html += `<div class="${cls}" onclick="openDaySheet('${key}')">
      <div class="day-num" style="${dayColor}">${date.getDate()}</div>
      <div class="event-dots">${dots}</div>
    </div>`;
  });
  grid.innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  LIST VIEW
// ═══════════════════════════════════════════════════
function renderList() {
  const container = document.getElementById('list-container');
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent = `${state.year}년 ${MONTHS[state.month]}`;

  const events = getFilteredEvents()
    .filter(e => { const d = new Date(e.date); return d.getFullYear()===state.year && d.getMonth()===state.month; })
    .sort((a,b) => a.date !== b.date ? a.date.localeCompare(b.date) : (a.startTime||'').localeCompare(b.startTime||''));

  if (!events.length) { container.innerHTML = '<div class="no-events" style="padding:40px 0;">이번 달 일정이 없습니다</div>'; return; }

  const groups = {};
  events.forEach(e => { if (!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });
  const DOW=['일','월','화','수','목','금','토'];
  let html='';
  Object.keys(groups).sort().forEach(ds => {
    const d=new Date(ds);
    html+=`<div class="list-date-group"><div class="list-date-label">${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})</div>`;
    groups[ds].forEach(ev => {
      const ac=ACTORS[ev.actor]||{};
      const t=ev.startTime?(ev.endTime?`${ev.startTime}~${ev.endTime}`:ev.startTime):'';
      const isPrivate = isHidden(ev);
      html+=`<div class="list-event-card" onclick="openDaySheet('${ev.date}')">
        <div class="list-event-bar" style="background:${isPrivate?'#64748b':ac.color||'#3b82f6'}"></div>
        <div class="list-event-content">
          <div class="list-event-title" style="${isPrivate?'color:var(--text3)':''}">${isPrivate?'🔒 비공개 일정':`${EVENT_TYPES[ev.type]||''} ${ev.title}`}</div>
          <div class="list-event-meta">${isPrivate?ev.actor:`${ev.actor}${t?' · '+t:''}${ev.location?' · 📍'+ev.location:''}`}</div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

function renderCurrentView() {
  if (state.view==='calendar') renderCalendar(); else renderList();
}

function setView(v) {
  state.view=v;
  document.getElementById('calendar-view').style.display=v==='calendar'?'':'none';
  document.getElementById('list-view').style.display=v==='list'?'':'none';
  document.getElementById('btn-cal-view').classList.toggle('active',v==='calendar');
  document.getElementById('btn-list-view').classList.toggle('active',v==='list');
  renderCurrentView();
}

function changeMonth(d) {
  state.month+=d;
  if(state.month>11){state.month=0;state.year++;}
  if(state.month<0){state.month=11;state.year--;}
  renderCurrentView();
}
function goToday() {
  state.year=new Date().getFullYear(); state.month=new Date().getMonth();
  renderCurrentView();
}

let currentDayKey = null;
function openDaySheet(ds) {
  currentDayKey = ds;
  const d = new Date(ds);
  const DOW=['일','월','화','수','목','금','토'];
  document.getElementById('day-sheet-title').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`;
  renderDayBody(ds);
  showSheet('day-sheet');
}

function renderDayBody(ds) {
  const body = document.getElementById('day-sheet-body');
  const events = getEventsForDate(ds).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));

  if (!events.length) {
    body.innerHTML=`<div class="no-events">등록된 일정이 없습니다${canEdit()?`<br><br>
      <button class="btn-submit" style="max-width:200px;margin:0 auto;display:block;font-size:13px;padding:10px;"
        onclick="closeDaySheet();openAddSheet('${ds}')">+ 일정 추가</button>`:''}</div>`;
    return;
  }

  let html='';
  events.forEach(ev => {
    const ac=ACTORS[ev.actor]||{};
    const t=ev.startTime?(ev.endTime?`${ev.startTime} ~ ${ev.endTime}`:ev.startTime):'';
    const userCanEdit = canEdit() && (isAdmin() || (state.currentUser.actors||[]).includes(ev.actor));
    const isPrivate = ev.type === PRIVATE_TYPE && !isAdmin();

    if (isPrivate) {
      // 비공개: 작성자·관리자에게만 세부내용 표시
      html+=`<div class="event-card" style="border-left-color:#64748b;background:var(--bg3);">
        <div class="event-card-actor" style="color:#64748b;">
          <span style="width:7px;height:7px;border-radius:50%;background:#64748b;display:inline-block;"></span> ${ev.actor}
        </div>
        <div class="event-card-title" style="color:var(--text3);">🔒 비공개 일정</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">작성자 및 관리자만 열람할 수 있습니다</div>
      </div>`;
    } else {
      const isCreator = ev.createdBy && state.currentUser && ev.createdBy === state.currentUser.id;
      const showEdit = userCanEdit || isCreator;
      const staffHtml = formatStaffDisplay(ev.staff);
      html+=`<div class="event-card" style="border-left-color:${ac.color||'#3b82f6'}">
        <div class="event-card-actor" style="color:${ac.color||'#3b82f6'}">
          <span style="width:7px;height:7px;border-radius:50%;background:${ac.color};display:inline-block;"></span> ${ev.actor}
        </div>
        <div class="event-card-title">${EVENT_TYPES[ev.type]||''} ${ev.title}</div>
        <div class="event-card-meta">
          ${t?`<span>🕐 ${t}</span>`:''}
          ${ev.location?`<span>📍 ${ev.location}</span>`:''}
          ${ev.type?`<span>${EVENT_TYPES[ev.type]||''} ${ev.type}</span>`:''}
        </div>
        ${staffHtml?`<div style="margin-top:6px;font-size:12px;color:var(--text2);line-height:1.8;">👥 ${staffHtml}</div>`:''}
        ${ev.memo?`<div style="margin-top:5px;font-size:12px;color:var(--text3);line-height:1.5;">📝 ${ev.memo}</div>`:''}
        ${showEdit?`<div class="event-card-actions">
          <button class="btn-edit" onclick="closeDaySheet();openEditSheet('${ev.id}')">✏️ 수정</button>
          <button class="btn-delete" onclick="deleteEvent('${ev.id}','${ds}')">🗑 삭제</button>
        </div>`:''}
      </div>`;
    }
  });
  if (canEdit()) {
    html+=`<button class="btn-submit" style="font-size:13px;padding:10px;margin-top:8px;"
      onclick="closeDaySheet();openAddSheet('${ds}')">+ 이 날에 일정 추가</button>`;
  }
  body.innerHTML=html;
}

function deleteEvent(id, ds) {
  if (!confirm('이 일정을 삭제하시겠습니까?')) return;
  state.events=state.events.filter(e=>e.id!==id);
  saveAndSync();
  renderCurrentView();
  renderDayBody(ds);
  showToast('삭제되었습니다');
}
function closeDaySheet() { hideSheet('day-sheet'); }

// ═══════════════════════════════════════════════════
//  STAFF TAG UI
// ═══════════════════════════════════════════════════
const STAFF_CATS = ['헤어','메이크업','스타일리스트','매니저','MYM','기타'];
let staffData = {};

function initStaffTags(existingStaff) {
  staffData = {};
  STAFF_CATS.forEach(c => staffData[c] = []);
  if (existingStaff) {
    try {
      const parsed = JSON.parse(existingStaff);
      if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
        STAFF_CATS.forEach(c => {
          staffData[c] = Array.isArray(parsed[c])
            ? parsed[c].map(item => typeof item === 'string' ? {name: item, hours: ''} : item)
            : [];
        });
      }
    } catch(e) {
      if (existingStaff.trim()) staffData['기타'] = [existingStaff.trim()];
    }
  }
  renderStaffTags();
}

function renderStaffTags() {
  const wrap = document.getElementById('staff-tags-wrap');
  if (!wrap) return;
  wrap.innerHTML = STAFF_CATS.map((cat, ci) => {
    const tags = (staffData[cat]||[]).map((item, ti) => {
      const nm = typeof item === 'string' ? item : (item.name||'');
      const hr = typeof item === 'string' ? '' : (item.hours||'');
      const hrBadge = hr ? `<span style="background:rgba(99,179,237,0.25);color:#90cdf4;border-radius:3px;padding:0 4px;font-size:10px;margin-left:3px;">${hr}h</span>` : '';
      return `<div class="staff-tag" style="cursor:pointer;" onclick="editStaffHours(${ci},${ti})" title="클릭하여 근무시간 수정">${nm}${hrBadge}<button type="button" class="staff-tag-del" onclick="event.stopPropagation();removeStaffTag(${ci},${ti})">×</button></div>`;
    }).join('');
    return `<div class="staff-category">
      <div class="staff-cat-label">${cat}</div>
      <div class="staff-tags-row">
        ${tags}
        <div class="staff-add-row" style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">
          <input type="text" class="staff-add-input" id="sinput-${ci}" placeholder="이름" style="flex:2;min-width:70px;"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addStaffTag(${ci});}">
          <input type="number" class="staff-add-input" id="shours-${ci}" placeholder="시간(h)"
            min="0" max="24" step="0.5" style="flex:1;min-width:60px;"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addStaffTag(${ci});}">
          <button type="button" class="staff-add-btn" onclick="addStaffTag(${ci})">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
  syncStaffHidden();
}

function addStaffTag(ci) {
  const input = document.getElementById('sinput-' + ci);
  const hoursEl = document.getElementById('shours-' + ci);
  const name = input ? input.value.trim() : '';
  if (!name) return;
  const hours = hoursEl ? hoursEl.value.trim() : '';
  const cat = STAFF_CATS[ci];
  if (!staffData[cat]) staffData[cat] = [];
  staffData[cat].push({name, hours});
  if (input) input.value = '';
  if (hoursEl) hoursEl.value = '';
  renderStaffTags();
  setTimeout(() => { const el = document.getElementById('sinput-' + ci); if (el) el.focus(); }, 30);
}

function editStaffHours(ci, ti) {
  const cat = STAFF_CATS[ci];
  const item = staffData[cat] && staffData[cat][ti];
  if (!item) return;
  const nm = typeof item === 'string' ? item : item.name;
  const curHr = typeof item === 'string' ? '' : (item.hours||'');
  const newHr = prompt('[' + nm + '] 근무시간(h) 입력:', curHr);
  if (newHr === null) return;
  staffData[cat][ti] = {name: nm, hours: newHr.trim()};
  renderStaffTags();
  syncStaffHidden();
}

function removeStaffTag(ci, ti) {
  const cat = STAFF_CATS[ci];
  if (staffData[cat]) staffData[cat].splice(ti, 1);
  renderStaffTags();
}

function syncStaffHidden() {
  const hidden = document.getElementById('form-staff');
  if (hidden) hidden.value = JSON.stringify(staffData);
}

function formatStaffDisplay(staffJson) {
  if (!staffJson) return '';
  try {
    const obj = JSON.parse(staffJson);
    if (typeof obj !== 'object' || Array.isArray(obj)) return `<div>${staffJson}</div>`;
    return STAFF_CATS
      .filter(c => obj[c] && obj[c].length)
      .map(c => {
        const members = obj[c].map(item => {
          const nm = typeof item === 'string' ? item : (item.name||'');
          const hr = typeof item === 'string' ? '' : (item.hours||'');
          return hr ? `${nm}(${hr}h)` : nm;
        }).join(', ');
        return `<div><span style="color:var(--text3);font-size:10px;">${c}</span> ${members}</div>`;
      })
      .join('');
  } catch(e) {
    return staffJson ? `<div>${staffJson}</div>` : '';
  }
}

function selectFormActor(actor) {
  document.getElementById('form-actor').value=actor;
  document.querySelectorAll('.actor-select-btn').forEach(b=>{
    const a=b.dataset.actor; const sel=a===actor;
    const ac=ACTORS[a]||{};
    b.style.background=sel?ac.bg?.replace('0.85','0.2')||'var(--bg4)':'';
    b.style.borderColor=sel?ac.color||'var(--accent)':'var(--border)';
    b.style.color=sel?ac.color||'var(--accent)':(b.classList.contains('disabled')?'var(--text3)':'var(--text2)');
  });
}
function selectFormType(type) {
  document.getElementById('form-type').value=type;
  document.querySelectorAll('.type-select-btn').forEach(b=>b.classList.toggle('selected',b.dataset.type===type));
}

function submitEventForm(e) {
  e.preventDefault();
  const actor=document.getElementById('form-actor').value;
  const type=document.getElementById('form-type').value;
  const date=document.getElementById('form-date').value;
  const title=document.getElementById('form-title').value.trim();
  if (!actor) { showToast('배우를 선택해주세요'); return; }
  if (!type)  { showToast('일정 유형을 선택해주세요'); return; }
  if (!title) { showToast('제목을 입력해주세요'); return; }

  syncStaffHidden();
  const existing = editingId ? state.events.find(e=>e.id===editingId) : null;
  const ev={
    id: editingId||'ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    actor, date, type, title,
    startTime:document.getElementById('form-start-time').value,
    endTime:document.getElementById('form-end-time').value,
    location:document.getElementById('form-location').value.trim(),
    staff:document.getElementById('form-staff').value,
    memo:document.getElementById('form-memo').value.trim(),
    createdBy: existing ? (existing.createdBy || state.currentUser.id) : state.currentUser.id,
    updatedAt:new Date().toISOString()
  };

  if (editingId) {
    const idx=state.events.findIndex(e=>e.id===editingId);
    if(idx!==-1) state.events[idx]=ev;
    showToast('수정되었습니다');
  } else {
    state.events.push(ev);
    showToast('일정이 추가되었습니다');
  }
  saveAndSync();
  closeFormSheet();
  const d=new Date(ev.date);
  state.year=d.getFullYear(); state.month=d.getMonth();
  renderCurrentView();
}
function closeFormSheet() { hideSheet('form-sheet'); }

function openChangePw() {
  document.getElementById('pw-current').value='';
  document.getElementById('pw-new').value='';
  document.getElementById('pw-confirm').value='';
  document.getElementById('pw-error').textContent='';
  showSheet('changepw-sheet');
}

function changePassword() {
  const cur=document.getElementById('pw-current').value;
  const nw=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-confirm').value;
  const errEl=document.getElementById('pw-error');
  const user=state.currentUser;

  if (user.pw!==cur) { errEl.textContent='현재 비밀번호가 올바르지 않습니다'; return; }
  if (nw.length<4) { errEl.textContent='비밀번호는 4자 이상이어야 합니다'; return; }
  if (nw!==cf) { errEl.textContent='새 비밀번호가 일치하지 않습니다'; return; }

  const idx=state.users.findIndex(u=>u.id===user.id);
  if(idx!==-1) { state.users[idx].pw=nw; state.currentUser.pw=nw; saveUsers(); }
  hideSheet('changepw-sheet');
  showToast('비밀번호가 변경되었습니다');
}

// ═══════════════════════════════════════════════════
function openAdmin() {
  renderAdminPanel();
  showSheet('admin-sheet');
}

let editingUserId = null;

function renderAdminPanel() {
  const roleBadgeHtml = u =>
    u.role==='admin'?'<span class="badge-admin">관리자</span>':
    u.role==='viewer'?'<span class="badge-viewer">뷰어</span>':'<span class="badge-actor">담당자</span>';

  let html=`<div class="admin-section">
    <div class="admin-section-title">👥 계정 목록</div>`;

  state.users.forEach(u=>{
    const ac=u.actors&&u.actors.length===1?ACTORS[u.actors[0]]:{color:'#64748b'};
    const isSelf=u.id===state.currentUser.id;
    html+=`<div class="user-row" style="flex-wrap:wrap;">
      <div class="user-row-dot" style="background:${ac.color}"></div>
      <div class="user-row-info">
        <div class="user-row-name">${u.id} ${roleBadgeHtml(u)} ${isSelf?'<span style="font-size:10px;color:var(--text3)">(나)</span>':''}</div>
        <div class="user-row-role">${u.label||u.id}${u.actors&&u.actors.length?' · '+u.actors.join(', '):''}${u.canEdit?'':' · 읽기전용'}</div>
      </div>
      <div class="user-row-actions">
        <button class="btn-small" onclick="adminEditUser('${u.id}')">수정</button>
        ${!isSelf?`<button class="btn-small danger" onclick="adminDeleteUser('${u.id}')">삭제</button>`:''}
      </div>
      ${editingUserId===u.id?renderEditForm(u):''}
    </div>`;
  });

  html+=`</div>
  <div class="admin-section">
    <div class="admin-section-title">➕ 계정 추가</div>
    <div class="add-user-form">
      <div class="form-section">
        <label class="form-label">아이디</label>
        <input type="text" class="form-input" id="new-user-id" placeholder="영문/숫자">
      </div>
      <div class="form-section">
        <label class="form-label">비밀번호</label>
        <input type="text" class="form-input" id="new-user-pw" placeholder="초기 비밀번호">
      </div>
      <div class="form-section">
        <label class="form-label">이름/설명</label>
        <input type="text" class="form-input" id="new-user-label" placeholder="예: LMH 담당">
      </div>
      <div class="form-section">
        <label class="form-label">권한</label>
        <select class="form-select" id="new-user-role" onchange="toggleActorPick(this.value)">
          <option value="actor">담당자 (특정 배우만)</option>
          <option value="admin">관리자 (전체)</option>
          <option value="viewer">뷰어 (전체 보기만)</option>
        </select>
      </div>
      <div class="form-section" id="new-user-actors-section">
        <label class="form-label">담당 배우</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;" id="new-user-actors">
          ${ACTOR_LIST.map(a=>`<label style="display:flex;align-items:center;gap:4px;font-size:13px;">
            <input type="checkbox" value="${a}" style="accent-color:${ACTORS[a].color}"> ${a}</label>`).join('')}
        </div>
      </div>
      <div class="form-section">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="new-user-canedit" checked style="accent-color:var(--accent)">
          편집 가능 (체크 해제 시 읽기 전용)
        </label>
      </div>
      <button class="btn-submit" onclick="adminAddUser()">계정 추가</button>
    </div>
  </div>`;

  document.getElementById('admin-sheet-body').innerHTML=html;
}

function renderEditForm(u) {
  const actorChecks = ACTOR_LIST.map(a =>
    `<label style="display:flex;align-items:center;gap:4px;font-size:12px;">
      <input type="checkbox" class="edit-actor-chk" value="${a}" ${u.actors&&u.actors.includes(a)?'checked':''} style="accent-color:${ACTORS[a].color}"> ${a}</label>`
  ).join('');
  return `<div style="width:100%;background:var(--bg);border-radius:8px;padding:12px;margin-top:8px;">
    <div class="form-section">
      <label class="form-label">이름/설명</label>
      <input type="text" class="form-input" id="edit-label" value="${u.label||u.id}" style="margin-bottom:8px;">
    </div>
    <div class="form-section">
      <label class="form-label">비밀번호 재설정</label>
      <input type="text" class="form-input" id="edit-pw" placeholder="변경 시 입력 (비우면 유지)" style="margin-bottom:8px;">
    </div>
    <div class="form-section">
      <label class="form-label">권한</label>
      <select class="form-select" id="edit-role" onchange="document.getElementById('edit-actors-wrap').style.display=this.value==='actor'?'':'none'" style="margin-bottom:8px;">
        <option value="actor" ${u.role==='actor'?'selected':''}>담당자</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>관리자</option>
        <option value="viewer" ${u.role==='viewer'?'selected':''}>뷰어</option>
      </select>
    </div>
    <div class="form-section" id="edit-actors-wrap" style="display:${u.role==='actor'?'':'none'}">
      <label class="form-label">담당 배우</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">${actorChecks}</div>
    </div>
    <div class="form-section">
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;margin-bottom:10px;">
        <input type="checkbox" id="edit-canedit" ${u.canEdit!==false?'checked':''} style="accent-color:var(--accent)">
        편집 가능
      </label>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn-small" onclick="adminSaveEdit('${u.id}')" style="background:var(--accent);color:white;border-color:var(--accent);">저장</button>
      <button class="btn-small" onclick="editingUserId=null;renderAdminPanel();">취소</button>
    </div>
  </div>`;
}

function adminEditUser(id) {
  editingUserId = editingUserId === id ? null : id;
  renderAdminPanel();
}

function adminSaveEdit(id) {
  const idx = state.users.findIndex(u => u.id === id);
  if (idx === -1) return;

  const label = document.getElementById('edit-label').value.trim();
  const pw = document.getElementById('edit-pw').value.trim();
  const role = document.getElementById('edit-role').value;
  const canEditVal = document.getElementById('edit-canedit').checked;
  const actors = role === 'actor' ?
    [...document.querySelectorAll('.edit-actor-chk:checked')].map(c => c.value) : [];

  if (role === 'actor' && actors.length === 0) { showToast('담당 배우를 선택해주세요'); return; }

  state.users[idx].label = label || id;
  state.users[idx].role = role;
  state.users[idx].canEdit = canEditVal;
  state.users[idx].actors = actors;
  if (pw) state.users[idx].pw = pw;

  saveUsers();
  editingUserId = null;
  showToast(`${id} 계정이 수정되었습니다`);
  renderAdminPanel();
}

function toggleActorPick(role) {
  document.getElementById('new-user-actors-section').style.display=role==='actor'?'':'none';
}

function adminAddUser() {
  const id=document.getElementById('new-user-id').value.trim();
  const pw=document.getElementById('new-user-pw').value.trim();
  const label=document.getElementById('new-user-label').value.trim();
  const role=document.getElementById('new-user-role').value;
  const canEditVal=document.getElementById('new-user-canedit').checked;
  const actors=role==='actor'?
    [...document.querySelectorAll('#new-user-actors input:checked')].map(c=>c.value):[];

  if (!id||!pw) { showToast('아이디와 비밀번호를 입력해주세요'); return; }
  if (state.users.find(u=>u.id===id)) { showToast('이미 존재하는 아이디입니다'); return; }
  if (role==='actor'&&actors.length===0) { showToast('담당 배우를 선택해주세요'); return; }

  state.users.push({ id, pw, role, actors, canEdit:canEditVal, label:label||id });
  saveUsers();
  showToast(`${id} 계정이 추가되었습니다`);
  renderAdminPanel();
}

function adminDeleteUser(id) {
  if (!confirm(`"${id}" 계정을 삭제하시겠습니까?`)) return;
  state.users=state.users.filter(u=>u.id!==id);
  saveUsers();
  showToast('삭제되었습니다');
  renderAdminPanel();
}

// ═══════════════════════════════════════════════════
//  SERVER SYNC (Google Apps Script)
// ═══════════════════════════════════════════════════
let autoSyncTimer = null;

function startAutoSync() {
  stopAutoSync();
  // 30초마다 백그라운드 동기화
  autoSyncTimer = setInterval(() => { syncFromServer(false); }, 30000);
}
function stopAutoSync() {
  if (autoSyncTimer) { clearInterval(autoSyncTimer); autoSyncTimer = null; }
}

async function manualSync() {
  const btn = document.getElementById('sync-btn');
  if (btn) { btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; }
  await syncFromServer(true);
  if (btn) {
    btn.style.opacity = '1'; btn.style.pointerEvents = '';
    // 잠깐 체크 표시
    btn.textContent = '✅';
    setTimeout(() => { btn.textContent = '🔄'; }, 1200);
  }
}

async function syncFromServer(showIndicator) {
  if (!state.apiUrl) return;
  if (showIndicator) showToast('🔄 불러오는 중...');
  try {
    const res = await fetch(state.apiUrl + '?action=load&key=' + API_KEY + '&t=' + Date.now());
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.error) throw new Error('인증 오류: ' + data.error);

    if (Array.isArray(data.events)) {
      state.events = data.events;
      saveEvents();
      renderCurrentView();
      if (showIndicator) showToast('✅ 완료 (' + data.events.length + '개)');
    }
  } catch(e) {
    if (showIndicator) showToast('❌ 실패: ' + e.message);
  }
}

async function pushAllToServer(showIndicator) {
  if (!state.apiUrl) return false;
  if (showIndicator) showToast('📤 서버에 저장 중...');
  try {
    const res = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'save', key: API_KEY, events: state.events })
    });
    const text = await res.text();
    const data = JSON.parse(text);
    if (showIndicator) showToast(data.ok ? '✅ 서버에 저장됐습니다 (' + state.events.length + '개)' : '❌ 저장 실패');
    return !!data.ok;
  } catch(e) {
    if (showIndicator) showToast('❌ 저장 실패: ' + e.message);
    return false;
  }
}

function saveAndSync() {
  saveEvents();
  pushAllToServer(false);
}

// 동기화 설정 패널
function openSyncSettings() {
  const existing = document.getElementById('sync-settings-sheet');
  if (!existing) {
    const sheet = document.createElement('div');
    sheet.className = 'bottom-sheet';
    sheet.id = 'sync-settings-sheet';
    sheet.innerHTML = `
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">🔗 동기화 설정</div>
        <button class="sheet-close" onclick="hideSheet('sync-settings-sheet')">✕</button>
      </div>
      <div class="sheet-body">
        <p style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;">
          여러 기기에서 일정을 공유하려면<br>Google Apps Script 웹앱 URL을 입력하세요.
        </p>
        <div class="form-section">
          <label class="form-label">Apps Script 웹앱 URL</label>
          <input type="url" class="form-input" id="sync-url-input"
            placeholder="https://script.google.com/macros/s/.../exec"
            value="${state.apiUrl}">
        </div>
        <button class="btn-submit" onclick="saveSyncUrl()" style="margin-bottom:10px;">저장</button>
        <button class="btn-submit" onclick="syncFromServer(true)"
          style="background:var(--bg4);border:1px solid var(--border);color:var(--text2);margin-bottom:10px;">🔄 지금 동기화</button>
        <div id="sync-test-status" class="sync-status"></div>
      </div>`;
    document.body.appendChild(sheet);
    sheet.addEventListener('touchstart', e=>{let ty=e.touches[0].clientY; sheet.addEventListener('touchend',e2=>{if(e2.changedTouches[0].clientY-ty>80)hideSheet('sync-settings-sheet');},{once:true});},{passive:true});
  } else {
    document.getElementById('sync-url-input').value = state.apiUrl;
  }
  hideSheet('user-menu-sheet');
  showSheet('sync-settings-sheet');
}

function saveSyncUrl() {
  const url = document.getElementById('sync-url-input').value.trim();
  state.apiUrl = url;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({ apiUrl: url }));
  showToast('저장됨');
  if (url) syncFromServer(true);
  hideSheet('sync-settings-sheet');
}

// ═══════════════════════════════════════════════════
//  SHEET HELPERS
// ═══════════════════════════════════════════════════
function showSheet(id) {
  document.getElementById('overlay').classList.add('visible');
  document.getElementById(id).classList.add('visible');
  document.body.style.overflow='hidden';
}
function hideSheet(id) {
  document.getElementById(id).classList.remove('visible');
  if(!document.querySelector('.bottom-sheet.visible')) {
    document.getElementById('overlay').classList.remove('visible');
    document.body.style.overflow='';
  }
}
function closeAllSheets() {
  document.querySelectorAll('.bottom-sheet').forEach(s=>s.classList.remove('visible'));
  document.getElementById('overlay').classList.remove('visible');
  document.body.style.overflow='';
}

// Swipe-down to close
document.querySelectorAll('.bottom-sheet').forEach(sheet=>{
  let ty=0;
  sheet.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
  sheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ty>80)hideSheet(sheet.id);},{passive:true});
});

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastTimer=null;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// ═══════════════════════════════════════════════════
//  EXCEL EXPORT
// ═══════════════════════════════════════════════════
function openExportSheet() {
  // 연도 목록 자동 생성
  const years = [...new Set(state.events.map(e => new Date(e.date).getFullYear()))];
  const curYear = new Date().getFullYear();
  if (!years.includes(curYear)) years.push(curYear);
  years.sort((a,b) => b - a);

  const yearSel = document.getElementById('export-year');
  yearSel.innerHTML = years.map(y =>
    `<option value="${y}" ${y===state.year?'selected':''}>${y}년</option>`
  ).join('');
  document.getElementById('export-month').value = state.month;
  document.getElementById('export-actor').value =
    (state.selectedActor !== 'all' && ACTOR_LIST.includes(state.selectedActor)) ? state.selectedActor : 'all';
  document.getElementById('export-period').value = 'month';
  document.getElementById('export-month-wrap').style.display = '';
  document.getElementById('export-year-wrap').style.display = '';
  document.getElementById('export-staff-name').value = '';
  document.getElementById('export-status').textContent = '';
  hideSheet('user-menu-sheet');
  showSheet('export-sheet');
}

function onExportPeriodChange() {
  const p = document.getElementById('export-period').value;
  document.getElementById('export-month-wrap').style.display = p === 'month' ? '' : 'none';
  document.getElementById('export-year-wrap').style.display  = p === 'all'   ? 'none' : '';
}

function generateExcel() {
  if (typeof XLSX === 'undefined') {
    showToast('❌ 라이브러리 로딩 중... 잠시 후 다시 시도해주세요');
    return;
  }
  const statusEl = document.getElementById('export-status');
  statusEl.textContent = '⏳ 생성 중...';

  const period      = document.getElementById('export-period').value;
  const year        = parseInt(document.getElementById('export-year')?.value || new Date().getFullYear());
  const month       = parseInt(document.getElementById('export-month').value);
  const actorFilter = document.getElementById('export-actor').value;
  const staffFilter = document.getElementById('export-staff-name').value.trim().toLowerCase();
  const DOW = ['일','월','화','수','목','금','토'];

  // ── 이벤트 필터링 ──
  let evts = state.events.filter(ev => {
    const d = new Date(ev.date);
    if (period === 'month' && (d.getFullYear() !== year || d.getMonth() !== month)) return false;
    if (period === 'year'  &&  d.getFullYear() !== year)                             return false;
    if (actorFilter !== 'all' && ev.actor !== actorFilter)                           return false;
    if (staffFilter) {
      if (!ev.staff) return false;
      try {
        const obj = JSON.parse(ev.staff);
        return STAFF_CATS.some(c => (obj[c]||[]).some(item => {
          const nm = typeof item === 'string' ? item : (item.name||'');
          return nm.toLowerCase().includes(staffFilter);
        }));
      } catch(e) { return false; }
    }
    return true;
  }).sort((a,b) => a.date !== b.date ? a.date.localeCompare(b.date) : (a.startTime||'').localeCompare(b.startTime||''));

  const wb = XLSX.utils.book_new();

  // ══ Sheet 1: 전체 일정 ══════════════════════════
  const rows1 = [['날짜','요일','배우','유형','제목','시작','종료','장소','동행/스텝','스텝 총 근무시간(h)','메모']];
  evts.forEach(ev => {
    const d = new Date(ev.date);
    let staffStr = '', totalHours = 0;
    if (ev.staff) {
      try {
        const obj = JSON.parse(ev.staff); const parts = [];
        STAFF_CATS.forEach(c => (obj[c]||[]).forEach(item => {
          const nm = typeof item === 'string' ? item : (item.name||'');
          const hr = typeof item === 'string' ? 0 : (parseFloat(item.hours)||0);
          if (!nm) return;
          parts.push(hr ? `${nm}(${hr}h)` : nm);
          totalHours += hr;
        }));
        staffStr = parts.join(', ');
      } catch(e) {}
    }
    rows1.push([ev.date, DOW[d.getDay()], ev.actor, ev.type, ev.title,
      ev.startTime||'', ev.endTime||'', ev.location||'',
      staffStr, totalHours||'', ev.memo||'']);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols'] = [{wch:12},{wch:5},{wch:8},{wch:8},{wch:25},{wch:8},{wch:8},{wch:15},{wch:45},{wch:18},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, '전체일정');

  // ══ Sheet 2: 스텝 근무 내역 (1인 1행) ══════════
  const rows2 = [['날짜','요일','배우','유형','제목','시작','종료','장소','카테고리','스텝 이름','근무시간(h)']];
  evts.forEach(ev => {
    const d = new Date(ev.date);
    if (!ev.staff) return;
    try {
      const obj = JSON.parse(ev.staff);
      STAFF_CATS.forEach(c => (obj[c]||[]).forEach(item => {
        const nm = typeof item === 'string' ? item : (item.name||'');
        const hr = typeof item === 'string' ? '' : (item.hours !== '' && item.hours != null ? parseFloat(item.hours) : '');
        if (!nm) return;
        if (staffFilter && !nm.toLowerCase().includes(staffFilter)) return;
        rows2.push([ev.date, DOW[d.getDay()], ev.actor, ev.type, ev.title,
          ev.startTime||'', ev.endTime||'', ev.location||'', c, nm, hr]);
      }));
    } catch(e) {}
  });
  const ws2 = XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols'] = [{wch:12},{wch:5},{wch:8},{wch:8},{wch:25},{wch:8},{wch:8},{wch:15},{wch:12},{wch:15},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, '스텝근무내역');

  // ══ Sheet 3: 스텝별 요약 (이름별 총 시간) ═══════
  const summary = {};
  evts.forEach(ev => {
    if (!ev.staff) return;
    try {
      const obj = JSON.parse(ev.staff);
      STAFF_CATS.forEach(c => (obj[c]||[]).forEach(item => {
        const nm = typeof item === 'string' ? item : (item.name||'');
        const hr = typeof item === 'string' ? 0 : (parseFloat(item.hours)||0);
        if (!nm) return;
        if (staffFilter && !nm.toLowerCase().includes(staffFilter)) return;
        const key = nm + '|' + c;
        if (!summary[key]) summary[key] = {name:nm, cat:c, hours:0, cnt:0};
        summary[key].hours += hr;
        summary[key].cnt++;
      }));
    } catch(e) {}
  });
  const rows3 = [['스텝 이름','카테고리','참여 일정 수','총 근무시간(h)']];
  Object.values(summary)
    .sort((a,b) => (b.hours - a.hours) || a.name.localeCompare(b.name))
    .forEach(s => rows3.push([s.name, s.cat, s.cnt, s.hours||'']));
  const ws3 = XLSX.utils.aoa_to_sheet(rows3);
  ws3['!cols'] = [{wch:15},{wch:15},{wch:15},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws3, '스텝별요약');

  // 파일명
  let fname = 'MYM스케줄';
  if (actorFilter !== 'all') fname += '_' + actorFilter;
  if (period === 'month')      fname += '_' + year + '년' + (month+1) + '월';
  else if (period === 'year')  fname += '_' + year + '년';
  else                         fname += '_전체';
  if (staffFilter) fname += '_' + staffFilter;
  fname += '.xlsx';

  XLSX.writeFile(wb, fname);
  statusEl.textContent = '✅ ' + fname + ' 다운로드됨';
  showToast('✅ 엑셀 다운로드 완료');
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
// ── 앱 버전 체크: 서버 version.json과 비교해 캐시 강제 갱신 ──
(async function checkVersion() {
  const VERSION_KEY = 'mym_cached_version';
  try {
    // 캐시·SW 무시하고 서버에서 직접 가져옴
    const res = await fetch('./version.json', { cache: 'no-store' });
    const { version } = await res.json();
    const stored = localStorage.getItem(VERSION_KEY);
    if (stored !== version) {
      // 버전이 다르면 SW + 캐시 전부 삭제 후 새로고침
      localStorage.setItem(VERSION_KEY, version);
      const unregAll = 'serviceWorker' in navigator
        ? navigator.serviceWorker.getRegistrations()
            .then(regs => Promise.all(regs.map(r => r.unregister())))
        : Promise.resolve();
      const clearAll = caches.keys()
        .then(keys => Promise.all(keys.map(k => caches.delete(k))));
      await Promise.all([unregAll, clearAll]);
      window.location.reload(true);
      return; // 아래 SW 등록 안 함
    }
  } catch(e) {} // 오프라인이면 그냥 진행

  // SW 등록 (오프라인 지원)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.log('SW 등록 실패:', err));
  }
})();

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
loadAll();
if (tryAutoLogin()) {
  // 로그인 유지 상태 → 바로 캘린더 진입
  startApp();
} else {
  document.getElementById('login-screen').style.display='flex';
}

// Enter key on login
document.getElementById('login-pw').addEventListener('keydown', e => {
  if (e.key==='Enter') doLogin();
});
</script>
