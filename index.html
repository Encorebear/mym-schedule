<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="스케줄">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="favicon.png">
<title>스케줄</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535; --bg4: #252d3d;
    --border: #2a3347; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #3b82f6; --danger: #ef4444; --success: #22c55e; --warn: #f59e0b;
    --minho: #60a5fa; --sujeong: #f472b6; --min: #a78bfa;
    --minji: #fbbf24; --seohyun: #34d399; --junseo: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-logo {
    font-size: 36px; font-weight: 800; letter-spacing: -1px;
    margin-bottom: 6px; color: var(--text);
  }
  .login-logo span { color: var(--accent); }
  .login-subtitle {
    font-size: 13px; color: var(--text3); margin-bottom: 40px;
  }
  .login-card {
    width: 100%; max-width: 340px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
  }
  .login-field { margin-bottom: 14px; }
  .login-label { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 6px; display: block; }
  .login-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    padding: 12px 14px; font-family: inherit;
    transition: border-color 0.15s;
  }
  .login-input:focus { outline: none; border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 14px; background: var(--accent);
    border: none; border-radius: 10px; color: white;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
    transition: all 0.15s;
  }
  .login-btn:active { opacity: 0.85; transform: scale(0.98); }
  .login-error {
    font-size: 12px; color: var(--danger); margin-top: 10px;
    text-align: center; min-height: 18px;
  }
  .login-version { font-size: 11px; color: var(--text3); margin-top: 24px; }

  /* ── MAIN APP ── */
  #main-app {
    display: none; flex-direction: column;
    height: 100dvh; overflow: hidden; padding-bottom: 0;
  }

  /* ── HEADER ── */
  .app-header {
    flex-shrink: 0; z-index: 100;
    background: rgba(15,17,23,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 12px 16px 10px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .app-title span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .user-badge {
    display: flex; align-items: center; gap: 5px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .user-badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px;
    color: var(--text2); font-size: 12px; cursor: pointer;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .btn-icon {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    color: var(--text2); font-size: 13px; cursor: pointer;
  }

  .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .month-label { font-size: 17px; font-weight: 700; min-width: 100px; text-align: center; cursor: pointer; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 14px; cursor: pointer;
  }
  .nav-btn:active { background: var(--bg4); transform: scale(0.92); }

  /* ── ACTOR FILTER ── */
  .actor-filter { flex-shrink: 0; padding: 8px 12px 0; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .actor-filter::-webkit-scrollbar { display: none; }
  .actor-chip {
    flex-shrink: 0; padding: 5px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 2px solid transparent; white-space: nowrap;
  }

  /* ── WEEKDAY ── */
  .weekday-header { flex-shrink: 0; display: grid; grid-template-columns: repeat(7, 1fr); padding: 6px 4px 3px; gap: 2px; }
  .weekday-label { text-align: center; font-size: 11px; font-weight: 700; color: var(--text2); padding: 2px 0; }

  /* ── CALENDAR ── */
  #calendar-view {
    flex: 1; min-height: 0; display: flex;
    flex-direction: column; overflow: hidden; padding: 0 4px 4px;
  }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px; flex: 1; min-height: 0; grid-auto-rows: 1fr;
  }
  #list-view { flex: 1; min-height: 0; overflow-y: auto; }
  .cal-day {
    background: var(--bg2); border-radius: 6px;
    padding: 3px 3px 2px; cursor: pointer; border: 1px solid transparent;
    transition: background 0.15s;
    display: flex; flex-direction: column; overflow: hidden; min-height: 0;
  }
  .cal-day:active { background: var(--bg3); }
  .cal-day.other-month { opacity: 0.25; }
  .cal-day.today { border-color: var(--accent); }
  .day-num {
    font-size: 11px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  }
  .cal-day.today .day-num { background: var(--accent); color: white; }
  .holiday-label { font-size: 8px; color: #f87171; font-weight: 700; line-height: 1.1; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-dots {
    display: flex; flex-direction: column; gap: 1px;
    flex: 1; min-height: 0; overflow: hidden;
  }
  .event-dot {
    flex-shrink: 0; height: 15px; border-radius: 3px; font-size: 10px; font-weight: 700;
    padding: 0 3px; line-height: 15px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }
  .more-count { font-size: 8px; color: var(--text3); padding: 0 2px; flex-shrink: 0; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 24px; right: 16px; z-index: 200;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: white;
    box-shadow: 0 4px 20px rgba(59,130,246,0.5); transition: all 0.2s;
  }
  .fab:active { transform: scale(0.92); }
  .fab.hidden { display: none; }

  /* ── SHEETS ── */
  .sheet-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .sheet-overlay.visible { opacity: 1; pointer-events: all; }
  .bottom-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
    background: var(--bg2); border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    max-height: 92vh; display: flex; flex-direction: column;
  }
  .bottom-sheet.visible { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sheet-title { font-size: 16px; font-weight: 700; }
  .sheet-close {
    background: var(--bg3); border: none; border-radius: 50%;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 14px; cursor: pointer;
  }
  .sheet-body { overflow-y: auto; flex: 1; padding: 12px 16px 24px; -webkit-overflow-scrolling: touch; }

  /* ── EVENT CARDS ── */
  .event-card {
    background: var(--bg3); border-radius: 10px; border: 1px solid var(--border);
    padding: 12px; margin-bottom: 8px; position: relative;
    border-left: 3px solid transparent;
  }
  .event-card-actor { font-size: 11px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .event-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .event-card-meta { font-size: 12px; color: var(--text2); display: flex; flex-wrap: wrap; gap: 6px; }
  .event-card-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-edit, .btn-delete {
    flex: 1; padding: 6px; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  }
  .btn-edit { background: var(--bg4); color: var(--text2); }
  .btn-delete { background: rgba(239,68,68,0.1); color: var(--danger); border-color: rgba(239,68,68,0.3); }
  .no-events { text-align: center; color: var(--text3); padding: 32px 0; font-size: 13px; }

  /* ── FORM ── */
  .form-section { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; padding: 10px 12px;
    font-family: inherit; -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-select option { background: var(--bg2); }
  .form-textarea { resize: none; height: 72px; line-height: 1.5; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .actor-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .actor-select-btn {
    padding: 8px 4px; border-radius: 8px; border: 2px solid var(--border);
    background: var(--bg3); color: var(--text2); font-size: 12px;
    font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .actor-select-btn.disabled { opacity: 0.3; cursor: not-allowed; }

  .type-select-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .type-select-btn {
    padding: 7px 4px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2); font-size: 11px;
    cursor: pointer; text-align: center; line-height: 1.3;
  }
  .type-select-btn.selected { background: rgba(59,130,246,0.2); border-color: var(--accent); color: var(--accent); }

  .btn-submit {
    width: 100%; padding: 14px; background: var(--accent); border: none;
    border-radius: 10px; color: white; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 4px;
  }
  .btn-submit:active { opacity: 0.85; transform: scale(0.98); }

  /* ── LIST VIEW ── */
  .list-view { padding: 8px 12px; }
  .list-date-group { margin-bottom: 16px; }
  .list-date-label { font-size: 12px; font-weight: 700; color: var(--text3); margin-bottom: 6px; }
  .list-event-card {
    background: var(--bg2); border-radius: 10px; border: 1px solid var(--border);
    padding: 10px 12px; margin-bottom: 6px; display: flex;
    align-items: flex-start; gap: 10px; cursor: pointer;
  }
  .list-event-bar { width: 3px; border-radius: 2px; min-height: 36px; flex-shrink: 0; align-self: stretch; }
  .list-event-content { flex: 1; min-width: 0; }
  .list-event-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .list-event-meta { font-size: 11px; color: var(--text3); }

  /* ── ADMIN PANEL ── */
  .admin-section { margin-bottom: 24px; }
  .admin-section-title {
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
  }
  .user-row {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .user-row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .user-row-info { flex: 1; min-width: 0; }
  .user-row-name { font-size: 13px; font-weight: 600; }
  .user-row-role { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .user-row-actions { display: flex; gap: 6px; }
  .btn-small {
    padding: 5px 10px; border-radius: 6px; font-size: 11px;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg4); color: var(--text2);
  }
  .btn-small.danger { color: var(--danger); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.1); }

  .add-user-form {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-top: 10px;
  }
  .add-user-form .form-section { margin-bottom: 10px; }

  /* ── SETTINGS / USER MENU ── */
  .menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; font-size: 14px; color: var(--text);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item .menu-icon { font-size: 18px; width: 28px; text-align: center; }
  .menu-item.danger { color: var(--danger); }
  .menu-item .menu-arrow { margin-left: auto; color: var(--text3); font-size: 12px; }

  .settings-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    padding: 10px 12px; font-family: inherit; margin-bottom: 8px;
  }
  .settings-input:focus { outline: none; border-color: var(--accent); }
  .sync-status { font-size: 12px; color: var(--text3); text-align: center; margin-top: 4px; }
  .sync-status.ok { color: var(--success); }
  .sync-status.err { color: var(--danger); }

  /* ── STAFF TAGS ── */
  .staff-category { background: var(--bg3); border-radius: 10px; padding: 8px 10px; }
  .staff-cat-label { font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 6px; }
  .staff-tags-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .staff-tag {
    display: flex; align-items: center; gap: 4px;
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 8px 3px 10px; font-size: 12px;
  }
  .staff-tag-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; line-height: 1; padding: 0 2px; }
  .staff-add-row { display: flex; gap: 5px; margin-top: 4px; }
  .staff-add-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 12px;
    padding: 5px 9px; font-family: inherit;
  }
  .staff-add-input:focus { outline: none; border-color: var(--accent); }
  .staff-add-btn {
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text2); font-size: 18px; font-weight: 300;
    cursor: pointer; padding: 3px 10px; line-height: 1;
  }
  .staff-add-btn:active { background: var(--accent); color: white; }

  /* ── VEHICLE ── */
  .vehicle-btn {
    background: var(--bg3); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text2); font-size: 12px;
    padding: 6px 10px; cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .vehicle-btn.selected {
    background: var(--accent); border-color: var(--accent); color: white; font-weight: 600;
  }

  /* ── 엑셀 내보내기 멀티셀렉트 버튼 ── */
  .export-toggle-btn {
    background: var(--bg3); border: 1.5px solid var(--border);
    border-radius: 7px; color: var(--text2); font-size: 12px;
    padding: 5px 8px; cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .export-toggle-btn.selected {
    background: var(--accent); border-color: var(--accent); color: white; font-weight: 600;
  }

  /* ── 매니저 선택 버튼 ── */
  .manager-btn {
    background: var(--bg3); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text2); font-size: 13px;
    padding: 7px 14px; cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .manager-btn.selected {
    background: var(--accent); border-color: var(--accent); color: white; font-weight: 600;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg4); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-weight: 500;
    padding: 8px 16px; border-radius: 20px;
    z-index: 999; opacity: 0; pointer-events: none;
    transition: all 0.25s; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .badge-admin { background: rgba(245,158,11,0.2); color: var(--warn); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .badge-actor { background: rgba(59,130,246,0.15); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .badge-viewer { background: rgba(100,116,139,0.2); color: var(--text3); padding: 1px 6px; border-radius: 4px; font-size: 10px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; z-index: 200; safe-area-inset-bottom: env(safe-area-inset-bottom);
  }
  .bottom-nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 2px; background: none; border: none;
    color: var(--text3); font-size: 10px; cursor: pointer; transition: color 0.2s;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .bottom-nav-btn .nav-icon { font-size: 22px; line-height: 1; }
  .bottom-nav-btn.active { color: var(--accent); }

  /* ── VEHICLE SCREEN ── */
  #vehicle-screen {
    display: none; min-height: 100vh; padding-bottom: 72px; background: var(--bg);
    flex-direction: column;
  }
  .veh-screen-header {
    background: var(--bg2); padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .vehicle-cards-grid { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .vehicle-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .vehicle-card:active { border-color: var(--accent); }
  .vehicle-card-icon { font-size: 28px; }
  .vehicle-card-info { flex: 1; min-width: 0; }
  .vehicle-card-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .vehicle-card-plate { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .vehicle-card-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .vehicle-card-days {
    font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .days-fresh { background: rgba(34,197,94,0.15);  color: #22c55e; }
  .days-warn  { background: rgba(245,158,11,0.15); color: var(--warn); }
  .days-old   { background: rgba(239,68,68,0.15);  color: var(--danger); }
  .days-none  { background: rgba(100,116,139,0.15); color: var(--text3); }

  /* filter row */
  .veh-filter-row {
    display: flex; gap: 6px; padding: 4px 12px 10px; overflow-x: auto; flex-shrink: 0;
  }
  .veh-filter-btn {
    padding: 5px 14px; border-radius: 16px; border: 1px solid var(--border);

  /* wash records */
  .wash-records-section { padding: 0 12px 12px; }

  .wash-record-item {
    background: var(--bg2); border: 1px solid var(--border);

  .wb-손세차   { background: rgba(59,130,246,0.2);  color: #60a5fa; }
  .wb-자동세차 { background: rgba(167,139,250,0.2); color: #a78bfa; }

  /* wash form */
  .wash-type-grid { display: flex; gap: 6px; flex-wrap: wrap; }

    flex: 1; min-width: calc(33% - 4px); padding: 9px 4px;

    font-size: 12px; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .wash-type-btn.selected {
    border-color: var(--accent); background: rgba(59,130,246,0.15); color: var(--accent);
  }

  /* ── 일정 완료 ── */
  .event-card.completed { border-left-width: 4px; }
  .event-card.completed .event-card-title { text-decoration: line-through; color: var(--text2); }
  .completed-badge {
    display:inline-block; font-size:10px; font-weight:700;
    background:rgba(34,197,94,0.18); color:#22c55e;
    border-radius:10px; padding:1px 8px; margin-left:6px; vertical-align:middle;
  }
  .btn-complete {
    flex:1; padding:7px 4px; border-radius:8px; border:1px solid rgba(34,197,94,0.4);
    background:rgba(34,197,94,0.1); color:#22c55e;
    font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s;
  }
  .btn-complete:active { background:rgba(34,197,94,0.25); }
  .btn-uncomplete {
    flex:1; padding:7px 4px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg3); color:var(--text3);
    font-size:12px; cursor:pointer; transition:all 0.15s;
  }
  .event-dot.done { opacity:0.45; text-decoration:line-through; }

  /* ── CUSTOM DATE / TIME PICKER ── */
  .picker-bg {
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .picker-sheet {
    background:var(--bg2); border-radius:20px 20px 0 0; width:100%; max-width:420px;
    padding:20px 16px 28px; animation:slideUpP 0.22s ease; max-height:92vh; overflow-y:auto;
  }
  @keyframes slideUpP { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .picker-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
  .picker-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .picker-month-label { font-size:16px; font-weight:700; color:var(--text); }
  .picker-nav-btn { background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text2); width:34px; height:34px; cursor:pointer; font-size:18px; line-height:1; }
  .dp-dow-row { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px; }
  .dp-dow { text-align:center; font-size:11px; color:var(--text3); padding:4px 0; font-weight:600; }
  .dp-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .dp-day {
    text-align:center; padding:8px 2px; border-radius:8px;
    font-size:13px; cursor:pointer; color:var(--text2); transition:background 0.1s;
  }
  .dp-day:active { background:var(--bg4); }
  .dp-day.empty { pointer-events:none; }
  .dp-day.other-m { color:var(--text3); opacity:0.35; }
  .dp-day.is-today { color:var(--accent); font-weight:700; }
  .dp-day.is-sel { background:var(--accent) !important; color:white !important; font-weight:700; border-radius:50%; }
  .dp-day.is-holiday { color:#f87171; }
  .dp-day.is-sat { color:#a78bfa; }

  .tp-display { text-align:center; font-size:36px; font-weight:700; color:var(--text); padding:8px 0 16px; letter-spacing:3px; }
  .tp-section-label { font-size:11px; color:var(--text3); font-weight:600; margin-bottom:8px; }
  .tp-grid { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:16px; }
  .tp-cell {
    padding:8px 0; border-radius:8px; background:var(--bg3); border:1px solid var(--border);
    color:var(--text2); font-size:13px; cursor:pointer; text-align:center;
    min-width:44px; flex:1; transition:all 0.1s; max-width:52px;
  }
  .tp-cell.sel { background:var(--accent); border-color:var(--accent); color:white; font-weight:700; }
  .tp-cell:active { opacity:0.7; }
  .picker-confirm-row { display:flex; gap:8px; margin-top:4px; }
  .picker-cancel-btn { flex:1; padding:12px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:var(--text2); font-size:14px; cursor:pointer; }
  .picker-ok-btn { flex:2; padding:12px; background:var(--accent); border:none; border-radius:10px; color:white; font-size:14px; font-weight:700; cursor:pointer; }
  .picker-input { cursor:pointer; caret-color:transparent; user-select:none; }

  /* ── 완료 확인 모달 ── */
  /* ── 일정 상세보기 모달 ── */
  .ev-detail-bg {
    position:fixed; inset:0; z-index:900; background:rgba(0,0,0,0.65);
    display:flex; align-items:center; justify-content:center; padding:16px;
  }
  .ev-detail-modal {
    background:var(--bg2); border-radius:20px; width:100%; max-width:480px;
    max-height:88vh; overflow-y:auto; padding:24px 20px 20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp .22s ease;
  }
  .ev-detail-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
  .ev-detail-close { background:var(--bg4); border:none; color:var(--text2); font-size:18px; width:32px; height:32px; border-radius:50%; cursor:pointer; flex-shrink:0; }
  .ev-detail-row { display:flex; gap:10px; align-items:flex-start; padding:9px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .ev-detail-row:last-child { border-bottom:none; }
  .ev-detail-icon { font-size:16px; flex-shrink:0; margin-top:1px; width:20px; text-align:center; }
  .ev-detail-label { color:var(--text3); font-size:11px; margin-bottom:2px; }
  .ev-detail-val { color:var(--text); line-height:1.6; }
  .ev-detail-staff-cat { color:var(--text3); font-size:11px; margin-bottom:3px; }
  .ev-detail-staff-line { color:var(--text2); font-size:13px; line-height:1.8; }
  .ev-detail-footer { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); font-size:11px; color:var(--text3); }

  .confirm-modal-bg {
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .confirm-modal {
    background:var(--bg2); border:1px solid var(--border); border-radius:16px;
    padding:24px 20px 20px; max-width:320px; width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.5); animation:modalPop 0.2s ease;
  }
  @keyframes modalPop {
    from { transform:scale(0.9); opacity:0; }
    to   { transform:scale(1);   opacity:1; }
  }
  .confirm-modal-icon { font-size:36px; text-align:center; margin-bottom:12px; }
  .confirm-modal-title {
    font-size:16px; font-weight:700; color:var(--text);
    text-align:center; margin-bottom:10px;
  }
  .confirm-modal-warn {
    background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.3);
    border-radius:10px; padding:12px 14px; margin-bottom:18px;
    font-size:12px; color:var(--warn); line-height:1.6;
  }
  .confirm-modal-warn-icon { font-size:15px; flex-shrink:0; margin-top:1px; }
  .confirm-modal-btns { display:flex; gap:8px; }
  .confirm-modal-cancel {
    flex:1; padding:11px; border-radius:10px; border:1px solid var(--border);
    background:var(--bg3); color:var(--text2); font-size:14px; cursor:pointer;
  }
  .confirm-modal-ok {
    flex:1; padding:11px; border-radius:10px; border:none;
    background:#22c55e; color:white; font-size:14px; font-weight:700; cursor:pointer;
  }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<body>

<!--  LOGIN SCREEN                              -->
<!-- ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-logo"><span>스케줄</span></div>
  <div class="login-subtitle">배우 스케줄 통합 관리 시스템</div>

    <div class="login-field">
      <label class="login-label">아이디</label>
      <input type="text" class="login-input" id="login-id" placeholder="아이디 입력" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    </div>
    <div class="login-field">
      <label class="login-label">비밀번호</label>
      <input type="password" class="login-input" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">

    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:12px;cursor:pointer;">

</div>

<!--  MAIN APP                                  -->
<!-- ══════════════════════════════════════════ -->
<div id="main-app">

  <!-- HEADER -->
  <div class="app-header">
    <div class="header-top">
      <div class="app-title"><span>스케줄</span></div>
      <div class="header-right">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-cal-view" onclick="setView('calendar')">📅</button>
          <button class="view-btn" id="btn-list-view" onclick="setView('list')">📋</button>
        </div>
        <button id="sync-btn" onclick="manualSync()" title="새로고침"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;

  <!-- CALENDAR / LIST -->

        <div class="actor-select-grid" id="form-actor-grid"></div>

      </div>

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const ACTORS = {
  'LMH':  { color: '#60a5fa', bg: 'rgba(96,165,250,0.85)',  textColor: 'white' },
  'LSJ':  { color: '#f472b6', bg: 'rgba(244,114,182,0.85)', textColor: 'white' },
  'KM':   { color: '#a78bfa', bg: 'rgba(167,139,250,0.85)', textColor: 'white' },
  'KMJ':  { color: '#d97706', bg: 'rgba(251,191,36,0.85)',  textColor: '#1a1200' },
  'LSH':  { color: '#10b981', bg: 'rgba(52,211,153,0.85)',  textColor: '#082d1f' },
  'PJS':  { color: '#f87171', bg: 'rgba(248,113,113,0.85)', textColor: 'white' },
  '매니저': { color: '#06b6d4', bg: 'rgba(6,182,212,0.85)',   textColor: 'white' },
  '기타':  { color: '#94a3b8', bg: 'rgba(148,163,184,0.85)', textColor: 'white' }
};
const ACTOR_LIST = Object.keys(ACTORS);
const EVENT_TYPES = { '촬영':'🎬','미팅':'📋','행사':'🎪','인터뷰':'🎤','이동':'✈️','홍보':'📸','광고':'📢','기타':'📌','비공개':'🔒' };
const PRIVATE_TYPE = '비공개'; // 관리자만 세부 내용 열람 가능

// ── 한국 공휴일 ──────────────────────────────────────
const HOLIDAYS_FIXED = {
  '01-01':'신정', '03-01':'삼일절', '05-01':'근로자의날',
  '05-05':'어린이날', '06-06':'현충일', '08-15':'광복절',
  '10-03':'개천절', '10-09':'한글날', '12-25':'크리스마스'
};
const HOLIDAYS_LUNAR = {
  // 2025
  '2025-01-28':'설날 연휴','2025-01-29':'설날','2025-01-30':'설날 연휴',
  '2025-05-06':'대체공휴일', // 어린이날+부처님오신날 겹침
  '2025-10-05':'추석 연휴','2025-10-06':'추석','2025-10-07':'추석 연휴',
  // 2026
  '2026-02-16':'설날 연휴','2026-02-17':'설날','2026-02-18':'설날 연휴',
  '2026-05-24':'부처님오신날',
  '2026-05-25':'대체공휴일', // 부처님오신날 다음날(일→월)
  '2026-09-24':'추석 연휴','2026-09-25':'추석','2026-09-26':'추석 연휴',
  '2026-09-28':'대체공휴일', // 추석연휴 토요일 대체
  // 2027
  '2027-02-05':'설날 연휴','2027-02-06':'설날','2027-02-07':'설날 연휴',
  '2027-05-13':'부처님오신날',
  '2027-09-14':'추석 연휴','2027-09-15':'추석','2027-09-16':'추석 연휴',
};
function getHoliday(dk) {
  return HOLIDAYS_LUNAR[dk] || HOLIDAYS_FIXED[dk.slice(5)] || null;
}

const STORAGE_KEY   = 'mym_events_v1';
const USERS_KEY     = 'mym_users_v1';
const SETTINGS_KEY  = 'mym_settings_v1';
const SESSION_KEY   = 'mym_session_v1';
const BACKUPS_KEY   = 'mym_backups_v1';  // 자동 스냅샷 저장소
const MAX_BACKUPS   = 10;                // 최대 보관 스냅샷 수
const API_KEY       = '';   // 실제 키는 Netlify 환경변수에 저장 (서버에서만 사용)
const DEFAULT_API   = '/.netlify/functions/api'; // 프록시를 통해 GAS URL 숨김

// ─── DEFAULT USERS ───────────────────────────────
// role: 'admin' | 'actor' | 'viewer'
// actors: array of actor names (empty = all for admin)
// canEdit: bool
// 기본 유저 목록 — 비밀번호 없음 (서버에서만 검증)
const DEFAULT_USERS = [];

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  selectedActor: 'all',
  view: 'calendar',
  events: [],
  users: [],
  currentUser: null,
  sessionToken: null,
  apiUrl: '/.netlify/functions/api'
};

// ═══════════════════════════════════════════════════
//  STORAGE HELPERS
// ═══════════════════════════════════════════════════
function loadAll() {
  try { state.events = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { state.events = []; }
  try {
    const stored = JSON.parse(localStorage.getItem(USERS_KEY));
    state.users = stored && stored.length ? stored : JSON.parse(JSON.stringify(DEFAULT_USERS));
  } catch(e) { state.users = JSON.parse(JSON.stringify(DEFAULT_USERS)); }
    state.apiUrl = DEFAULT_API; // 항상 프록시 사용 (환경변수에서 실제 GAS URL 관리)
}
function saveEvents() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.events)); }
function saveUsers()  { localStorage.setItem(USERS_KEY, JSON.stringify(state.users)); pushUsersToServer(); }

// 유저 정보 서버 동기화
async function pushUsersToServer() {
  if (!state.apiUrl) return;
  // API 요청 헬퍼 (sessionToken 자동 포함)
  function _tok() { return state.sessionToken || ''; }
  function _apiGetUrl(action, extra) {
    return state.apiUrl + '?action=' + action + '&sessionToken=' + encodeURIComponent(_tok()) + (extra||'') + '&t=' + Date.now();
  }
  function _apiPostBody(obj) {
    return JSON.stringify(Object.assign({ sessionToken: _tok() }, obj));
  }

  try {
    // GAS saveUsers_는 u.pw 컬럼을 읽음. 프론트엔드는 password 필드도 사용하므로 정규화
    const usersForGas = state.users.map(u => Object.assign({}, u, { pw: u.pw || u.password || '' }));
    await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: _apiPostBody({ action: 'saveUsers', users: usersForGas })
    });
  } catch(e) {}
}
async function loadUsersFromServer() {
  if (!state.apiUrl) return;
  try {
    const tok = encodeURIComponent(state.sessionToken || '');
    const res = await fetch(state.apiUrl + '?action=loadUsers&sessionToken=' + tok + '&t=' + Date.now());
    const data = JSON.parse(await res.text());
    if (data.error === 'unauthorized') { return; } // 로그아웃 안 함 — 세션 만료 시 다음 동기화에서 처리
    if (Array.isArray(data.users) && data.users.length > 0) {
      // 관리자는 pw 포함 유지 (저장 시 비밀번호 유실 방지)
      state.users = data.users.map(function(u){
        const c = {...u};
        if (!isAdmin()) { delete c.password; delete c.pw; }
        return c;
      });
      localStorage.setItem(USERS_KEY, JSON.stringify(state.users));
    }
  } catch(e) {}
}

function getUser(id) { return state.users.find(u => u.id === id); }
function isAdmin() { return state.currentUser && state.currentUser.role === 'admin'; }
function canEdit() { return state.currentUser && state.currentUser.canEdit; }
// 비공개 일정: 관리자 또는 작성자 본인만 내용 열람 가능
function isHidden(ev) {
  if (ev.type !== PRIVATE_TYPE) return false;
  if (isAdmin()) return false;
  if (!state.currentUser) return true;
  // 작성자 본인
  if (ev.createdBy && ev.createdBy === state.currentUser.id) return false;
  return true;
}

// ═══════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════
// ── 로그인 시도 횟수 제한 (5회 실패 → 15분 잠금) ──
const LOGIN_LOCK_KEY = 'mym_login_lock';
const MAX_ATTEMPTS   = 999;   // 사실상 잠금 없음
const LOCK_DURATION  = 1 * 60 * 1000;

function getLockInfo() {
  try { return JSON.parse(localStorage.getItem(LOGIN_LOCK_KEY)) || {}; } catch(e) { return {}; }
}
function setLockInfo(obj) { localStorage.setItem(LOGIN_LOCK_KEY, JSON.stringify(obj)); }
function checkLock(id) { return null; }  // 잠금 기능 비활성화
function recordFailedAttempt(id) {}
function clearFailedAttempts(id) { localStorage.removeItem(LOGIN_LOCK_KEY); }
function getRemainingAttempts(id) { return 999; }

async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const remember = document.getElementById('login-remember').checked;
  const errEl = document.getElementById('login-error');

  if (!id || !pw) { errEl.textContent = '아이디와 비밀번호를 입력해주세요'; return; }

  const lockMsg = checkLock(id);
  if (lockMsg) { errEl.textContent = lockMsg; return; }

  errEl.textContent = '로그인 중...';

  try {
    const res = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'login', username: id, password: pw })
    });
    const data = JSON.parse(await res.text());

    if (!data.ok) {
      errEl.textContent = '로그인 실패: ' + (data.error || JSON.stringify(data));
      return;
    }

    clearFailedAttempts(id);
    // 비밀번호 없는 사용자 정보 + 세션 토큰만 저장
    state.currentUser = {
      id:      data.userId,
      role:    data.role,
      label:   data.label,
      actors:  data.actors || [],
      canEdit: data.canEdit !== false
    };
    state._sessionPw = pw; // 비밀번호 변경 검증용 (메모리에만 보관, localStorage 저장 안 함)
    state.sessionToken = data.token;

    const store = remember ? localStorage : sessionStorage;
    store.setItem(SESSION_KEY, JSON.stringify({ user: state.currentUser, token: data.token, remember }));
    if (!remember) localStorage.removeItem(SESSION_KEY);
    errEl.textContent = '';
    startApp();
  } catch(e) {
    errEl.textContent = '서버 연결 실패. 잠시 후 다시 시도해주세요.';
  }
}

function logout() {
  stopAutoSync();
  state.currentUser = null;
  localStorage.removeItem(SESSION_KEY);
  sessionStorage.removeItem(SESSION_KEY);
  closeAllSheets();
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('vehicle-screen').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
}

function tryAutoLogin() {
  // localStorage 먼저 확인 (로그인 유지), 없으면 sessionStorage
  try {
    let s = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (!s) s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (s && s.token && s.user) {
      state.currentUser  = s.user;
      state.sessionToken = s.token;
      return true;
    }
    // 구버전 세션 형식 (id만 저장된 경우) → 재로그인 필요
  } catch(e) {}
  return false;
}

function startApp() {
  const user = state.currentUser;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';

  // User badge
  const dot = document.getElementById('user-badge-dot');

  if (user.role === 'admin') {
    dot.style.background = '#f59e0b'; name.textContent = '관리자';
  } else if (user.actors && user.actors.length === 1) {
    const ac = ACTORS[user.actors[0]];
    dot.style.background = ac ? ac.color : '#3b82f6';
    name.textContent = user.actors[0];
  } else {
    dot.style.background = '#3b82f6'; name.textContent = user.label || user.id;
  }

  // FAB visibility (only if can edit)
  document.getElementById('fab').classList.toggle('hidden', !canEdit());

  if (user.role !== 'admin' && user.actors && user.actors.length === 1) {
    state.selectedActor = user.actors[0];

  }

  buildActorFilter();

function buildActorFilter() {
  const user = state.currentUser;
  const container = document.getElementById('actor-filter');

  // Which actors can this user see?
  let visibleActors;
  if (user.role === 'admin' || !user.actors || user.actors.length === 0) {
    visibleActors = ACTOR_LIST;
  } else {
    // ACTORS 딕셔너리에 존재하는 배우만 필터링 (없는 키는 스킵)
    visibleActors = user.actors.filter(a => ACTORS[a]);
    if (visibleActors.length === 0) visibleActors = ACTOR_LIST;
  }

  let html = '';
  if (visibleActors.length > 1) {
    html += `<div class="actor-chip" data-actor="all" onclick="filterActor('all')"
      style="background:var(--bg3);border-color:var(--accent);color:var(--accent);">전체</div>`;
  }
  visibleActors.forEach(actor => {
    const ac = ACTORS[actor];
    if (!ac) return; // 방어 코드: 알 수 없는 배우 스킵
    const isActive = state.selectedActor === actor;
    html += `<div class="actor-chip" data-actor="${actor}" onclick="filterActor('${actor}')"
      style="background:${ac.bg.replace('0.85','0.15')};color:${ac.color};border-color:${isActive ? ac.color : 'var(--border)'};">${actor}</div>`;
  });
  container.innerHTML = html;
  updateFilterHighlight();
}

function filterActor(actor) {
  state.selectedActor = actor;
  updateFilterHighlight();
  renderCurrentView();
}

function updateFilterHighlight() {
  document.querySelectorAll('.actor-chip').forEach(chip => {
    const a = chip.dataset.actor;
    const isActive = a === state.selectedActor;
    if (a === 'all') {
      chip.style.borderColor = isActive ? 'var(--accent)' : 'var(--border)';
      chip.style.color = isActive ? 'var(--accent)' : 'var(--text3)';
    } else {
      const ac = ACTORS[a];
      if (ac) chip.style.borderColor = isActive ? ac.color : 'var(--border)';
    }
  });
}

// ═══════════════════════════════════════════════════
//  CALENDAR RENDERING
// ═══════════════════════════════════════════════════
function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function getVisibleActors() {
  const user = state.currentUser;
  if (!user) return [];
  if (user.role === 'admin' || !user.actors || user.actors.length === 0) return ACTOR_LIST;
  return user.actors;
}

function getFilteredEvents() {
  const visible = getVisibleActors();
  return state.events.filter(e => {
    if (!visible.includes(e.actor)) return false;
    if (state.selectedActor !== 'all' && e.actor !== state.selectedActor) return false;
    return true;
  });
}

function getEventsForDate(dateStr) {
  return getFilteredEvents().filter(e => e.date === dateStr);
}

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  const today = dateKey(new Date());
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent = `${state.year}년 ${MONTHS[state.month]}`;

  // Build days array (Mon start)
  const days = [];
  const first = new Date(state.year, state.month, 1);
  let startDow = first.getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  for (let i = startDow - 1; i >= 0; i--) days.push({ date: new Date(state.year, state.month, -i), current: false });
  const dim = new Date(state.year, state.month + 1, 0).getDate();
  for (let d = 1; d <= dim; d++) days.push({ date: new Date(state.year, state.month, d), current: true });
  let si = 1; while (days.length % 7 !== 0) days.push({ date: new Date(state.year, state.month + 1, si++), current: false });

  let html = '';
  days.forEach(({ date, current }) => {
    const key = dateKey(date);
    const events = getEventsForDate(key);
    const isToday = key === today;
    const dow = date.getDay(); // 0=Sun,6=Sat
    const holiday = getHoliday(key);
    let cls = 'cal-day' + (!current ? ' other-month' : '') + (isToday ? ' today' : '');
    // 공휴일이면 빨간색, 일요일도 빨간색, 토요일은 보라색
    const dayColor = (holiday || dow === 0) ? 'color:#f87171' : (dow === 6 ? 'color:#a78bfa' : '');
    let dots = '';
    events.forEach(ev => {
      const ac = ACTORS[ev.actor] || {};
      const isPrivate = isHidden(ev);
      // 달력 표기: [배우] 시간 제목 (왼쪽) | 매니저 (오른쪽 고정)
      const dotBg = ac.bg||'rgba(59,130,246,0.85)';
      const dotColor = ac.textColor||'white';
      const dotShadow = (ac.textColor==='white' || !ac.textColor) ? 'text-shadow:0 1px 2px rgba(0,0,0,0.4);' : '';
      const doneClass = ev.completed ? ' done' : '';
      const donePrefix = ev.completed ? '✅ ' : '';
      if (isPrivate) {
        const timePart = ev.startTime ? ev.startTime + ' ' : '';
        dots += `<div class="event-dot${doneClass}" style="background:${dotBg};color:${dotColor};${dotShadow}font-weight:700;">🔒 [${ev.actor}] ${timePart}</div>`;
      } else {
        const timePart = ev.startTime ? ev.startTime + ' ' : '';
        const mainLabel = `${donePrefix}[${ev.actor}] ${timePart}${ev.title}`;
        const mgrSpan = ev.manager
          ? `<span style="flex-shrink:0;margin-left:3px;opacity:0.9;">${ev.manager}</span>`
          : '';
        dots += `<div class="event-dot${doneClass}" style="background:${dotBg};color:${dotColor};${dotShadow}font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:2px;">` +
          `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;">${mainLabel}</span>` +
          mgrSpan +
          `</div>`;
      }
    });
    const holidayHtml = holiday ? `<div class="holiday-label">${holiday}</div>` : '';
    html += `<div class="${cls}" onclick="openDaySheet('${key}')">
      <div class="day-num" style="${dayColor}">${date.getDate()}</div>
      ${holidayHtml}<div class="event-dots">${dots}</div>
    </div>`;
  });
  grid.innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  LIST VIEW
// ═══════════════════════════════════════════════════
function renderList() {
  const container = document.getElementById('list-container');
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent = `${state.year}년 ${MONTHS[state.month]}`;

  const events = getFilteredEvents()
    .filter(e => { const d = new Date(e.date); return d.getFullYear()===state.year && d.getMonth()===state.month; })
    .sort((a,b) => a.date !== b.date ? a.date.localeCompare(b.date) : (a.startTime||'').localeCompare(b.startTime||''));

  if (!events.length) { container.innerHTML = '<div class="no-events" style="padding:40px 0;">이번 달 일정이 없습니다</div>'; return; }

  const groups = {};
  events.forEach(e => { if (!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });
  const DOW=['일','월','화','수','목','금','토'];
  let html='';
  Object.keys(groups).sort().forEach(ds => {
    const d=new Date(ds);
    html+=`<div class="list-date-group"><div class="list-date-label">${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})</div>`;
    groups[ds].forEach(ev => {
      const ac=ACTORS[ev.actor]||{};
      const t=ev.startTime?(ev.endTime?`${ev.startTime}~${ev.endTime}`:ev.startTime):'';
      const isPrivate = isHidden(ev);
      const isDoneList = !!ev.completed;
      html+=`<div class="list-event-card${isDoneList?' completed':''}" onclick="openDaySheet('${ev.date}')" style="${isDoneList?'opacity:0.55':''}">
        <div class="list-event-bar" style="background:${isDoneList?'#22c55e':(ac.color||'#3b82f6')}"></div>
        <div class="list-event-content">
          <div class="list-event-title" style="${isDoneList?'text-decoration:line-through;color:var(--text3)':''}">${isPrivate?`🔒 [${ev.actor}] ${ev.startTime?ev.startTime+' ':''}비공개${ev.manager?' · '+ev.manager:''}`:`${isDoneList?'✅ ':''} [${ev.actor}] ${ev.startTime?ev.startTime+' ':''}${ev.title}${ev.manager?' '+ev.manager:''}`}</div>
          <div class="list-event-meta">${isPrivate?`${ev.actor}${t?' · '+t:''}${ev.manager?' · 👤'+ev.manager:''}`:`${ev.actor}${t?' · '+t:''}${ev.manager?' · 👤'+ev.manager:''}${ev.location?' · 📍'+ev.location:''}`}</div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

function renderCurrentView() {
  if (state.view==='calendar') renderCalendar(); else renderList();
}

function setView(v) {
  state.view=v;
  document.getElementById('calendar-view').style.display=v==='calendar'?'':'none';
  document.getElementById('list-view').style.display=v==='list'?'':'none';
  document.getElementById('btn-cal-view').classList.toggle('active',v==='calendar');

function changeMonth(d) {
  state.month+=d;
  if(state.month>11){state.month=0;state.year++;}
  if(state.month<0){state.month=11;state.year--;}
  renderCurrentView();
}
function goToday() {
  state.year=new Date().getFullYear(); state.month=new Date().getMonth();
  renderCurrentView();
}

        </div>
        ${isDone?`<div style="margin-top:6px;font-size:11px;color:#22c55e;opacity:0.75;">탭하면 전체 내용을 볼 수 있습니다 →</div>`:''}
        ${!isDone && staffHtml?`<div style="margin-top:6px;font-size:12px;color:var(--text2);line-height:1.8;">👥 ${staffHtml}</div>`:''}
        ${!isDone && ev.memo?`<div style="margin-top:5px;font-size:12px;color:var(--text3);line-height:1.5;">📝 ${ev.memo}</div>`:''}
        <div class="event-card-actions" onclick="event.stopPropagation()">
          ${showComplete?`<button class="btn-complete" onclick="completeEvent('${ev.id}','${ds}')">✅ 일정완료</button>`:''}
          ${showEdit?`<button class="btn-edit" onclick="closeDaySheet();openEditSheet('${ev.id}')">✏️ 수정</button>`:''}
          ${showEdit?`<button class="btn-delete" onclick="deleteEvent('${ev.id}','${ds}')">🗑 삭제</button>`:''}
          ${showAdminEdit?`<button class="btn-uncomplete" onclick="uncompleteEvent('${ev.id}','${ds}')">↩ 완료취소</button>`:''}
          ${showAdminEdit?`<button class="btn-edit" onclick="closeDaySheet();openEditSheet('${ev.id}')">✏️ 수정</button>`:''}
          ${showAdminEdit?`<button class="btn-delete" onclick="deleteEvent('${ev.id}','${ds}')">🗑 삭제</button>`:''}

    html+=`<button class="btn-submit" style="font-size:13px;padding:10px;margin-top:8px;"

      <div class="confirm-modal-btns">

        <button class="confirm-modal-ok" id="del-ok" style="background:var(--danger);">삭제</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  document.getElementById('del-cancel').onclick = () => document.body.removeChild(bg);

    showToast('삭제되었습니다');

        <button class="confirm-modal-ok" id="cm-ok">완료 처리</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  document.getElementById('cm-cancel').onclick = () => document.body.removeChild(bg);
  bg.addEventListener('click', e => { if (e.target === bg) document.body.removeChild(bg); });
  document.getElementById('cm-ok').onclick = () => {
    document.body.removeChild(bg);
    const ev = state.events.find(e=>e.id===id);
    if (!ev) return;
    ev.completed = true;
    ev.completedAt = new Date().toISOString();
    ev.completedBy = state.currentUser ? state.currentUser.id : '';
    ev.updatedAt = new Date().toISOString(); // 병합 시 최신 버전 판별용
    logAudit('완료', ev);
    saveAndSync();
    renderCurrentView();
    renderDayBody(ds);
    showToast('✅ 일정완료 처리됐습니다');
  };
}

function uncompleteEvent(id, ds) {

  delete ev.completedBy;

  saveAndSync();
  renderCurrentView();
  renderDayBody(ds);

}

const STAFF_CATS = ['헤어','메이크업','스타일리스트','MYM','기타'];
let staffData = {};

function initStaffTags(existingStaff) {
  staffData = {};
  STAFF_CATS.forEach(c => staffData[c] = []);
  if (existingStaff) {
    try {
      // staff가 이미 객체인 경우(GAS에서 파싱되어 반환된 경우) 직접 사용, 문자열이면 JSON.parse
      const parsed = typeof existingStaff === 'string' ? JSON.parse(existingStaff) : existingStaff;
      if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
        STAFF_CATS.forEach(c => {
          staffData[c] = Array.isArray(parsed[c])
            ? parsed[c].map(item => typeof item === 'string' ? {name: item, startTime: '', endTime: '', hours: '', memo: ''} : item)
            : [];
        });
      }
    } catch(e) {
      // 문자열인 경우만 기타에 추가 (객체일 경우 .trim() 에러 방지)
      if (typeof existingStaff === 'string' && existingStaff.trim()) staffData['기타'] = [existingStaff.trim()];
    }
  }
  renderStaffTags();
}

function staffNameKeydown(e, ci) {
  if (e.key === 'Enter') { e.preventDefault(); addStaffTag(ci); }
}

function renderStaffTags() {
  const wrap = document.getElementById('staff-tags-wrap');
  if (!wrap) return;
  wrap.innerHTML = STAFF_CATS.map((cat, ci) => {
    const tags = (staffData[cat]||[]).map((item, ti) => {
      const nm = typeof item === 'string' ? item : (item.name||'');
      const st = typeof item === 'string' ? '' : (item.startTime||'');
      const en = typeof item === 'string' ? '' : (item.endTime||'');
      const hr = typeof item === 'string' ? '' : (item.hours||'');
      let badge = '';
      if (st && en) {
        badge = '<span style="background:rgba(99,179,237,0.2);color:#90cdf4;border-radius:3px;padding:0 4px;font-size:10px;margin-left:3px;">' + st + '~' + en + (hr ? ' (' + hr + 'h)' : '') + '</span>';
      } else if (hr) {
        badge = '<span style="background:rgba(99,179,237,0.2);color:#90cdf4;border-radius:3px;padding:0 4px;font-size:10px;margin-left:3px;">' + hr + 'h</span>';
      }
      var mo = typeof item === 'string' ? '' : (item.memo||'');
      if (mo) badge += '<span style="color:var(--text3);font-size:10px;margin-left:2px;" title="' + mo + '">📝</span>';
      return '<div class="staff-tag" style="cursor:pointer;" onclick="openStaffTimeModal(' + ci + ',' + ti + ')" title="클릭하여 근무시간 수정">' + nm + badge + '<button type="button" class="staff-tag-del" onclick="event.stopPropagation();removeStaffTag(' + ci + ',' + ti + ')">×</button></div>';
    }).join('');
    // ── 1줄 레이아웃: [카테고리] [이름입력] [00:00]~[00:00] [+]
    var row = '<div style="display:flex;align-items:center;gap:4px;">'
      + '<div class="staff-cat-label" style="width:54px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + cat + '">' + cat + '</div>'
      + '<input type="text" class="staff-add-input" id="sinput-' + ci + '" placeholder="이름" style="flex:2;min-width:0;" onkeydown="staffNameKeydown(event,' + ci + ')">'
      + '<input type="text" class="staff-add-input picker-input" id="sstart-' + ci + '" style="width:54px;flex-shrink:0;" placeholder="시간" title="시작시간" readonly onclick="openTimePicker(\'sstart-' + ci + '\')">'
      + '<span style="color:var(--text3);font-size:11px;flex-shrink:0;">~</span>'
      + '<input type="text" class="staff-add-input picker-input" id="send-' + ci + '" style="width:54px;flex-shrink:0;" placeholder="시간" title="종료시간" readonly onclick="openTimePicker(\'send-' + ci + '\')">'
      + '<button type="button" class="staff-add-btn" onclick="addStaffTag(' + ci + ')">+</button>'
      + '</div>';
    // 추가된 태그는 아래에 표시 (있을 때만)
    var tagsHtml = tags ? '<div class="staff-tags-row" style="padding-left:58px;margin-top:3px;">' + tags + '</div>' : '';
    return '<div class="staff-category" style="padding:6px 10px;">' + row + tagsHtml + '</div>';
  }).join('');
  syncStaffHidden();
}

function calcTimeHours(start, end) {
  if (!start || !end) return '';
  var s = start.split(':').map(Number), e = end.split(':').map(Number);
  var diff = (e[0]*60+e[1]) - (s[0]*60+s[1]);
  if (diff <= 0) diff += 1440; // 자정 넘기는 경우
  var h = diff / 60;
  return h === Math.floor(h) ? String(h) : h.toFixed(1);
}

function addStaffTag(ci) {
  var input  = document.getElementById('sinput-' + ci);
  var startEl = document.getElementById('sstart-' + ci);
  var endEl   = document.getElementById('send-' + ci);
  var name = input ? input.value.trim() : '';
  if (!name) return;
  var startTime = startEl ? startEl.value : '';
  var endTime   = endEl   ? endEl.value   : '';
  var hours = calcTimeHours(startTime, endTime);
  var cat = STAFF_CATS[ci];
  if (!staffData[cat]) staffData[cat] = [];
  staffData[cat].push({name: name, startTime: startTime, endTime: endTime, hours: hours, memo: ''});
  if (input)   input.value   = '';
  if (startEl) startEl.value = '';
  if (endEl)   endEl.value   = '';
  renderStaffTags();
  setTimeout(function(){ var el = document.getElementById('sinput-' + ci); if (el) el.focus(); }, 30);
}

var _stmCi = -1, _stmTi = -1;

function openStaffTimeModal(ci, ti) {
  var cat  = STAFF_CATS[ci];
  var item = staffData[cat] && staffData[cat][ti];
  if (!item) return;
  _stmCi = ci; _stmTi = ti;
  var nm = typeof item === 'string' ? item : (item.name||'');
  var st = typeof item === 'string' ? '' : (item.startTime||'');
  var en = typeof item === 'string' ? '' : (item.endTime||'');
  var mo = typeof item === 'string' ? '' : (item.memo||'');
  document.getElementById('stm-name').textContent = nm;
  document.getElementById('stm-start').value = st;
  document.getElementById('stm-end').value   = en;
  document.getElementById('stm-memo').value  = mo;
  calcStaffTime();
  document.getElementById('staff-time-overlay').style.display = 'block';
  document.getElementById('staff-time-modal').style.display   = 'block';
}

function calcStaffTime() {
  var st = document.getElementById('stm-start').value;
  var en = document.getElementById('stm-end').value;
  var el = document.getElementById('stm-calc');
  if (st && en) {
    var h = calcTimeHours(st, en);
    el.textContent = '총 근무시간: ' + h + '시간';
  } else {
    el.textContent = st || en ? '시작·종료 시간을 모두 입력하세요' : '';
  }
}

function saveStaffTime() {
  var cat  = STAFF_CATS[_stmCi];
  var item = staffData[cat] && staffData[cat][_stmTi];
  if (!item) return;
  var nm   = typeof item === 'string' ? item : (item.name||'');
  var st   = document.getElementById('stm-start').value;
  var en   = document.getElementById('stm-end').value;
  var mo   = document.getElementById('stm-memo').value.trim();
  var hours = calcTimeHours(st, en);
  staffData[cat][_stmTi] = {name: nm, startTime: st, endTime: en, hours: hours, memo: mo};
  closeStaffTimeModal();
  renderStaffTags();
  syncStaffHidden();
}

function closeStaffTimeModal() {
  document.getElementById('staff-time-overlay').style.display = 'none';
  document.getElementById('staff-time-modal').style.display   = 'none';
  _stmCi = -1; _stmTi = -1;
}

function removeStaffTag(ci, ti) {
  const cat = STAFF_CATS[ci];
  if (staffData[cat]) staffData[cat].splice(ti, 1);
  renderStaffTags();
}

function syncStaffHidden() {
  const hidden = document.getElementById('form-staff');
  if (hidden) hidden.value = JSON.stringify(staffData);
}

  document.querySelectorAll('.vehicle-btn').forEach(function(b) { b.classList.remove('selected'); });

  document.getElementById('form-vehicle-other').style.display = 'none';
  document.getElementById('form-vehicle-other').value = '';

  var known = ['161도1599','172우6258','12가5365'];

const MANAGERS_PRESET = ['김종호', '강동현', '한호석'];

function selectManager(val) {
  document.querySelectorAll('.manager-btn').forEach(function(b) { b.classList.remove('selected'); });

function formatStaffDisplay(staffJson) {
  if (!staffJson) return '';
  try {
    // staff가 이미 객체인 경우(GAS에서 파싱되어 반환) 직접 사용, 문자열이면 JSON.parse
    const obj = typeof staffJson === 'string' ? JSON.parse(staffJson) : staffJson;
    if (typeof obj !== 'object' || Array.isArray(obj)) return typeof staffJson === 'string' ? `<div>${staffJson}</div>` : '';
    return STAFF_CATS
      .filter(c => obj[c] && obj[c].length)
      .map(c => {
        const members = obj[c].map(item => {
          const nm = typeof item === 'string' ? item : (item.name||'');
          const st = typeof item === 'string' ? '' : (item.startTime||'');
          const en = typeof item === 'string' ? '' : (item.endTime||'');
          const hr = typeof item === 'string' ? '' : (item.hours||'');
          if (st && en) return nm + '(' + st + '~' + en + (hr ? ', ' + hr + 'h' : '') + ')';
          return hr ? nm + '(' + hr + 'h)' : nm;
        }).join(', ');
        return `<div><span style="color:var(--text3);font-size:10px;">${c}</span> ${members}</div>`;
      })
      .join('');
  } catch(e) {
    return typeof staffJson === 'string' && staffJson ? `<div>${staffJson}</div>` : '';
  }
}

function selectFormActor(actor) {
  document.getElementById('form-actor').value=actor;
  document.querySelectorAll('.actor-select-btn').forEach(b=>{
    const a=b.dataset.actor; const sel=a===actor;
    const ac=ACTORS[a]||{};
    b.style.background=sel?ac.bg?.replace('0.85','0.2')||'var(--bg4)':'';
    b.style.borderColor=sel?ac.color||'var(--accent)':'var(--border)';
    b.style.color=sel?ac.color||'var(--accent)':(b.classList.contains('disabled')?'var(--text3)':'var(--text2)');
  });
}
function selectFormType(type) {
  document.getElementById('form-type').value=type;
  document.querySelectorAll('.type-select-btn').forEach(b=>b.classList.toggle('selected',b.dataset.type===type));
}

function submitEventForm(e) {
  e.preventDefault();
  const actor=document.getElementById('form-actor').value;
  const type=document.getElementById('form-type').value;
  const date=document.getElementById('form-date').value;
  const title=document.getElementById('form-title').value.trim();
  if (!actor) { showToast('배우를 선택해주세요'); return; }
  if (!type)  { showToast('일정 유형을 선택해주세요'); return; }
  if (!title) { showToast('제목을 입력해주세요'); return; }

  // auto-flush any pending (unsubmitted) staff name inputs
  STAFF_CATS.forEach(function(cat, ci) {
    var nameEl = document.getElementById('sinput-' + ci);
    if (nameEl && nameEl.value.trim()) addStaffTag(ci);
  });
  syncStaffHidden();

  // resolve vehicle value
  var _vehChoice = document.getElementById('form-vehicle').value;
  var _vehOther  = document.getElementById('form-vehicle-other').value.trim();
  var _vehicleFinal = _vehChoice === '기타' ? (_vehOther || '기타') : _vehChoice;

  // resolve manager value
  var _mgrChoice = document.getElementById('form-manager').value;
  var _mgrOther  = (document.getElementById('form-manager-other').value||'').trim();
  var _managerFinal = _mgrChoice === '기타' ? (_mgrOther || '기타') : _mgrChoice;

  const existing = editingId ? state.events.find(e=>e.id===editingId) : null;
  const ev={
    id: editingId||'ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    actor, date, type, title,
    startTime:document.getElementById('form-start-time').value,
    endTime:document.getElementById('form-end-time').value,
    location:document.getElementById('form-location').value.trim(),
    vehicle:_vehicleFinal,
    manager:_managerFinal,
    staff:document.getElementById('form-staff').value,
    memo:document.getElementById('form-memo').value.trim(),
    createdBy: existing ? (existing.createdBy || state.currentUser.id) : state.currentUser.id,
    updatedAt:new Date().toISOString()
  };

  if (editingId) {
    const idx=state.events.findIndex(e=>e.id===editingId);
    if(idx!==-1) state.events[idx]=ev;
    logAudit('수정', ev, existing);
    showToast('수정되었습니다');
  } else {
    state.events.push(ev);
    logAudit('생성', ev);
    showToast('일정이 추가되었습니다');
  }
  saveAndSync();
  closeFormSheet();
  const d=new Date(ev.date);
  state.year=d.getFullYear(); state.month=d.getMonth();
  renderCurrentView();
}
function closeFormSheet() { hideSheet('form-sheet'); }

function openChangePw() {
  document.getElementById('pw-current').value='';
  document.getElementById('pw-new').value='';
  document.getElementById('pw-confirm').value='';
  document.getElementById('pw-error').textContent='';
  showSheet('changepw-sheet');
}

async function changePassword() {
  const cur=document.getElementById('pw-current').value;
  const nw=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-confirm').value;
  const errEl=document.getElementById('pw-error');
  const user=state.currentUser;

  // 클라이언트측 유효성 검사
  if (!cur) { errEl.textContent='현재 비밀번호를 입력하세요'; return; }
  if (nw.length<4) { errEl.textContent='비밀번호는 4자 이상이어야 합니다'; return; }
  if (nw!==cf) { errEl.textContent='새 비밀번호가 일치하지 않습니다'; return; }

  errEl.textContent='저장 중...';
  try {
    const res = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'changePassword', sessionToken: state.sessionToken, currentPassword: cur, newPassword: nw })
    });
    const data = JSON.parse(await res.text());
    if (!data.ok) {
      if (data.error === 'wrong_current_password') errEl.textContent='현재 비밀번호가 올바르지 않습니다';
      else errEl.textContent='비밀번호 변경 실패: ' + (data.error || 'unknown');
      return;
    }
  } catch(e) {
    errEl.textContent='서버 오류: ' + e.message;
    return;
  }

  // 서버 저장 성공 후 로컬 state 업데이트
  const idx=state.users.findIndex(u=>u.id===user.id);
  if(idx!==-1) {
    state.users[idx].password = nw;
    delete state.users[idx].pw;
  }
  state._sessionPw = nw; // 메모리 내 세션 비밀번호도 업데이트
  hideSheet('changepw-sheet');
  showToast('비밀번호가 변경되었습니다');
}

  state.users[idx].label = label || id;

async function logAudit(actionType, ev, oldEv) {
  if (!state.apiUrl || !state.sessionToken) return;
  const detailPayload = oldEv
    ? JSON.stringify({ before: oldEv, after: ev })
    : JSON.stringify(ev);
  const entry = {
    action: 'logAudit',
    sessionToken: state.sessionToken,
    timestamp: new Date().toISOString(),
    userId: state.currentUser ? state.currentUser.id : '',
    // GAS handleLogAudit_ 호환 필드
    auditAction: actionType,
    event: oldEv ? { ...ev, _before: oldEv } : ev,
    // 프론트엔드 자체 필드 (하위호환)
    actionType: actionType,
    eventId: ev.id || '',
    actor: ev.actor || '',
    title: ev.title || '',
    date: ev.date || '',
    details: detailPayload
  };
  try {
    await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(entry)
    });
  } catch(e) { /* 감사로그 실패는 무시 */ }
}

async function openAuditLog() {
  hideSheet('admin-sheet');
  document.getElementById('audit-sheet-body').innerHTML =
    '<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:13px;">불러오는 중...</div>';
  showSheet('audit-sheet');
  await loadAuditLog();
}

async function loadAuditLog() {
  const bodyEl = document.getElementById('audit-sheet-body');
  if (!state.apiUrl || !state.sessionToken) {
    bodyEl.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:13px;">서버 연결 필요</div>';
    return;
  }
  try {
    const res = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'loadAuditLog', sessionToken: state.sessionToken })
    });
    const text = await res.text();
    // HTML 오류 페이지 방어
    if (text.trim().startsWith('<')) {
      bodyEl.innerHTML = '<div style="padding:20px;color:#ef4444;">GAS 오류 — GAS 에디터에서 배포(기존 배포 편집)를 다시 해주세요.</div>';
      return;
    }
    const data = JSON.parse(text);
    if (!data.ok) {
      if (data.error === 'forbidden') { bodyEl.innerHTML = '<div style="padding:20px;color:#ef4444;">관리자 계정만 조회 가능합니다.</div>'; return; }
      bodyEl.innerHTML = '<div style="padding:20px;color:#ef4444;">로드 실패: ' + (data.error||'알 수 없는 오류') + '</div>';
      return;
    }
    renderAuditLog(data.logs || []);
  } catch(e) {
    bodyEl.innerHTML = '<div style="padding:20px;color:#ef4444;">오류: ' + e.message + '</div>';
  }
}

function renderAuditLog(logs) {
  const bodyEl = document.getElementById('audit-sheet-body');
  if (!logs.length) {
    bodyEl.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:13px;">기록이 없습니다</div>';
    return;
  }

  const actionIcon = { '생성':'➕', '수정':'✏️', '삭제':'🗑', '완료':'✅', '완료취소':'↩' };
  const actionColor = { '생성':'#22c55e', '수정':'#f59e0b', '삭제':'#ef4444', '완료':'#3b82f6', '완료취소':'#8b5cf6' };

  // 최신순 정렬
  const sorted = [...logs].reverse();

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div style="font-size:12px;color:var(--text3);">총 ${logs.length}건 · 최신순</div>
    <button onclick="loadAuditLog()" style="font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text2);cursor:pointer;">🔄 새로고침</button>
  </div>`;

  sorted.forEach(log => {
    // GAS 반환 필드명 정규화 (action→actionType, eventTitle→title, detail→details)
    const actionType_ = log.actionType || log.action || '';
    const title_ = log.title || log.eventTitle || '(제목없음)';
    const details_ = log.details || log.detail || '';
    // actor/date: 직접 필드 또는 detail JSON에서 파싱
    let actor_ = log.actor || '';
    let date_ = log.date || '';
    if (!actor_ || !date_) {
      try {
        const d = JSON.parse(details_);
        const src = d.after || d;
        if (!actor_) actor_ = src.actor || '';
        if (!date_) date_ = src.date || '';
      } catch(e) {}
    }

    const ts = log.timestamp ? new Date(log.timestamp) : null;
    const dateStr = ts ? `${ts.getFullYear()}.${String(ts.getMonth()+1).padStart(2,'0')}.${String(ts.getDate()).padStart(2,'0')} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}` : '-';
    const icon = actionIcon[actionType_] || '•';
    const color = actionColor[actionType_] || '#64748b';
    const actor = actor_ ? `<span style="font-size:11px;color:${(ACTORS[actor_]||{}).color||'#64748b'};background:${(ACTORS[actor_]||{}).color||'#64748b'}22;padding:1px 6px;border-radius:8px;margin-right:4px;">${actor_}</span>` : '';

    let detailHtml = '';
    if (details_ && actionType_ === '수정') {
      try {
        const d = JSON.parse(details_);
        const diffs = [];
        const fields = {title:'제목',date:'날짜',startTime:'시작',endTime:'종료',location:'장소',memo:'메모',manager:'담당자',type:'유형'};
        // { before, after } 또는 { _before, ...after } 형식 모두 지원
        const before_ = d.before || d._before || {};
        const after_ = d.after ? d.after : (d._before ? (()=>{const c={...d};delete c._before;return c;})() : d);
        Object.entries(fields).forEach(([k, label]) => {
          if (before_[k] !== after_[k]) {
            diffs.push(`<span style="color:var(--text3)">${label}:</span> <span style="color:#ef4444;text-decoration:line-through">${before_[k]||'-'}</span> → <span style="color:#22c55e">${after_[k]||'-'}</span>`);
          }
        });
        if (diffs.length) detailHtml = `<div style="font-size:11px;line-height:1.8;margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:6px;">${diffs.join('<br>')}</div>`;
      } catch(e) {}
    }

    html += `<div style="border-left:3px solid ${color};padding:8px 10px;margin-bottom:8px;background:var(--bg3);border-radius:0 8px 8px 0;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
        <span style="font-size:15px;">${icon}</span>
        <span style="font-size:12px;font-weight:700;color:${color};">${actionType_}</span>
        ${actor}
        <span style="font-size:11px;color:var(--text3);margin-left:auto;">${log.userId||''}</span>
      </div>
      <div style="font-size:13px;font-weight:500;color:var(--text1);">${title_}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px;">${date_} &nbsp;·&nbsp; ${dateStr}</div>
      ${detailHtml}
    </div>`;
  });

  bodyEl.innerHTML = html;
}

let autoSyncTimer = null;
let autoSnapshotTimer = null;

// ═══════════════════════════════════════════════════
//  BACKUP & RESTORE (자동 스냅샷)
// ═══════════════════════════════════════════════════

function saveSnapshot(label) {
  if (!state.events || state.events.length === 0) return;
  try {
    const backups = JSON.parse(localStorage.getItem(BACKUPS_KEY) || '[]');
    backups.unshift({
      timestamp: new Date().toISOString(),
      label: label || '자동',
      count: state.events.length,
      events: JSON.parse(JSON.stringify(state.events)) // deep copy
    });
    // 최대 MAX_BACKUPS개만 보관
    if (backups.length > MAX_BACKUPS) backups.splice(MAX_BACKUPS);
    localStorage.setItem(BACKUPS_KEY, JSON.stringify(backups));
  } catch(e) { console.warn('[backup] 스냅샷 저장 실패:', e); }
}

function startAutoSnapshot() {
  if (autoSnapshotTimer) clearInterval(autoSnapshotTimer);
  // 10분마다 자동 스냅샷
  autoSnapshotTimer = setInterval(() => {
    if (state.events && state.events.length > 0) saveSnapshot('자동');
  }, 600000);
}

function openBackupSheet() {
  hideSheet('admin-sheet');
  hideSheet('user-menu-sheet');

  let backups = [];
  try { backups = JSON.parse(localStorage.getItem(BACKUPS_KEY) || '[]'); } catch(e) {}

  const fmtTime = ts => {
    const d = new Date(ts);
    const now = new Date();
    const diffMin = Math.floor((now - d) / 60000);
    const ago = diffMin < 1 ? '방금 전' : diffMin < 60 ? `${diffMin}분 전` :
                diffMin < 1440 ? `${Math.floor(diffMin/60)}시간 전` : `${Math.floor(diffMin/1440)}일 전`;
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return { dateStr, ago };
  };

  const labelColor = lbl => lbl === '수동' ? '#3b82f6' : lbl === '동기화 전' ? '#f59e0b' : '#6b7280';
  const labelIcon  = lbl => lbl === '수동' ? '📸' : lbl === '동기화 전' ? '⚡' : lbl === '복구 전 자동저장' ? '↩️' : '🕐';

  const previewEvents = evs => {
    if (!evs || !evs.length) return '';
    const sorted = [...evs].filter(e => e.date).sort((a,b) => a.date > b.date ? 1 : -1);
    const today = new Date().toISOString().slice(0,10);
    const upcoming = sorted.filter(e => e.date >= today).slice(0,3);
    const preview = upcoming.length ? upcoming : sorted.slice(-3);
    return preview.map(e => {
      const d = new Date(e.date);
      return `${d.getMonth()+1}/${d.getDate()} ${e.actor||''} ${e.title||''}`;
    }).join(' · ');
  };

  const currentCount = state.events ? state.events.length : 0;

  const rows = backups.length
    ? backups.map((b, i) => {
        const {dateStr, ago} = fmtTime(b.timestamp);
        const diff = b.count - currentCount;
        const diffStr = diff === 0 ? '현재와 동일' : diff > 0 ? `현재보다 ${diff}개 많음` : `현재보다 ${Math.abs(diff)}개 적음`;
        const diffColor = diff > 0 ? '#22c55e' : diff < 0 ? '#ef4444' : '#6b7280';
        const preview = previewEvents(b.events);
        return `
      <div style="padding:14px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
              <span style="font-size:13px">${labelIcon(b.label)}</span>
              <span style="font-size:14px;font-weight:600">${dateStr}</span>
              <span style="font-size:11px;color:var(--text3)">${ago}</span>
              <span style="font-size:10px;padding:1px 6px;border-radius:4px;background:${labelColor(b.label)}22;color:${labelColor(b.label)}">${b.label}</span>
            </div>
            <div style="font-size:12px;margin-bottom:3px">
              <span style="font-weight:600">일정 ${b.count}개</span>
              <span style="color:${diffColor};margin-left:6px;font-size:11px">${diffStr}</span>
            </div>
            ${preview ? `<div style="font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">${preview}</div>` : ''}
          </div>
          <button onclick="restoreSnapshot(${i})"
            style="flex-shrink:0;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;white-space:nowrap"
            ontouchstart="">
            🔄 복구
          </button>
        </div>
      </div>`;
      }).join('')
    : '<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:13px;">저장된 백업이 없습니다<br><span style="font-size:12px">10분마다 자동 저장됩니다</span></div>';

  // 정적 시트의 body 영역을 채운 뒤 showSheet()로 열기
  const body = document.getElementById('backup-sheet-body');
  if (body) {
    body.innerHTML = `
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">
        🕐 자동 · ⚡ 동기화 직전 · 📸 수동 — 최근 ${MAX_BACKUPS}개 보관
      </div>
      <button onclick="saveSnapshot('수동');openBackupSheet()"
        style="width:100%;background:var(--bg4);border:1px solid var(--border);color:var(--text1);border-radius:10px;padding:10px;font-size:13px;cursor:pointer;margin-bottom:12px">
        📸 지금 즉시 백업
      </button>
      ${rows}`;
  }
  showSheet('backup-sheet');
}

function restoreSnapshot(index) {
  let backups = [];
  try { backups = JSON.parse(localStorage.getItem(BACKUPS_KEY) || '[]'); } catch(e) {}
  const backup = backups[index];
  if (!backup) { showToast('❌ 백업을 찾을 수 없습니다'); return; }

  // 복구 전 현재 상태 스냅샷 (되돌리기용)
  saveSnapshot('복구 전 자동저장');

  // 즉시 복구 실행
  state.events = JSON.parse(JSON.stringify(backup.events));
  saveEvents();
  pushAllToServer(false);
  renderCurrentView();

  hideSheet('backup-sheet');

  const d = new Date(backup.timestamp);
  const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  showToast(`✅ ${dateStr} 백업으로 복구됐습니다 (일정 ${backup.count}개)`);
  // 실수 복구 안내 (2초 후 추가 토스트)
  setTimeout(() => showToast('↩ 실수였다면 백업 목록에서 "복구 전 자동저장"으로 되돌릴 수 있어요'), 2500);
}
